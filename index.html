function guessCategory(name = "", code = "", context = "") {
  const n = `${name} ${context}`;
  const rules = [
    [/مردودات المبيعات|مردودات مبيعات/, "sales_returns"],
    [/خصم.*مبيعات|خصومات مسموح/, "sales_discounts"],
    [/نقد|بنك|صندوق|عملاء|مدين|مخزون|بضاعة|أوراق قبض|سلف|عهد/, "asset_current"],
    [/أصول ثابتة|عقار|آلات|أثاث|سيارات|مجمع إهلاك|مجمع اهلاك|استثمار.*طويل|شهرة/, "asset_noncurrent"],
    [/موردين|دائن|مصروفات مستحقة|أوراق دفع|ضريبة مستحقة|قرض قصير/, "liability_current"],
    [/قرض طويل|قروض طويلة|التزام طويل|مخصص.*طويل/, "liability_noncurrent"],
    [/رأس المال|احتياطي|أرباح مرحلة|أرباح محتجزة|جاري الشريك|حقوق الملكية|شركاء/, "equity"],
    [/مشتريات/, "purchases"],
    [/مبيعات|إيراد التشغيل|إيرادات النشاط/, "revenue"],
    [/تكلفة المبيعات|تكلفة البضاعة/, "purchases"],
    [/مصروف|رواتب|مرتبات|إيجار|ايجار|إهلاك|اهلاك|دعاية|صيانة|كهرباء|قرطاسية|عمولات البيع|عمولات علي المبيعات|نقل وشحن|م\/ نقل|تليفون|بوفيه|نظافه|زكاه وبر|حوافز/, "opex"],
    [/إيراد آخر|إيرادات أخرى|أرباح بيع أصل|ايراد بيع أصول|إيرادات متنوعه|خصم مكتسب/, "other_income"],
    [/مصروف آخر|مصروفات أخرى|خسارة/, "other_expense"],
    [/ضريبة الدخل|ضريبة دخل/, "tax"],
    [/الأصول/, "asset_current"],
    [/الخصوم/, "liability_current"],
  ];
  for (const [re, cat] of rules) if (re.test(n)) return cat;
  const c = String(code).trim();
  const first = c[0];
  if (first === "1") return "asset_current";
  if (first === "2") return "liability_current";
  if (first === "3") return "equity";
  if (first === "4") return "revenue";
  if (first === "5") return "opex";
  return "asset_current";
}

const fmt = (n) => {
  if (n === null || n === undefined || isNaN(n)) return "—";
  const abs = Math.abs(n);
  const s = abs.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return n < 0 ? `(${s})` : s;
};
const uid = () => Math.random().toString(36).slice(2, 10);

/* ---------------------------------- تحليل ملف الإكسل ---------------------------------- */
/* الصيغة (أ): جدول بسيط أعمدة كود/اسم/مدين/دائن
   الصيغة (ب): تصدير من نظام ERP — شجرة حسابات هرمية بأكواد مفصولة "/" وأعمدة
   "رقم الحساب" / "اسم الحساب" / "رصيد بداية" / "صافي الحركة" / "رصيد نهاية"
   حيث القيمة قد تنتهي بحرف "م" (دائن) أو "د" (مدين). */

function detectFlatColumns(rows) {
  for (let r = 0; r < Math.min(rows.length, 8); r++) {
    const row = rows[r].map((c) => String(c ?? ""));
    let code = -1, name = -1, debit = -1, credit = -1;
    row.forEach((cell, i) => {
      if (code === -1 && /كود|رقم/.test(cell)) code = i;
      if (name === -1 && /اسم|بيان/.test(cell)) name = i;
      if (debit === -1 && /مدين/.test(cell)) debit = i;
      if (credit === -1 && /دائن/.test(cell)) credit = i;
    });
    if (name !== -1 && (debit !== -1 || credit !== -1)) return { headerRow: r, code, name, debit, credit };
  }
  return null;
}

function detectTreeColumns(rows) {
  for (let r = 0; r < Math.min(rows.length, 40); r++) {
    const row = rows[r].map((c) => String(c ?? ""));
    let code = -1, name = -1, ending = -1, opening = -1, netDebit = -1, netCredit = -1;
    row.forEach((cell, i) => {
      if (name === -1 && /اسم الحساب/.test(cell)) name = i;
      if (code === -1 && /رقم الحساب/.test(cell)) code = i;
      if (ending === -1 && /رصيد نهاية/.test(cell)) ending = i;
      if (opening === -1 && /رصيد بداية/.test(cell)) opening = i;
      if (netDebit === -1 && /صافي الحركة/.test(cell) && /مدين/.test(cell)) netDebit = i;
      if (netCredit === -1 && /صافي الحركة/.test(cell) && /دائن/.test(cell)) netCredit = i;
    });
    if (name !== -1 && ending !== -1) return { headerRow: r, code, name, ending, opening, netDebit, netCredit };
  }
  return null;
}

function parseAmountCell(raw) {
  if (raw === null || raw === undefined || raw === "") return { value: 0, nature: null };
  let s = String(raw).trim();
  let nature = null;
  const last = s.slice(-1);
  if (last === "م" || last === "د") {
    nature = last === "م" ? "debit" : "credit";
    s = s.slice(0, -1).trim();
  }
  s = s.replace(/,/g, "");
  const value = parseFloat(s);
  if (isNaN(value)) return { value: 0, nature: null };
  if (nature) return { value: Math.abs(value), nature };
  if (value !== 0) return { value: Math.abs(value), nature: value < 0 ? "credit" : "debit" };
  return { value: 0, nature: null };
}

function cleanAccName(raw) {
  return String(raw ?? "").replace(/^\[/, "").replace(/\]$/, "").replace(/-+\s*$/, "").trim();
}

function parseSignedNum(raw) {
  if (raw === null || raw === undefined || raw === "") return 0;
  let s = String(raw).trim().replace(/,/g, "");
  const last = s.slice(-1);
  if (last === "م" || last === "د") s = s.slice(0, -1).trim();
  const v = parseFloat(s);
  return isNaN(v) ? 0 : v;
}

function buildTreeRows(rawRows, h) {
  // اقرأ كل الصفوف مع الكود والاسم والأرصدة (افتتاحي/حركة/نهائي)
  const all = [];
  for (let r = h.headerRow + 1; r < rawRows.length; r++) {
    const row = rawRows[r];
    if (!row) continue;
    const nameRaw = h.name >= 0 ? row[h.name] : "";
    if (nameRaw === undefined || nameRaw === "") continue;
    let code = String((h.code >= 0 ? row[h.code] : "") ?? "").trim();
    if (!code || code === "nan") continue;
    if (/^\d$/.test(code)) code = "0" + code;
    const name = cleanAccName(nameRaw);
    const closing = parseAmountCell(row[h.ending]);
    const opening = h.opening >= 0 ? parseAmountCell(row[h.opening]) : { value: 0, nature: null };
    let netDebit = 0, netCredit = 0;
    if (h.netDebit >= 0) netDebit = parseSignedNum(row[h.netDebit]);
    if (h.netCredit >= 0) netCredit = parseSignedNum(row[h.netCredit]);
    all.push({
      code, name,
      closingValue: closing.value, closingNature: closing.nature,
      openingValue: opening.value, openingNature: opening.nature,
      netDebit, netCredit,
    });
  }

  const nameByCode = {};
  all.forEach((a) => { nameByCode[a.code] = a.name; });
  const depthOf = (code) => code.split("/").length;
  const isLeaf = (code) => !all.some((a) => a.code !== code && a.code.startsWith(code + "/"));
  const parentChain = (code) => {
    const parts = code.split("/");
    const chain = [];
    for (let i = parts.length - 1; i >= 1; i--) {
      const anc = parts.slice(0, i).join("/");
      if (nameByCode[anc]) chain.push({ code: anc, name: nameByCode[anc] });
    }
    return chain; // من الأقرب للأبعد
  };

  // الأوراق فقط (التفاصيل النهائية) هي اللي فيها الأرقام الحقيقية — تفادي الازدواج
  const leaves = [];
  all.forEach((a) => {
    if (!isLeaf(a.code)) return;
    if (!a.closingValue && !a.netDebit && !a.netCredit && !a.openingValue) return;
    const chain = parentChain(a.code);
    // نوع الرصيد النهائي: من suffix (م/د) أو من الحركة
    let nature = a.closingNature;
    if (!nature) {
      const netMove = a.netDebit - a.netCredit;
      const openSigned = a.openingNature === "credit" ? -a.openingValue : a.openingValue;
      nature = (openSigned + netMove) >= 0 ? "debit" : "credit";
    }
    leaves.push({
      code: a.code, name: a.name, chain,
      // الحساب الأب المباشر اللي المستخدم هيصنّفه (level chosen elsewhere)
      closingValue: a.closingValue, nature,
      opening: a.openingNature === "credit" ? -a.openingValue : a.openingValue,
      netDebit: a.netDebit, netCredit: a.netCredit,
    });
  });

  // قائمة الحسابات "الأب" القابلة للتصنيف (كل المستويات ماعدا الأوراق)، مع رصيدها المجمّع من الأوراق
  const parentCodes = [...new Set(all.map((a) => a.code).filter((c) => !isLeaf(c)))];
  const parents = parentCodes.map((code) => {
    const kids = leaves.filter((l) => l.code.startsWith(code + "/"));
    const debitSum = kids.filter((k) => k.nature === "debit").reduce((s, k) => s + k.closingValue, 0);
    const creditSum = kids.filter((k) => k.nature === "credit").reduce((s, k) => s + k.closingValue, 0);
    return {
      code, name: nameByCode[code], depth: depthOf(code),
      leafCount: kids.length, debitSum, creditSum,
      chain: parentChain(code),
    };
  }).filter((p) => p.leafCount > 0);

  return { leaves, parents, nameByCode };
}

// حوّل الأوراق + تصنيفات الآباء إلى صفوف القوائم النهائية (تجميع أرصدة الأوراق تحت كل أب)
function leavesToRows(parsed, classMap, savedMap) {
  // classMap: { code(parent) -> category }.  كل ورقة تاخد تصنيف أقرب أب مصنّف.
  const rows = [];
  parsed.leaves.forEach((leaf) => {
    // دور على أقرب أب في السلسلة له تصنيف
    let category = null, parentName = leaf.name;
    for (const anc of leaf.chain) {
      if (classMap[anc.code]) { category = classMap[anc.code]; parentName = anc.name; break; }
    }
    if (!category) category = guessCategory(leaf.name, leaf.code, leaf.chain.map((c) => c.name).join(" "));

    // تصحيحات دقيقة حسب اسم الورقة أو مسارها — حتى لو الأب مصنّف تصنيف عام
    const path = `${leaf.name} ${leaf.chain.map((c) => c.name).join(" ")}`;
    let cat = category;
    // حسابات لا تدخل القوائم: التحويلات بين المخازن، والتغيير في المخزون (قيود تسوية)
    if (/تحويلات داخلة|تحويلات خارجة|تحويل بين المخازن|التحويلات بين المخازن/.test(path)) cat = "ignore";
    else if (/التغيير في المخزون|المخزون الحالي \(متاجرة\)|مخزون اول المدة/.test(path)) cat = "ignore";
    // بنود قائمة الدخل التفصيلية لازم تتفصل عن بعضها
    else if (/مردود|مرتجع/.test(path) && /مبيعات|مبيع/.test(path)) cat = "sales_returns";
    else if (/خصم.*مسموح|خصم مسموح|خصومات مسموح/.test(path)) cat = "sales_discounts";
    else if (/مردود|مرتجع/.test(path) && /مشتريات|مشتري/.test(path)) cat = "purchase_returns";
    else if (/المبيعات|مبيعات/.test(path) && !/مردود|مرتجع|تكلفة|مقابل/.test(path) && (category === "revenue" || /ايرادات متاجرة|إيرادات متاجرة/.test(path))) cat = "revenue";
    else if (/مشتريات|بضاعة مشتراة/.test(path) && !/مردود|مرتجع/.test(path)) cat = "purchases";
    else if (/خصم مكتسب/.test(path)) cat = "other_income";

    // فصل العملاء/الموردين حسب طبيعة الرصيد (له الأولوية على أي تصنيف)
    const isCustomer = /عملاء|عميل/.test(leaf.name) || leaf.chain.some((c) => /عملاء/.test(c.name));
    const isSupplier = /موردين|مورد/.test(leaf.name) || leaf.chain.some((c) => /موردين/.test(c.name));
    if (isCustomer) cat = leaf.nature === "debit" ? "asset_current" : "liability_current";
    else if (isSupplier) cat = leaf.nature === "credit" ? "liability_current" : "asset_current";

    // رصيد نهاية المدة (للمركز المالي)
    let debit = 0, credit = 0;
    if (leaf.nature === "debit") debit = leaf.closingValue; else credit = leaf.closingValue;
    // صافي حركة الشهر (لقائمة الدخل) — الفرق بين حركة مدين وحركة دائن
    const netDebit = leaf.netDebit || 0;
    const netCredit = leaf.netCredit || 0;
    let subtype = null;
    if (isCustomer) subtype = leaf.nature === "debit" ? "customer_debt" : "customer_prepaid";
    else if (isSupplier) subtype = leaf.nature === "credit" ? "supplier_debt" : "supplier_prepaid";
    // تجاوز محفوظ من تعديل المستخدم السابق
    let bsGroup = null;
    if (savedMap) {
      const og = savedMap[`bsgroup:${leaf.name}`];
      if (og) {
        bsGroup = og === "ignore" ? null : og;
        const gc = { cash: "asset_current", debtors: "asset_current", inventory: "asset_current", noncurrent: "asset_noncurrent", creditors: "liability_current", equity: "equity", ignore: "ignore" }[og];
        if (gc) cat = gc;
        if (og !== "debtors" && og !== "creditors") subtype = null;
      }
    }
    rows.push({ id: uid(), code: leaf.code, name: leaf.name, debit, credit, category: cat,
      netDebit, netCredit, isCustomer, isSupplier, subtype, bsGroup, opening: leaf.opening || 0, parentName });
  });
  return rows;
}

function buildFlatRows(rawRows, mapping) {
  const out = [];
  for (let r = mapping.headerRow + 1; r < rawRows.length; r++) {
    const row = rawRows[r];
    if (!row || row.every((c) => c === undefined || c === "")) continue;
    const name = mapping.name >= 0 ? row[mapping.name] : "";
    if (!name) continue;
    const code = mapping.code >= 0 ? row[mapping.code] : "";
    const debit = parseFloat(row[mapping.debit]) || 0;
    const credit = parseFloat(row[mapping.credit]) || 0;
    if (debit === 0 && credit === 0) continue;
    out.push({ id: uid(), code: String(code ?? "").trim(), name: String(name).trim(), debit, credit, category: guessCategory(name, code) });
  }
  return out;
}

async function parseWorkbook(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array" });
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rawRows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: "" });
  const tree = detectTreeColumns(rawRows);
  if (tree) {
    const parsed = buildTreeRows(rawRows, tree);
    return { mode: "tree", rawRows, tree, parsed };
  }
  const mapping = detectFlatColumns(rawRows) || { headerRow: 0, code: 0, name: 1, debit: 2, credit: 3 };
  return { mode: "flat", rawRows, mapping };
}

function ParentClassify({ parsed, classMap, setClassMap, savedMap, onNext, nextLabel }) {
  const availableLevels = [...new Set(parsed.parents.map((p) => p.depth))].sort();
  const [level, setLevel] = useState(availableLevels[0] || 1);
  const [filter, setFilter] = useState("");

  // اعرض حسابات المستوى المختار فقط
  const atLevel = parsed.parents.filter((p) => p.depth === level);
  atLevel.sort((a, b) => a.code.localeCompare(b.code, undefined, { numeric: true }));

  const isNew = (code, name) => savedMap[`code:${code}`] === undefined && savedMap[`name:${name}`] === undefined;
  const setCat = (code, v) => setClassMap({ ...classMap, [code]: v });
  const setCatForAll = (list, v) => {
    const next = { ...classMap };
    list.forEach((p) => { next[p.code] = v; });
    setClassMap(next);
  };

  const visible = atLevel.filter((p) => !filter || p.name.includes(filter) || p.code.includes(filter));
  const doneCount = visible.filter((p) => classMap[p.code]).length;
  const newCount = visible.filter((p) => isNew(p.code, p.name) && !classMap[p.code]).length;

  const levelName = (lv) => lv === 1 ? "المستوى الأول (الحسابات الرئيسية)" : lv === 2 ? "المستوى الثاني" : lv === 3 ? "المستوى الثالث" : `المستوى ${lv}`;

  return (
    <div>
      <Card style={{ padding: 14, marginBottom: 12 }}>
        <div style={{ fontSize: 12.5, color: "#6b6455", marginBottom: 8, fontWeight: 600 }}>اختر مستوى الحسابات اللي عايز تصنّفه:</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 4 }}>
          {availableLevels.map((lv) => {
            const cnt = parsed.parents.filter((p) => p.depth === lv).length;
            const done = parsed.parents.filter((p) => p.depth === lv && classMap[p.code]).length;
            return (
              <button key={lv} onClick={() => setLevel(lv)}
                style={{ border: `1.5px solid ${level === lv ? INK : RULE}`, background: level === lv ? INK : "#fff", color: level === lv ? CREAM : INK, borderRadius: 8, padding: "7px 12px", fontSize: 12, cursor: "pointer", fontFamily: "'IBM Plex Sans Arabic', sans-serif", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, minWidth: 70 }}>
                <span style={{ fontWeight: 700 }}>مستوى {lv}</span>
                <span style={{ fontSize: 9.5, opacity: 0.85 }}>{done}/{cnt} مصنّف</span>
              </button>
            );
          })}
        </div>
        <p style={{ fontSize: 11, color: "#8a8271", marginTop: 8, lineHeight: 1.7 }}>
          صنّف حسابات <b>{levelName(level)}</b> فقط — كل الحسابات الفرعية تحتها تاخد نفس التصنيف تلقائيًا. الأرقام تُجمَّع من الحسابات التفصيلية النهائية (مفيش تكرار). العملاء والموردون يتفصلوا تلقائيًا (مدين=مستحق لنا، دائن=دفعة مقدمة).
        </p>
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontSize: 12 }}>
          <span style={{ color: doneCount === visible.length ? GREEN_INK : GOLD, fontWeight: 600 }}>صُنّف {doneCount} من {visible.length} في هذا المستوى</span>
          {newCount > 0 && <span style={{ color: GOLD, fontWeight: 600 }}>⚠ {newCount} حساب جديد</span>}
        </div>
      </Card>

      <input placeholder="بحث باسم أو كود…" value={filter} onChange={(e) => setFilter(e.target.value)}
        style={{ width: "100%", border: `1px solid ${RULE}`, borderRadius: 8, padding: "9px 12px", fontFamily: "'IBM Plex Sans Arabic', sans-serif", fontSize: 13.5, marginBottom: 12 }} />

      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 80 }}>
        {visible.map((p) => {
          const isNewFlag = isNew(p.code, p.name) && !classMap[p.code];
          const done = !!classMap[p.code];
          return (
            <Card key={p.code} style={{ padding: 12, borderColor: isNewFlag ? GOLD : done ? GREEN_INK : RULE, borderWidth: isNewFlag || done ? 1.5 : 1 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, marginBottom: 8 }}>
                <div style={{ minWidth: 0, flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 14, color: INK }}>
                    {p.name}
                    {isNewFlag && <span style={{ fontSize: 9, background: GOLD, color: "#fff", borderRadius: 8, padding: "1px 6px", marginRight: 6 }}>جديد</span>}
                    {done && <Check size={13} color={GREEN_INK} style={{ marginRight: 6 }} />}
                  </div>
                  <div style={{ fontSize: 10.5, color: "#8a8271", marginTop: 2 }}>
                    كود {p.code} · {p.leafCount} حساب تفصيلي
                  </div>
                  <div style={{ fontSize: 11, color: "#6b6455", marginTop: 2, direction: "rtl" }}>
                    مدين {fmt(p.debitSum)} · دائن {fmt(p.creditSum)}
                  </div>
                </div>
              </div>
              <Select value={classMap[p.code] || ""} onChange={(e) => setCat(p.code, e.target.value)} style={{ width: "100%", fontSize: 13 }}>
                <option value="">— اختر التصنيف —</option>
                {CATEGORY_GROUPS.map((g) => (
                  <optgroup key={g.group} label={g.group}>
                    {g.options.map((o) => (<option key={o.v} value={o.v}>{o.label}</option>))}
                  </optgroup>
                ))}
              </Select>
            </Card>
          );
        })}
        {visible.length === 0 && <Card style={{ padding: 20, textAlign: "center", color: "#847c69" }}>لا توجد حسابات في هذا المستوى.</Card>}
      </div>

      <div style={{ position: "fixed", bottom: 14, left: 14, right: 14, maxWidth: 1152, margin: "0 auto", zIndex: 20 }}>
        <PrimaryBtn icon={Check} onClick={onNext}>{nextLabel || "حفظ والمتابعة"}</PrimaryBtn>
      </div>
    </div>
  );
}

/* ---------------------------------- حسابات القوائم ---------------------------------- */

function computeFigures(rows, openingInventory) {
  // للمركز المالي: نستخدم رصيد نهاية المدة (debit/credit) حسب طبيعة التصنيف
  const val = (r) => (DEBIT_NATURE.has(r.category) ? r.debit - r.credit : r.credit - r.debit);
  // لقائمة الدخل: نستخدم صافي حركة الشهر (netDebit - netCredit) لو متوفرة، وإلا رصيد النهاية
  const hasMovement = rows.some((r) => (r.netDebit || 0) !== 0 || (r.netCredit || 0) !== 0);
  const mov = (r) => {
    if (r.netDebit === undefined && r.netCredit === undefined) return val(r);
    const nd = r.netDebit || 0, nc = r.netCredit || 0;
    return DEBIT_NATURE.has(r.category) ? nd - nc : nc - nd;
  };
  const byCat = (cat) => rows.filter((r) => r.category === cat);
  const sum = (cat) => byCat(cat).reduce((s, r) => s + val(r), 0);        // رصيد (مركز مالي)
  const sumMov = (cat) => byCat(cat).reduce((s, r) => s + mov(r), 0);      // حركة (قائمة دخل)

  const grossSales = sumMov("revenue");
  const salesReturns = sumMov("sales_returns");
  const salesDiscounts = sumMov("sales_discounts");
  const netSales = grossSales - salesReturns - salesDiscounts;
  const returnsRatio = grossSales ? salesReturns / grossSales : 0;

  // المخزون: من حساب المخزون بالميزانية فقط — أول المدة = رصيد بداية، آخر المدة = رصيد نهاية
  // نستبعد حسابات المخزون تحت المتاجرة والتحويلات (قيود تسوية)
  const invRows = rows.filter((r) => /مخزون|بضاعة|بضائع/.test(r.name) && !/متاجرة|تحويل|اول المدة|أول المدة/.test(r.name) && (r.category === "asset_current" || r.category === "asset_noncurrent"));
  const closingInventory = invRows.reduce((s, r) => s + Math.abs(r.debit - r.credit), 0);
  const openingInvFromAccounts = invRows.reduce((s, r) => s + (r.opening || 0), 0);
  const openInv = openingInvFromAccounts > 0 ? openingInvFromAccounts : (openingInventory || 0);
  const purchases = sumMov("purchases") - sumMov("purchase_returns");
  const cogs = openInv + purchases - closingInventory;
  const grossProfit = netSales - cogs;
  const grossMargin = netSales ? grossProfit / netSales : 0;

  const opexRows = byCat("opex").map((r) => ({ name: r.name, amount: mov(r) })).filter((r) => Math.abs(r.amount) > 0.004);
  const opex = opexRows.reduce((s, r) => s + r.amount, 0);
  const opexRatio = netSales ? opex / netSales : 0;
  const operatingProfit = grossProfit - opex;
  const operatingMargin = netSales ? operatingProfit / netSales : 0;

  const otherIncomeRows = byCat("other_income").map((r) => ({ name: r.name, amount: mov(r) })).filter((r) => Math.abs(r.amount) > 0.004);
  const otherIncome = otherIncomeRows.reduce((s, r) => s + r.amount, 0);
  const otherExpense = sumMov("other_expense");
  const tax = sumMov("tax");
  const netProfit = operatingProfit + otherIncome - otherExpense - tax;
  const netMargin = netSales ? netProfit / netSales : 0;
  const oci = sumMov("oci");
  const totalComprehensive = netProfit + oci;

  const assetCurrentRows = byCat("asset_current").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const assetNoncurrentRows = byCat("asset_noncurrent").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const liabilityCurrentRows = byCat("liability_current").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const liabilityNoncurrentRows = byCat("liability_noncurrent").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const equityAccountRows = byCat("equity").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);

  const currentAssets = assetCurrentRows.reduce((s, r) => s + r.amount, 0);
  const nonCurrentAssets = assetNoncurrentRows.reduce((s, r) => s + r.amount, 0);
  const totalAssets = currentAssets + nonCurrentAssets;
  const currentLiab = liabilityCurrentRows.reduce((s, r) => s + r.amount, 0);
  const nonCurrentLiab = liabilityNoncurrentRows.reduce((s, r) => s + r.amount, 0);
  const totalLiab = currentLiab + nonCurrentLiab;
  const equityAccounts = equityAccountRows.reduce((s, r) => s + r.amount, 0);
  const totalEquity = equityAccounts + netProfit;
  const totalLiabEquity = totalLiab + totalEquity;

  const inv = /مخزون|بضاعة|بضائع/;
  const srcRows = rows;
  // تجاوز يدوي لموضع الحساب في المركز المالي (يحدده المستخدم من زر التعديل)
  const ovOf = (name) => { const s = srcRows.find((x) => x.name === name); return s && s.bsGroup ? s.bsGroup : null; };
  const isCashName = (n) => /نقد|بنك|صندوق|خزين|خزائن|عهد/.test(n);
  const inGroup = (r, g) => {
    const ov = ovOf(r.name);
    if (ov) return ov === g;
    if (g === "cash") return isCashName(r.name);
    if (g === "inventory") return inv.test(r.name) && !/متاجرة|تحويل|اول المدة|أول المدة/.test(r.name);
    return false;
  };
  const cashRows = assetCurrentRows.filter((r) => inGroup(r, "cash"));
  const cash = cashRows.reduce((s, r) => s + r.amount, 0);
  const bySubtype = (st) => srcRows.filter((r) => r.subtype === st && !r.bsGroup);
  const sumRows = (arr) => arr.reduce((s, r) => s + (DEBIT_NATURE.has(r.category) ? r.debit - r.credit : r.credit - r.debit), 0);
  const customerDebt = Math.abs(sumRows(bySubtype("customer_debt")));
  const customerPrepaid = Math.abs(sumRows(bySubtype("customer_prepaid")));
  const supplierDebt = Math.abs(sumRows(bySubtype("supplier_debt")));
  const supplierPrepaid = Math.abs(sumRows(bySubtype("supplier_prepaid")));
  const openingInventoryFromTB = openingInvFromAccounts;

  // ===== المركز المالي المجمّع (بشكل الإكسيل) =====
  const cashGroup = cashRows.map((r) => ({ name: r.name, amount: r.amount })).filter((r) => Math.abs(r.amount) > 0.004);
  // المدينون: العملاء مجمّعين سطر واحد + دفعات مقدمة للموردين + باقي المدينين بالتفصيل
  const otherDebtorRows = assetCurrentRows.filter((r) => {
    const ov = ovOf(r.name);
    if (ov) return ov === "debtors";
    const src = srcRows.find((s) => s.name === r.name);
    if (src && (src.subtype === "customer_debt" || src.subtype === "supplier_prepaid")) return false;
    if (isCashName(r.name)) return false;
    if (inv.test(r.name)) return false;
    return true;
  }).map((r) => ({ name: r.name, amount: r.amount })).filter((r) => Math.abs(r.amount) > 0.004);
  const receivablesGroup = [];
  if (customerDebt > 0.004) receivablesGroup.push({ name: "ذمم العملاء المدينة (مستحق على العملاء)", amount: customerDebt });
  if (supplierPrepaid > 0.004) receivablesGroup.push({ name: "دفعات مقدمة للموردين (أرصدة موردين مدينة)", amount: supplierPrepaid });
  assetCurrentRows.filter((r) => ovOf(r.name) === "receivables").forEach((r) => {
    if (Math.abs(r.amount) > 0.004) receivablesGroup.push({ name: r.name, amount: r.amount });
  });
  const debtorsGroup = otherDebtorRows.slice();
  // المخزون
  const inventoryGroup = assetCurrentRows.filter((r) => inGroup(r, "inventory")).map((r) => ({ name: r.name, amount: r.amount })).filter((r) => Math.abs(r.amount) > 0.004);
  // الخصوم المتداولة
  const otherCreditorRows = liabilityCurrentRows.filter((r) => {
    const ov = ovOf(r.name);
    if (ov) return ov === "creditors";
    const src = srcRows.find((s) => s.name === r.name);
    if (src && (src.subtype === "supplier_debt" || src.subtype === "customer_prepaid")) return false;
    return true;
  }).map((r) => ({ name: r.name, amount: r.amount })).filter((r) => Math.abs(r.amount) > 0.004);
  const creditorsGroup = [];
  if (supplierDebt > 0.004) creditorsGroup.push({ name: "موردون (أرصدة دائنة — مستحق للموردين)", amount: supplierDebt });
  if (customerPrepaid > 0.004) creditorsGroup.push({ name: "دفعات مقدمة من العملاء (أرصدة عملاء دائنة)", amount: customerPrepaid });
  otherCreditorRows.forEach((r) => creditorsGroup.push(r));

  const balanceGroups = {
    cash: { title: "أولاً: النقدية والخزائن", rows: cashGroup, total: cashGroup.reduce((s, r) => s + r.amount, 0) },
    receivables: { title: "ثانياً: الأرصدة المدينة", rows: receivablesGroup, total: receivablesGroup.reduce((s, r) => s + r.amount, 0) },
    debtors: { title: "ثالثاً: المدينون", rows: debtorsGroup, total: debtorsGroup.reduce((s, r) => s + r.amount, 0) },
    inventory: { title: "رابعاً: المخزون", rows: inventoryGroup, total: inventoryGroup.reduce((s, r) => s + r.amount, 0) },
    noncurrent: { title: "خامساً: الأصول الثابتة", rows: [{ name: "صافي الأصول الثابتة (بعد مجمع الإهلاك)", amount: nonCurrentAssets }].filter((r) => Math.abs(r.amount) > 0.004), total: nonCurrentAssets, detailRows: assetNoncurrentRows },
    creditors: { title: "أولاً: الخصوم المتداولة", rows: creditorsGroup, total: creditorsGroup.reduce((s, r) => s + r.amount, 0) },
  };

  return {
    val, byCat, sum,
    grossSales, salesReturns, salesDiscounts, netSales, returnsRatio,
    openInv, purchases, closingInventory, cogs, grossProfit, grossMargin,
    opexRows, opex, opexRatio, operatingProfit, operatingMargin,
    otherIncomeRows, otherIncome, otherExpense, tax, netProfit, netMargin, oci, totalComprehensive,
    assetCurrentRows, assetNoncurrentRows, liabilityCurrentRows, liabilityNoncurrentRows, equityAccountRows,
    currentAssets, nonCurrentAssets, totalAssets,
    currentLiab, nonCurrentLiab, totalLiab,
    equityAccounts, totalEquity, totalLiabEquity,
    inventory: closingInventory, openingInventoryFromTB, balanceDiff: totalAssets - totalLiabEquity,
    cash, customerDebt, supplierPrepaid, customerPrepaid, supplierDebt,
    balanceGroups,
  };
}

function mergeFigures(list) {
  // list: array of computeFigures() results for multiple periods, aggregated for annual view
  const sumKey = (k) => list.reduce((s, f) => s + (f[k] || 0), 0);
  const mergeRows = (key) => {
    const map = {};
    list.forEach((f) => f[key].forEach((r) => { map[r.name] = (map[r.name] || 0) + r.amount; }));
    return Object.entries(map).map(([name, amount]) => ({ name, amount }));
  };
  const grossSales = sumKey("grossSales");
  const salesReturns = sumKey("salesReturns");
  const salesDiscounts = sumKey("salesDiscounts");
  const netSales = grossSales - salesReturns - salesDiscounts;
  const returnsRatio = grossSales ? salesReturns / grossSales : 0;
  const purchases = sumKey("purchases");
  const openInv = list.length ? list[0].openInv : 0;
  const closingInventory = list.length ? list[list.length - 1].closingInventory : 0;
  const cogs = openInv + purchases - closingInventory;
  const grossProfit = netSales - cogs;
  const grossMargin = netSales ? grossProfit / netSales : 0;
  const opexRows = mergeRows("opexRows");
  const opex = sumKey("opex");
  const opexRatio = netSales ? opex / netSales : 0;
  const operatingProfit = grossProfit - opex;
  const operatingMargin = netSales ? operatingProfit / netSales : 0;
  const otherIncomeRows = mergeRows("otherIncomeRows");
  const otherIncome = sumKey("otherIncome");
  const otherExpense = sumKey("otherExpense");
  const tax = sumKey("tax");
  const netProfit = operatingProfit + otherIncome - otherExpense - tax;
  const netMargin = netSales ? netProfit / netSales : 0;
  const oci = sumKey("oci");
  const totalComprehensive = netProfit + oci;
  const last = list[list.length - 1] || {};
  return {
    grossSales, salesReturns, salesDiscounts, netSales, returnsRatio,
    openInv, purchases, closingInventory, cogs, grossProfit, grossMargin,
    opexRows, opex, opexRatio, operatingProfit, operatingMargin,
    otherIncomeRows, otherIncome, otherExpense, tax, netProfit, netMargin, oci, totalComprehensive,
    currentAssets: last.currentAssets || 0, nonCurrentAssets: last.nonCurrentAssets || 0, totalAssets: last.totalAssets || 0,
    currentLiab: last.currentLiab || 0, nonCurrentLiab: last.nonCurrentLiab || 0, totalLiab: last.totalLiab || 0,
    equityAccounts: last.equityAccounts || 0, totalEquity: (last.equityAccounts || 0) + netProfit,
    balanceDiff: last.balanceDiff || 0,
  };
}

/* حساب أرقام فترة واحدة بشكل صحيح:
   - لو الميزان "تراكمي من بداية السنة" (الوضع الافتراضي في برامج الحسابات): أرقام قائمة الدخل
     للشهر = التراكمي الحالي − التراكمي للفترة السابقة في نفس السنة، والمركز المالي من الميزان الحالي مباشرة.
   - لو الميزان "حركة الشهر فقط": الأرقام تؤخذ كما هي. */
function periodFigures(sortedPeriods, period, yearOpeningInv) {
  const fCurr = computeFigures(period.rows, 0);
  const samePrev = sortedPeriods.filter((p) => p.year === period.year && p.month < period.month).pop();

  // مخزون أول المدة: الأولوية للرصيد الافتتاحي المستخرج من الميزان نفسه، وإلا رصيد نهاية الشهر السابق
  let monthOpenInv;
  let openingWarning = null;
  if (fCurr.openingInventoryFromTB && fCurr.openingInventoryFromTB > 0) {
    monthOpenInv = fCurr.openingInventoryFromTB;
    if (samePrev) {
      const prevClosing = computeFigures(samePrev.rows, 0).closingInventory;
      if (Math.abs(prevClosing - monthOpenInv) > 1) {
        openingWarning = `تنبيه: رصيد مخزون آخر ${MONTH_NAMES[samePrev.month - 1]} (${fmt(prevClosing)}) لا يطابق رصيد افتتاح ${MONTH_NAMES[period.month - 1]} (${fmt(monthOpenInv)}) — فرق ${fmt(prevClosing - monthOpenInv)}. راجع الميزان.`;
      }
    }
  } else {
    monthOpenInv = samePrev ? computeFigures(samePrev.rows, 0).closingInventory : (yearOpeningInv || period.openingInventory || 0);
  }

  // كل شهر يُرفع منفصلاً وأرقام قائمة الدخل من صافي الحركة = رقم الشهر مباشرة (بدون طرح)
  const cogs = monthOpenInv + fCurr.purchases - fCurr.closingInventory;
  const grossProfit = fCurr.netSales - cogs;
  const operatingProfit = grossProfit - fCurr.opex;
  const netProfit = operatingProfit + fCurr.otherIncome - fCurr.otherExpense - fCurr.tax;
  return {
    ...fCurr,
    openInv: monthOpenInv, cogs, grossProfit, openingWarning,
    grossMargin: fCurr.netSales ? grossProfit / fCurr.netSales : 0,
    operatingProfit, operatingMargin: fCurr.netSales ? operatingProfit / fCurr.netSales : 0,
    netProfit, netMargin: fCurr.netSales ? netProfit / fCurr.netSales : 0,
    totalComprehensive: netProfit + fCurr.oci,
  };
}

/* الأرقام السنوية = مجموع الفترات الشهرية (كل شهر مرفوع منفصلاً) */
function yearFigures(sortedPeriods, year, yearOpeningInv) {
  const ps = sortedPeriods.filter((p) => p.year === year);
  if (!ps.length) return null;
  return mergeFigures(ps.map((p) => periodFigures(sortedPeriods, p, yearOpeningInv)));
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (window.__loaded_scripts && window.__loaded_scripts[src]) return resolve();
    const s = document.createElement("script");
    s.src = src; s.onload = () => { window.__loaded_scripts = window.__loaded_scripts || {}; window.__loaded_scripts[src] = true; resolve(); };
    s.onerror = reject; document.head.appendChild(s);
  });
}

/* ---------------------------------- تصدير Excel ---------------------------------- */

function colorFor(kind) {
  // ألوان بصيغة ARGB لـ SheetJS
  return {
    header: "FF132340",    // كحلي غامق
    section: "FFEAEEF2",   // رمادي فاتح
    total: "FFF4EFE2",     // بيج
    profit: "FF3C6E52",    // أخضر
    gold: "FFB8892B",
    white: "FFFFFFFF",
  }[kind];
}

function styleCell(cell, opts) {
  cell.s = cell.s || {};
  if (opts.bg) cell.s.fill = { patternType: "solid", fgColor: { rgb: opts.bg } };
  cell.s.font = { name: "Arial", sz: opts.sz || 11, bold: !!opts.bold, color: { rgb: opts.color || "FF000000" } };
  cell.s.alignment = { horizontal: opts.align || "right", vertical: "center", wrapText: !!opts.wrap, readingOrder: 2 };
  cell.s.border = {
    top: { style: "thin", color: { rgb: "FFDAD2BC" } },
    bottom: { style: "thin", color: { rgb: "FFDAD2BC" } },
    left: { style: "thin", color: { rgb: "FFDAD2BC" } },
    right: { style: "thin", color: { rgb: "FFDAD2BC" } },
  };
}

// يبني ورقة من صفوف [{cells:[{v,t,...}], type}]
function buildSheet(rowsSpec, colWidths) {
  const aoa = rowsSpec.map((r) => r.cells.map((c) => (c && c.v !== undefined ? c.v : "")));
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws["!cols"] = (colWidths || []).map((w) => ({ wch: w }));
  ws["!merges"] = [];
  rowsSpec.forEach((r, ri) => {
    r.cells.forEach((c, ci) => {
      if (!c) return;
      const addr = XLSX.utils.encode_cell({ r: ri, c: ci });
      if (!ws[addr]) ws[addr] = { t: c.t || "s", v: c.v };
      ws[addr].t = c.t || (typeof c.v === "number" ? "n" : "s");
      if (c.z) ws[addr].z = c.z;
      else if (c.t === "n" || typeof c.v === "number") ws[addr].z = "#,##0.00";
      styleCell(ws[addr], c.style || {});
    });
    if (r.merge) ws["!merges"].push(r.merge);
  });
  return ws;
}

function incomeSheetSpec(f, companyName, title, periodLabel, partners) {
  const ns = f.netSales || 1;

  const R = (m, v, p, opts) => rows.push({ cells: [
    { v: "", style: {} },
    { v: m, style: { align: "right", wrap: true, ...(opts && opts.labelStyle) } },
    { v: v === "" ? "" : v, t: v === "" ? "s" : "n", style: { align: "left", ...(opts && opts.valStyle) } },
    (p === "" || p === undefined || p === null)
      ? { v: "", t: "s", style: { align: "left" } }
      : { v: p, t: "n", style: { align: "left" }, z: "0.00%" },
  ] });
  // ترويسة
  rows.push({ cells: [{ v: companyName, style: { bg: colorFor("header"), color: "FFFFFFFF", bold: true, sz: 14, align: "center" } }, {}, {}, {}], merge: { s: { r: 0, c: 0 }, e: { r: 0, c: 3 } } });
  rows.push({ cells: [{ v: title + " — " + periodLabel, style: { bg: colorFor("header"), color: "FFFFFFFF", sz: 11, align: "center" } }, {}, {}, {}], merge: { s: { r: 1, c: 0 }, e: { r: 1, c: 3 } } });
  rows.push({ cells: [
    { v: "م", style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true, align: "center" } },
    { v: "البيان", style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true } },
    { v: "القيمة ج.م", style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true, align: "left" } },
    { v: "نسبة", style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true, align: "left" } },
  ] });
  const SEC = (t) => rows.push({ cells: [{ v: "▐ " + t, style: { bg: colorFor("section"), bold: true } }, {}, {}, {}], merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: 3 } } });
  const TOT = (t, v, green) => rows.push({ cells: [
    { v: t, style: { bg: green ? colorFor("profit") : colorFor("total"), bold: true, color: green ? "FFFFFFFF" : "FF132340" } },
    { v: "", style: { bg: green ? colorFor("profit") : colorFor("total") } },
    { v, t: "n", style: { bg: green ? colorFor("profit") : colorFor("total"), bold: true, align: "left", color: green ? "FFFFFFFF" : "FF132340" } },
    { v: pctOf(v), t: "n", style: { bg: green ? colorFor("profit") : colorFor("total"), align: "left", color: green ? "FFFFFFFF" : "FF132340" }, z: "0.00%" },
  ], merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: 1 } } });

  SEC("الإيرادات");
  R("إجمالي المبيعات", f.grossSales, pctOf(f.grossSales));
  R("مردودات المبيعات", f.salesReturns, pctOf(f.salesReturns));
  R("خصومات مسموح بها", f.salesDiscounts, pctOf(f.salesDiscounts));
  TOT("صافي المبيعات", f.netSales);
  SEC("تكلفة البضاعة المباعة");
  R("مخزون بداية الفترة", f.openInv, "");
  R("(+) صافي المشتريات", f.purchases, "");
  R("(−) مخزون آخر المدة", -f.closingInventory, "");
  TOT("إجمالي تكلفة البضاعة المباعة", f.cogs);
  TOT("إجمالي الربح", f.grossProfit, true);
  SEC("المصروفات التشغيلية");
  f.opexRows.forEach((r) => R(r.name, r.amount, pctOf(r.amount)));
  TOT("إجمالي المصروفات", f.opex);
  TOT("صافي الربح التشغيلي", f.operatingProfit, true);
  if (f.otherIncomeRows.length) { SEC("الإيرادات الأخرى"); f.otherIncomeRows.forEach((r) => R(r.name, r.amount, "")); TOT("إجمالي الإيرادات الأخرى", f.otherIncome); }
  if (f.otherExpense > 0) R("مصروفات أخرى", f.otherExpense, "");
  if (f.tax > 0) R("مصاريف الضرائب", f.tax, "");
  TOT("صافي الربح النهائي", f.netProfit, true);
  if (partners && partners.length) {
    SEC("توزيع الأرباح على الشركاء");
    partners.forEach((p) => R(`${p.name} (${(p.pct * 100).toFixed(2)}%)`, f.netProfit * p.pct, ""));
  }
  brandFooter(rows, 4);
  return buildSheet(rows, [4, 40, 16, 10]);
}

function balanceSheetSpec(f, companyName, periodLabel) {
  const bg = f.balanceGroups;
  const rows = [];
  brandRows(rows, 3);
  rows.push({ cells: [{ v: companyName, style: { bg: colorFor("header"), color: "FFFFFFFF", bold: true, sz: 14, align: "center" } }, {}, {}], merge: { s: { r: 0, c: 0 }, e: { r: 0, c: 2 } } });
  rows.push({ cells: [{ v: "قائمة المركز المالي — " + periodLabel, style: { bg: colorFor("header"), color: "FFFFFFFF", align: "center" } }, {}, {}], merge: { s: { r: 1, c: 0 }, e: { r: 1, c: 2 } } });
  rows.push({ cells: [
    { v: "م", style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true, align: "center" } },
    { v: "البيان", style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true } },
    { v: "القيمة ج.م", style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true, align: "left" } },
  ] });
  const SEC = (t) => rows.push({ cells: [{ v: "▐ " + t, style: { bg: colorFor("gold"), bold: true, color: "FFFFFFFF" } }, {}, {}], merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: 2 } } });
  const SUB = (t) => rows.push({ cells: [{ v: t, style: { bg: colorFor("section"), bold: true } }, {}, {}], merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: 2 } } });
  const R = (i, m, v) => rows.push({ cells: [{ v: i, style: { align: "center", color: "FF8A8271" } }, { v: m, style: { wrap: true } }, { v, t: "n", style: { align: "left" } }] });
  const TOT = (t, v, dark) => rows.push({ cells: [
    { v: t, style: { bg: dark ? colorFor("header") : colorFor("total"), bold: true, color: dark ? "FFFFFFFF" : "FF132340" } },
    { v: "", style: { bg: dark ? colorFor("header") : colorFor("total") } },
    { v, t: "n", style: { bg: dark ? colorFor("header") : colorFor("total"), bold: true, align: "left", color: dark ? "FFFFFFFF" : "FF132340" } },
  ], merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: 1 } } });
  SEC("الأصول");
  const grp = (g) => { SUB(g.title); g.rows.forEach((r, i) => R(i + 1, r.name, r.amount)); };
  grp(bg.cash); grp(bg.receivables); grp(bg.debtors); grp(bg.inventory);
  TOT("إجمالي الأصول المتداولة", f.currentAssets);
  if (bg.noncurrent.rows.length) grp(bg.noncurrent);
  TOT("إجمالي الأصول", f.totalAssets, true);
  SEC("الخصوم وحقوق الملكية");
  grp(bg.creditors);
  if (f.liabilityNoncurrentRows.length) { SUB("الخصوم غير المتداولة"); f.liabilityNoncurrentRows.forEach((r, i) => R(i + 1, r.name, r.amount)); }
  TOT("إجمالي الخصوم", f.totalLiab);
  const eqRows = f.equityAccountRows || [];
  const isDrawing = (n) => /جاري|مسحوب|سحب|مدفوعات/.test(n);
  const isRetained = (n) => /محتجز|مرحل|مرحّل|أرباح سابقة|ارباح سابقة/.test(n);
  const capitalRows = eqRows.filter((r) => !isDrawing(r.name) && !isRetained(r.name));
  const retainedRows = eqRows.filter((r) => isRetained(r.name));
  const drawingRows = eqRows.filter((r) => isDrawing(r.name));
  const sumA = (a) => a.reduce((s, r) => s + r.amount, 0);
  const bdiff = f.balanceDiff || 0;
  const settle = Math.abs(bdiff) <= 100 ? bdiff : 0;

  SUB("أولاً: رأس المال");
  capitalRows.forEach((r, i) => R(i + 1, r.name, r.amount));
  TOT("إجمالي رأس المال", sumA(capitalRows));
  SUB("ثانياً: الأرباح المحتجزة");
  if (retainedRows.length) retainedRows.forEach((r, i) => R(i + 1, r.name, r.amount));
  else R(1, "أرباح محتجزة من سنوات سابقة", 0);
  TOT("إجمالي الأرباح المحتجزة", sumA(retainedRows));
  SUB("ثالثاً: مسحوبات ومدفوعات الشركاء");
  if (drawingRows.length) drawingRows.forEach((r, i) => R(i + 1, `جاري الشركاء — ${r.name}`, r.amount));
  else R(1, "جاري الشركاء", 0);
  TOT("إجمالي جاري الشركاء", sumA(drawingRows));
  R("", "أرباح الفترة الجارية", f.netProfit);
  if (Math.abs(settle) >= 0.01) R("", "تسوية أرصدة افتتاحية مُرحّلة من النظام", settle);
  TOT("إجمالي حقوق الملكية", f.totalEquity + settle);
  TOT("إجمالي الخصوم وحقوق الملكية", f.totalLiab + f.totalEquity + settle, true);
  if (Math.abs(bdiff) > 100) {
    rows.push({ cells: [{ v: `⚠ فرق الميزانية ${bdiff.toFixed(2)} — أكبر من حد التسوية (100 ج.م). راجع تصنيف الحسابات.`, style: { bg: "FFFAECEB", color: "FF9C3B34", bold: true, wrap: true } }, {}, {}], merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: 2 } } });
  }
  brandFooter(rows, 3);
  return buildSheet(rows, [5, 42, 16]);
}

function homeSheetSpec(company, periods, year, annual, latest, zakatDue) {
  const rows = [];
  brandRows(rows, 9);
  const yearPeriods = periods.filter((p) => p.year === year).sort((a, b) => a.month - b.month);
  const HDR = (t, span) => rows.push({ cells: [{ v: t, style: { bg: colorFor("header"), color: "FFFFFFFF", bold: true, sz: 13, align: "center" } }].concat(new Array(span - 1).fill({})), merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: span - 1 } } });
  HDR(`${company.name} — لوحة القيادة وملخص الأداء المالي ${year}`, 9);
  HDR(`الفترة: ${yearPeriods.length} ${yearPeriods.length === 1 ? "شهر فعلي" : "أشهر فعلية"}`, 9);
  rows.push({ cells: [] });
  // بطاقات المؤشرات — 4 في الصف
  const kpiPairs = [
    ["إجمالي المبيعات", annual ? annual.grossSales : 0], ["صافي المبيعات", annual ? annual.netSales : 0],

    }
    rows.push({ cells: [] });
  }
  // جدول الأداء الشهري
  HDR("الأداء الشهري — Monthly Performance", 9);
  const cols = ["الشهر", "المبيعات", "صافي المبيعات", "إجمالي الربح", "هامش الإجمالي", "المصروفات", "ربح التشغيل", "صافي الربح", "هامش الصافي"];
  rows.push({ cells: cols.map((c) => ({ v: c, style: { bg: colorFor("gold"), color: "FFFFFFFF", bold: true, align: "center", sz: 10, wrap: true } })) });
  let tot = { gs: 0, ns: 0, gp: 0, ox: 0, op: 0, np: 0 };
  MONTH_NAMES.forEach((mn, idx) => {
    const p = yearPeriods.find((x) => x.month === idx + 1);
    if (!p) { rows.push({ cells: [{ v: mn, style: { align: "right", color: "FFAAAAAA" } }] }); return; }
    const pf = periodFigures(periods, p, 0);
    tot.gs += pf.grossSales; tot.ns += pf.netSales; tot.gp += pf.grossProfit; tot.ox += pf.opex; tot.op += pf.operatingProfit; tot.np += pf.netProfit;
    rows.push({ cells: [
      { v: mn, style: { bold: true } },
      { v: pf.grossSales, t: "n", style: { align: "left" } },
      { v: pf.netSales, t: "n", style: { align: "left" } },
      { v: pf.grossProfit, t: "n", style: { align: "left" } },
      { v: pf.grossMargin, t: "n", style: { align: "center" }, z: "0.00%" },
      { v: pf.opex, t: "n", style: { align: "left" } },
      { v: pf.operatingProfit, t: "n", style: { align: "left" } },
      { v: pf.netProfit, t: "n", style: { bg: pf.netProfit >= 0 ? "FFDDEEDD" : "FFF6DDDD", align: "left", bold: true } },
      { v: pf.netMargin, t: "n", style: { align: "center" }, z: "0.00%" },

  });
  rows.push({ cells: [
    { v: "الإجمالي", style: { bg: colorFor("header"), color: "FFFFFFFF", bold: true } },
    { v: tot.gs, t: "n", style: { bg: colorFor("header"), color: "FFFFFFFF", bold: true, align: "left" } },

    { v: tot.ox, t: "n", style: { bg: colorFor("header"), color: "FFFFFFFF", bold: true, align: "left" } },
    { v: tot.op, t: "n", style: { bg: colorFor("header"), color: "FFFFFFFF", bold: true, align: "left" } },
    { v: tot.np, t: "n", style: { bg: colorFor("header"), color: "FFFFFFFF", bold: true, align: "left" } },
    { v: tot.ns ? tot.np / tot.ns : 0, t: "n", style: { bg: colorFor("header"), color: "FFFFFFFF", bold: true, align: "center" }, z: "0.00%" },
  ] });
  rows.push({ cells: [] });
  // المؤشرات والنسب

    if (latest && latest.currentLiab) KR("نسبة السيولة (التداول)", latest.currentAssets / latest.currentLiab, "الأصول تغطي الالتزامات", false);
    if (zakatDue) KR("الزكاة المستحقة", zakatDue, "موزَّعة على الشركاء حسب حصصهم");
  }
  brandFooter(rows, 9);
  return buildSheet(rows, [22, 16, 16, 16, 12, 14, 16, 16, 12]);

function zakatSheetSpec(zakatData, companyName) {
  if (!zakatData || !zakatData.rows || !zakatData.items) return null;
  const f = computeFigures(zakatData.rows);
  const assetItems = zakatData.items.filter((i) => i.group === "asset");
  const liabilityItems = zakatData.items.filter((i) => i.group === "liability");
  const totalAssets = assetItems.reduce((s, i) => s + i.amount, 0);
  const totalLiab = liabilityItems.reduce((s, i) => s + i.amount, 0);
  const zakatBase = totalAssets - totalLiab;
  const days = zakatData.hawlStart && zakatData.hawlEnd ? Math.round((new Date(zakatData.hawlEnd) - new Date(zakatData.hawlStart)) / 86400000) : 354;
  const proration = Math.min(days / 354, 1) || 1;
  const rate = zakatData.rate ?? 2.5;
  const goldPrice = zakatData.goldPrice ?? 0;
  const nisab = goldPrice > 0 ? goldPrice * 85 : 0;
  const partnersRaw = zakatPartners(f);
  const totalEquity = partnersRaw.reduce((s, p) => s + p.amount, 0);

  const rows = [];
  brandRows(rows, 3);
  const HDR = (t) => rows.push({ cells: [{ v: t, style: { bg: colorFor("header"), color: "FFFFFFFF", bold: true, sz: 13, align: "center" } }, {}, {}], merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: 2 } } });
  const SEC = (t) => rows.push({ cells: [{ v: t, style: { bg: colorFor("gold"), color: "FFFFFFFF", bold: true } }, {}, {}], merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: 2 } } });
  const R = (i, l, v, note) => rows.push({ cells: [
    { v: i, style: { align: "center", color: "FF8A8271" } },
    { v: l, style: { wrap: true } },
    { v, t: typeof v === "number" ? "n" : "s", style: { align: "left", bold: false } },
  ] });
  const TOT = (l, v, green) => rows.push({ cells: [
    { v: l, style: { bg: green ? colorFor("profit") : colorFor("total"), bold: true, color: green ? "FFFFFFFF" : "FF132340" } },
    { v: "", style: { bg: green ? colorFor("profit") : colorFor("total") } },
    { v, t: "n", style: { bg: green ? colorFor("profit") : colorFor("total"), bold: true, align: "left", color: green ? "FFFFFFFF" : "FF132340" } },
  ], merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: 1 } } });

  HDR(`${companyName} — حساب زكاة المال`);
  HDR(`الحول: من ${zakatData.hawlStart || "—"} إلى ${zakatData.hawlEnd || "—"} (${days} يوم)`);
  rows.push({ cells: [
    { v: "سعر جرام الذهب عيار 24", style: { bold: true } },
    { v: "", style: {} },
    { v: goldPrice, t: "n", style: { align: "left", bold: true } },
  ], merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: 1 } } });
  rows.push({ cells: [
    { v: "النصاب الشرعي (85 جرام ذهب)", style: { bold: true, bg: colorFor("total") } },
    { v: "", style: { bg: colorFor("total") } },
    { v: nisab, t: "n", style: { align: "left", bold: true, bg: colorFor("total") } },
  ], merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: 1 } } });
  rows.push({ cells: [] });

  SEC("أ ▎ الأصول الزكوية");
  assetItems.forEach((it, i) => R(i + 1, it.label, it.amount));
  TOT("إجمالي الأصول الزكوية", totalAssets);
  SEC("ب ▎ الخصوم واجبة الخصم");
  liabilityItems.forEach((it, i) => R(i + 1, it.label, it.amount));
  TOT("إجمالي الخصوم واجبة الخصم", totalLiab);
  SEC("ج ▎ وعاء الزكاة");
  TOT("وعاء الزكاة الصافي (الأصول − الخصوم)", zakatBase);
  rows.push({ cells: [
    { v: "هل بلغ الوعاء النصاب؟", style: { bold: true } },
    { v: "", style: {} },
    { v: nisab > 0 ? (zakatBase >= nisab ? "نعم ✔" : "لا ✘") : "لم يُحدد سعر الذهب", style: { align: "left", bold: true } },
  ], merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: 1 } } });
  rows.push({ cells: [] });

  SEC("د ▎ زكاة كل شريك منفردة — النصاب يُقاس على حصة كل شريك");
  rows.push({ cells: [
    { v: "الشريك", style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true } },
    { v: "حصته من الوعاء", style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true, align: "left" } },
    { v: `الزكاة المستحقة (${rate}%)`, style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true, align: "left" } },
  ] });
  let totalDue = 0;
  partnersRaw.forEach((p) => {
    const pct = totalEquity ? p.amount / totalEquity : 0;
    const share = zakatBase * pct;
    const meets = nisab > 0 && share >= nisab;
    const due = meets ? share * (rate / 100) * proration : 0;
    totalDue += due;
    rows.push({ cells: [
      { v: `${p.name} (${(pct * 100).toFixed(2)}%)`, style: { wrap: true } },
      { v: share, t: "n", style: { align: "left" } },
      meets ? { v: due, t: "n", style: { align: "left", bold: true, bg: "FFDDEEDD" } }
            : { v: nisab > 0 ? "لم يبلغ النصاب" : "بانتظار سعر الذهب", t: "s", style: { align: "left", color: "FF9C3B34" } },
    ] });
  });
  TOT("إجمالي الزكاة المستحقة", totalDue, true);
  brandFooter(rows, 3);
  return buildSheet(rows, [34, 20, 20]);
}

function brandRows(rows, span) {
  // ترويسة العلامة التجارية أعلى كل ورقة (Excel لا يدعم صورة خلفية داخل الملف)
  rows.push({ cells: [{ v: "◆ SELIM FINANCE", style: { bg: colorFor("header"), color: "FFB8892B", bold: true, sz: 14, align: "center" } }].concat(new Array(Math.max(span - 1, 0)).fill({})), merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: span - 1 } } });
}

function brandFooter(rows, span) {
  rows.push({ cells: [] });
  rows.push({ cells: [{ v: "أُصدر بواسطة SELIM FINANCE — نظام القوائم المالية والزكاة", style: { color: "FF8A8271", sz: 9, align: "center" } }].concat(new Array(Math.max(span - 1, 0)).fill({})), merge: { s: { r: rows.length, c: 0 }, e: { r: rows.length, c: span - 1 } } });
}

  out.push({ cells: [{ v: `${companyName} — ميزان المراجعة (${periodLabel})`, style: { bg: colorFor("header"), color: "FFFFFFFF", bold: true, sz: 13, align: "center" } }, {}, {}, {}, {}], merge: { s: { r: out.length, c: 0 }, e: { r: out.length, c: 4 } } });
  out.push({ cells: [
    { v: "الكود", style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true } },
    { v: "اسم الحساب", style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true } },
    { v: "التصنيف", style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true } },
    { v: "مدين", style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true, align: "left" } },
    { v: "دائن", style: { bg: "FF2C3E57", color: "FFFFFFFF", bold: true, align: "left" } },
  ] });
  const catLabel = (v) => { const o = ALL_CATS.find((x) => x.v === v); return o ? o.label : (v || "—"); };
  const list = (rows || []).filter((r) => (r.debit || 0) !== 0 || (r.credit || 0) !== 0)
    .sort((a, b) => String(a.code || "").localeCompare(String(b.code || ""), undefined, { numeric: true }));

    td += r.debit || 0; tc += r.credit || 0;
    out.push({ cells: [
      { v: r.code || "", style: { color: "FF8A8271" } },
      { v: r.name, style: { wrap: true } },
      { v: catLabel(r.category), style: { color: "FF6B6455" } },
      { v: r.debit || 0, t: "n", style: { align: "left" } },
      { v: r.credit || 0, t: "n", style: { align: "left" } },
    ] });
  });
  out.push({ cells: [
    { v: "الإجمالي", style: { bg: colorFor("header"), color: "FFFFFFFF", bold: true } },
    { v: "", style: { bg: colorFor("header") } },
    { v: "", style: { bg: colorFor("header") } },
    { v: td, t: "n", style: { bg: colorFor("header"), color: "FFFFFFFF", bold: true, align: "left" } },
    { v: tc, t: "n", style: { bg: colorFor("header"), color: "FFFFFFFF", bold: true, align: "left" } },
  ] });
  brandFooter(out, 5);
  return buildSheet(out, [12, 40, 18, 16, 16]);
}

function exportWorkbook({ company, periods, companyName, monthlyList, annual, periodLabel, balanceF, balanceLabel, latest, year, zakatDue, zakatData, partners, which }) {
  const wb = XLSX.utils.book_new();
  const clip = (s) => s.substring(0, 28).replace(/[\\/?*\[\]:]/g, "");
  if (which.includes("home")) {
    XLSX.utils.book_append_sheet(wb, homeSheetSpec(company, periods, year, annual, latest, zakatDue), clip("الصفحة الرئيسية"));
  }
  if (which.includes("income_monthly") && monthlyList && monthlyList.length) {
    monthlyList.forEach((m) => {
      XLSX.utils.book_append_sheet(wb, incomeSheetSpec(m.f, companyName, "قائمة الدخل الشهرية", m.label, null), clip("دخل " + m.label));
    });
  }
  if (which.includes("income_annual") && annual) {
    XLSX.utils.book_append_sheet(wb, incomeSheetSpec(annual, companyName, "قائمة الدخل السنوية", periodLabel, partners), clip("الدخل السنوي"));
  }
  if (which.includes("balance") && balanceF) {
    XLSX.utils.book_append_sheet(wb, balanceSheetSpec(balanceF, companyName, balanceLabel), clip("المركز المالي"));
  }
  if (which.includes("trial") && monthlyList && monthlyList.length) {
    monthlyList.forEach((m) => {
      if (m.rows) XLSX.utils.book_append_sheet(wb, trialSheetSpec(m.rows, companyName, m.label), clip("ميزان " + m.label));
    });
  }
  if (which.includes("zakat") && zakatData) {
    const zs = zakatSheetSpec(zakatData, companyName);
    if (zs) XLSX.utils.book_append_sheet(wb, zs, clip("الزكاة"));
  }
  if (!wb.SheetNames.length) throw new Error("لم يتم اختيار أي قائمة متاحة");
  XLSX.writeFile(wb, `${companyName} - القوائم المالية.xlsx`);
}

async function exportStatementPdf({ targetId, fileName, companyName, title }) {
  const el = document.getElementById(targetId);
  if (!el) { alert("لا توجد قائمة معروضة لتصديرها. افتح القائمة المطلوبة أولاً."); return; }
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js");
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
  el.classList.add("export-wide");
  try {
    await new Promise((r) => setTimeout(r, 80));
    const canvas = await window.html2canvas(el, { scale: 2, backgroundColor: "#FFFFFF", useCORS: true });
    const jsPDF = window.jspdf.jsPDF;
    const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 7;
    const usableW = pageW - margin * 2;
    const contHeaderMm = 9; // ارتفاع ترويسة "تابع" في الصفحات التالية

    // نملأ عرض الصفحة دائماً
    const mmPerPx = usableW / canvas.width;
    const firstPageH = pageH - margin * 2;
    const nextPageH = pageH - margin * 2 - contHeaderMm;

    // ترويسة "تابع" تُرسم كصورة لأن خطوط jsPDF المدمجة لا تدعم العربية
    let contImg = null;
    const buildContHeader = async () => {
      const box = document.createElement("div");
      box.style.cssText = `position:fixed;top:-9999px;right:0;width:860px;background:${INK};color:#fff;padding:9px 14px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:15px;font-weight:600;text-align:center;direction:rtl;`;
      box.textContent = `${title || fileName || "تقرير"} — تابع`;
      document.body.appendChild(box);
      try {
        const c = await window.html2canvas(box, { scale: 2, backgroundColor: INK });
        contImg = c.toDataURL("image/png");
      } finally { box.remove(); }
    };
    await buildContHeader();

    const drawContHeader = () => {
      if (contImg) pdf.addImage(contImg, "PNG", margin, margin, usableW, contHeaderMm - 1.5);
    };

    let rendered = 0;
    let pageNo = 1;
    while (rendered < canvas.height) {
      const availMm = pageNo === 1 ? firstPageH : nextPageH;
      let slicePx = Math.floor(availMm / mmPerPx);
      slicePx = Math.min(slicePx, canvas.height - rendered);

      // اقطع عند أقرب سطر فاصل فاتح لتفادي قص الصفوف
      if (rendered + slicePx < canvas.height) {
        const ctx = canvas.getContext("2d");
        let best = slicePx;
        for (let y = slicePx; y > slicePx * 0.55; y--) {
          const row = ctx.getImageData(0, rendered + y, canvas.width, 1).data;
          let light = true;
          for (let i = 0; i < row.length; i += 4 * 6) {
            if (row[i] < 232 || row[i + 1] < 228 || row[i + 2] < 220) { light = false; break; }
          }
          if (light) { best = y; break; }
        }
        slicePx = best;
      }

      const slice = document.createElement("canvas");
      slice.width = canvas.width; slice.height = slicePx;
      slice.getContext("2d").drawImage(canvas, 0, rendered, canvas.width, slicePx, 0, 0, canvas.width, slicePx);

      if (pageNo > 1) { pdf.addPage(); drawContHeader(); }
      const y = pageNo === 1 ? margin : margin + contHeaderMm;
      pdf.addImage(slice.toDataURL("image/png"), "PNG", margin, y, usableW, slicePx * mmPerPx);

      rendered += slicePx;
      pageNo += 1;
      if (pageNo > 40) break;
    }
    pdf.save(`${fileName || "تقرير"}.pdf`);
  } finally {
    el.classList.remove("export-wide");
  }
}

function ExportBtns({ companyName, exportData, availableMonths, pdfTarget, pdfName }) {
  const [open, setOpen] = useState(false);
  const [busyPdf, setBusyPdf] = useState(false);
  const [sel, setSel] = useState({ home: true, income_monthly: true, income_annual: true, balance: true, trial: false, zakat: true });
  const [monthSel, setMonthSel] = useState("all");
  const toggle = (k) => setSel({ ...sel, [k]: !sel[k] });
  const opts = [
    { k: "home", l: "الصفحة الرئيسية (لوحة القيادة)" },
    { k: "income_monthly", l: "قائمة الدخل الشهرية" },
    { k: "income_annual", l: "قائمة الدخل السنوية" },
    { k: "balance", l: "المركز المالي" },
    { k: "trial", l: "ميزان المراجعة" },
    { k: "zakat", l: "حساب الزكاة" },
  ];
  if (!exportData) return null;
  const doExport = () => {
    const which = Object.keys(sel).filter((k) => sel[k]);
    if (!which.length) { alert("اختر قائمة واحدة على الأقل"); return; }
    try { exportData(which, monthSel); setOpen(false); }
    catch (e) { alert("تعذّر التصدير: " + e.message); }
  };
  const doPdf = async () => {
    setBusyPdf(true);
    try { await exportStatementPdf({ targetId: pdfTarget, fileName: pdfName, companyName, title: `${companyName} — ${pdfName}` }); }
    catch (e) { alert("تعذّر تصدير PDF: " + e.message); }
    setBusyPdf(false);
  };
  return (
    <div style={{ position: "relative", display: "flex", gap: 8, flexWrap: "wrap" }}>
      <GhostBtn icon={FileSpreadsheet} onClick={() => setOpen(!open)}>تصدير Excel</GhostBtn>
      {pdfTarget && <GhostBtn icon={ScrollText} onClick={doPdf}>{busyPdf ? "جارِ…" : "تصدير PDF"}</GhostBtn>}
      {open && (
        <>
          <div onClick={() => setOpen(false)} style={{ position: "fixed", inset: 0, zIndex: 40, background: "rgba(0,0,0,0.25)" }} />
          <div style={{ position: "fixed", top: "50%", left: "50%", transform: "translate(-50%,-50%)", zIndex: 50, background: "#fff", border: `1px solid ${RULE}`, borderRadius: 12, padding: 18, boxShadow: "0 12px 32px rgba(0,0,0,0.25)", width: "min(320px, 90vw)", maxHeight: "80vh", overflowY: "auto" }}>
            <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 12, color: INK }}>اختر القوائم للتصدير:</div>
            {opts.map((o) => (
              <label key={o.k} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 0", cursor: "pointer", fontSize: 13.5, borderBottom: `1px solid ${RULE}` }}>
                <input type="checkbox" checked={!!sel[o.k]} onChange={() => toggle(o.k)} style={{ width: 17, height: 17 }} />
                {o.l}
              </label>
            ))}
            {sel.income_monthly && availableMonths && availableMonths.length > 0 && (
              <div style={{ marginTop: 12 }}>
                <label style={{ fontSize: 12.5, color: "#6b6455", fontWeight: 600, display: "block", marginBottom: 6 }}>شهر قائمة الدخل الشهرية:</label>
                <Select value={monthSel} onChange={(e) => setMonthSel(e.target.value)} style={{ width: "100%" }}>
                  <option value="all">كل الشهور (كل شهر في Sheet)</option>
                  {availableMonths.map((m) => (<option key={m.id} value={m.id}>{m.label}</option>))}
                </Select>
              </div>
            )}
            <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
              <PrimaryBtn icon={Check} onClick={doExport} style={{ flex: 1 }}>تصدير</PrimaryBtn>
              <GhostBtn onClick={() => setOpen(false)}>إلغاء</GhostBtn>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

function PrintBtn({ targetId, fileName, companyName, exportData }) {
  return <ExportBtns targetId={targetId} fileName={fileName} companyName={companyName} exportData={exportData} />;
}


function StmtTable({ children }) {
  return <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.3 }}><tbody>{children}</tbody></table>;
}
function SectionRow({ text }) {
  return (
    <tr>
      <td colSpan={3} style={{ padding: "12px 6px 5px", fontWeight: 700, color: GOLD, borderBottom: `2px solid ${GOLD}`, fontSize: 14 }}>
        ▌ {text}
      </td>
    </tr>
  );
}
function ItemRow({ idx, label, partial }) {
  return (
    <tr style={{ borderBottom: `1px solid ${RULE}` }}>
      <td style={{ padding: "6px 6px", width: 22, color: "#8a8271", fontSize: 11, verticalAlign: "top" }}>{idx || ""}</td>
      <td style={{ padding: "6px 6px", fontSize: 13, lineHeight: 1.5 }}>{label}</td>
      <td style={{ padding: "6px 6px", textAlign: "left", direction: "ltr", width: 120, color: "#6b6455", fontSize: 12.5, whiteSpace: "nowrap", verticalAlign: "top" }}>{partial ? fmt(partial) : ""}</td>
    </tr>
  );
}
function TotalRow({ label, total, mark }) {
  return (
    <tr style={{ borderTop: `2px solid ${INK}`, borderBottom: `1px solid ${RULE}`, background: mark ? "#f4efe2" : "transparent" }}>
      <td colSpan={2} style={{ padding: "8px 6px", fontWeight: 700, fontSize: 13.5 }}>{mark ? `◆ ${label}` : label}</td>
      <td style={{ padding: "8px 6px", textAlign: "left", direction: "ltr", fontWeight: 700, fontSize: 13.5, whiteSpace: "nowrap", color: total < 0 ? RED_INK : INK }}>{fmt(total)}</td>
    </tr>
  );
}
function RatioRow({ label, value }) {
  return (
    <tr>
      <td colSpan={2} style={{ padding: "4px 6px", fontSize: 11.5, color: "#8a8271", fontStyle: "italic" }}>{label}</td>
      <td style={{ padding: "4px 6px", textAlign: "left", direction: "ltr", fontSize: 11.5, color: "#8a8271", whiteSpace: "nowrap" }}>{(value * 100).toFixed(2)}%</td>
    </tr>
  );
}

function DetailedIncomeStatement({ f, title, periodLabel, sourceLabel, companyName, partners }) {
  const printId = "print-income";
  const ns = f.netSales || 1;
  const pct = (v) => `${((v / ns) * 100).toFixed(2)}%`;
  const XSection = ({ text }) => (
    <tr style={{ background: "#eaeef2" }}>
      <td colSpan={4} style={{ padding: "7px 10px", fontWeight: 700, color: INK, fontSize: 13.5, borderBottom: `1px solid ${INK}` }}>▐ {text}</td>
    </tr>
  );
  const XItem = ({ idx, label, val, showPct }) => (
    <tr style={{ borderBottom: "1px solid #e6e1d4" }}>
      <td style={{ padding: "6px 8px", width: 24, color: "#8a8271", fontSize: 11, textAlign: "center" }}>{idx || ""}</td>
      <td style={{ padding: "6px 8px", fontSize: 12.5 }}>{label}</td>
      <td style={{ padding: "6px 8px", textAlign: "left", direction: "ltr", fontSize: 12.5, whiteSpace: "nowrap", color: val < 0 ? RED_INK : INK }}>{fmt(val)}</td>
      <td style={{ padding: "6px 8px", textAlign: "left", direction: "ltr", fontSize: 11, color: "#8a8271", whiteSpace: "nowrap", width: 70 }}>{showPct ? pct(val) : ""}</td>
    </tr>
  );
  const XTotal = ({ label, val, color, dark }) => (
    <tr style={{ background: color || "#f4efe2", borderTop: `2px solid ${INK}`, borderBottom: `1px solid ${INK}` }}>
      <td colSpan={2} style={{ padding: "8px 10px", fontWeight: 700, fontSize: 13.5, color: dark ? "#fff" : INK }}>{label}</td>
      <td style={{ padding: "8px 10px", textAlign: "left", direction: "ltr", fontWeight: 700, fontSize: 13.5, whiteSpace: "nowrap", color: dark ? "#fff" : (val < 0 ? RED_INK : INK) }}>{fmt(val)}</td>
      <td style={{ padding: "8px 10px", textAlign: "left", direction: "ltr", fontSize: 11, whiteSpace: "nowrap", color: dark ? "#fff" : "#6b6455" }}>{pct(val)}</td>
    </tr>
  );
  return (
    <div style={{ maxWidth: 900 }}>
      {/* التصدير موحّد أعلى القوائم */}
      {f.openingWarning && (
        <Card style={{ padding: 12, marginBottom: 10, background: "#faeceb", borderColor: RED_INK }}>
          <div style={{ display: "flex", gap: 8, fontSize: 12.5, color: RED_INK, fontWeight: 600 }}>
            <AlertTriangle size={15} /> <span>{f.openingWarning}</span>
          </div>
        </Card>
      )}
      <Card style={{ padding: 0, maxWidth: 900, background: "#fff", overflow: "hidden" }}>
        <div id={printId} className="print-area" style={{ background: "#fff", position: "relative" }}>
          <div className="stmt-watermark" />
          <div style={{ background: INK, color: "#fff", textAlign: "center", padding: "14px 10px" }}>
            <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 22, fontWeight: 700 }}>{companyName}</div>
            <div style={{ fontSize: 14, marginTop: 2 }}>{title}</div>
            <div style={{ fontSize: 10.5, opacity: 0.8, marginTop: 3 }}>{periodLabel}{sourceLabel ? " — " + sourceLabel : ""}</div>
          </div>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: "#2c3e57", color: "#fff", fontSize: 11.5 }}>
                <th style={{ padding: "6px 8px", width: 24 }}>م</th>
                <th style={{ padding: "6px 8px", textAlign: "right" }}>البيان</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>القيمة ج.م</th>
                <th style={{ padding: "6px 8px", textAlign: "left", width: 70 }}>نسبة</th>
              </tr>
            </thead>
            <tbody>
              <XSection text="الإيرادات" />
              <XItem idx={1} label="إجمالي المبيعات" val={f.grossSales} showPct />
              <XItem idx={2} label="مردودات المبيعات" val={f.salesReturns} showPct />
              <XItem idx={3} label="خصومات مسموح بها" val={f.salesDiscounts} showPct />
              <XTotal label="صافي المبيعات" val={f.netSales} />

              <XSection text="تكلفة البضاعة المباعة" />
              <XItem label="مخزون بداية الفترة" val={f.openInv} />
              <XItem label="(+) صافي المشتريات" val={f.purchases} />
              <XItem label="(−) مخزون آخر المدة" val={-f.closingInventory} />
              <XTotal label="إجمالي تكلفة البضاعة المباعة" val={f.cogs} />
              <XTotal label="◆ إجمالي الربح" val={f.grossProfit} dark color={GREEN_INK} />

              <XSection text="المصروفات التشغيلية" />
              {f.opexRows.map((r, i) => (<XItem key={i} idx={i + 1} label={r.name} val={r.amount} showPct />))}
              <XTotal label="إجمالي المصروفات" val={f.opex} />
              <XTotal label="◆ صافي الربح التشغيلي" val={f.operatingProfit} dark color={GREEN_INK} />

              {f.otherIncomeRows.length > 0 && <XSection text="الإيرادات الأخرى" />}
              {f.otherIncomeRows.map((r, i) => (<XItem key={i} idx={i + 1} label={r.name} val={r.amount} />))}
              {f.otherIncomeRows.length > 0 && <XTotal label="إجمالي الإيرادات الأخرى" val={f.otherIncome} />}
              {f.otherExpense > 0 && <XItem label="مصروفات أخرى" val={f.otherExpense} />}
              {f.tax > 0 && <XItem label="مصاريف الضرائب" val={f.tax} />}
              <XTotal label="◆ صافي الربح النهائي" val={f.netProfit} dark color={GREEN_INK} />

              {partners && partners.length > 0 && (
                <>
                  <XSection text="توزيع الأرباح على الشركاء" />
                  {partners.map((p, i) => (
                    <tr key={i} style={{ borderBottom: "1px solid #e6e1d4" }}>
                      <td style={{ padding: "6px 8px", textAlign: "center", color: "#8a8271", fontSize: 11 }}>{i + 1}</td>
                      <td style={{ padding: "6px 8px", fontSize: 12.5 }}>{p.name} ({(p.pct * 100).toFixed(2)}%)</td>
                      <td style={{ padding: "6px 8px", textAlign: "left", direction: "ltr", fontSize: 12.5, whiteSpace: "nowrap" }}>{fmt(f.netProfit * p.pct)}</td>
                      <td></td>
                    </tr>
                  ))}
                </>
              )}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

function BalanceSheet({ f, periodLabel, companyName, onReclassify, readOnly }) {
  const printId = "print-balance";
  const bg = f.balanceGroups;
  const [editing, setEditing] = useState(null);
  const GROUPS = [
    { k: "cash", l: "النقدية والخزائن" },
    { k: "receivables", l: "الأرصدة المدينة (عملاء/موردين)" },
    { k: "debtors", l: "المدينون" },
    { k: "inventory", l: "المخزون" },
    { k: "noncurrent", l: "الأصول الثابتة" },
    { k: "creditors", l: "الخصوم المتداولة" },
    { k: "equity", l: "حقوق الملكية" },
    { k: "ignore", l: "استبعاد من القوائم" },
  ];
  const AGG = ["ذمم العملاء المدينة", "دفعات مقدمة للموردين", "موردون (أرصدة دائنة", "دفعات مقدمة من العملاء", "صافي الأصول الثابتة"];
  const isAggregate = (n) => AGG.some((a) => n.indexOf(a) === 0);
  const SubGroup = ({ title, rows, total }) => (
    <>
      <tr><td colSpan={3} style={{ padding: "10px 6px 4px", fontWeight: 700, color: INK, fontSize: 13.5 }}>{title}</td></tr>
      {rows.map((r, i) => (
        <tr key={i} style={{ borderBottom: `1px solid ${RULE}` }}>
          <td style={{ padding: "6px 6px", width: 34, color: "#8a8271", fontSize: 11, verticalAlign: "top", whiteSpace: "nowrap" }}>
            {i + 1}
            {!readOnly && onReclassify && !isAggregate(r.name) && (
              <button onClick={() => setEditing(r.name)} title="تعديل تصنيف الحساب" className="no-print"
                style={{ background: "none", border: "none", cursor: "pointer", color: GOLD, padding: 0, marginRight: 3 }}>
                <Pencil size={11} />
              </button>
            )}
          </td>
          <td style={{ padding: "6px 6px", fontSize: 13, lineHeight: 1.5 }}>{r.name}</td>
          <td style={{ padding: "6px 6px", textAlign: "left", direction: "ltr", width: 120, color: "#6b6455", fontSize: 12.5, whiteSpace: "nowrap", verticalAlign: "top" }}>{fmt(r.amount)}</td>
        </tr>
      ))}
      <tr style={{ borderBottom: `1px solid ${RULE}` }}>
        <td colSpan={2} style={{ padding: "6px 6px", fontWeight: 600, color: "#6b6455", fontSize: 12.5 }}>{`إجمالي ${title.replace(/^[أ-ي]+ً?:\s*/, "")}`}</td>
        <td style={{ padding: "6px 6px", textAlign: "left", direction: "ltr", fontWeight: 600, color: "#6b6455", whiteSpace: "nowrap" }}>{fmt(total)}</td>
      </tr>
    </>
  );
  return (
    <div style={{ maxWidth: 900 }}>
      {editing && (
        <>
          <div onClick={() => setEditing(null)} style={{ position: "fixed", inset: 0, zIndex: 60, background: "rgba(0,0,0,0.3)" }} />
          <div style={{ position: "fixed", top: "50%", left: "50%", transform: "translate(-50%,-50%)", zIndex: 61, background: "#fff", border: `1px solid ${RULE}`, borderRadius: 12, padding: 18, boxShadow: "0 12px 32px rgba(0,0,0,0.28)", width: "min(340px, 92vw)" }}>
            <div style={{ fontWeight: 700, fontSize: 13.5, color: INK, marginBottom: 4 }}>نقل الحساب إلى:</div>
            <div style={{ fontSize: 12, color: "#8a8271", marginBottom: 12 }}>{editing}</div>
            {GROUPS.map((g) => (
              <button key={g.k} onClick={() => { onReclassify(editing, g.k); setEditing(null); }}
                style={{ display: "block", width: "100%", textAlign: "right", background: "#fff", border: `1px solid ${RULE}`, borderRadius: 8, padding: "10px 12px", marginBottom: 6, fontSize: 13, cursor: "pointer", fontFamily: "'IBM Plex Sans Arabic', sans-serif", color: g.k === "ignore" ? RED_INK : INK }}>
                {g.l}
              </button>
            ))}
            <GhostBtn onClick={() => setEditing(null)} style={{ width: "100%", marginTop: 6 }}>إلغاء</GhostBtn>
          </div>
        </>
      )}
      {/* التصدير موحّد أعلى القوائم */}
      <StatementCard title="قائمة المركز المالي" subtitle={periodLabel} wide printId={printId}>
        <StmtTable>
          <SectionRow text="◈ الأصول" />
          <SubGroup title={bg.cash.title} rows={bg.cash.rows} total={bg.cash.total} />
          <SubGroup title={bg.receivables.title} rows={bg.receivables.rows} total={bg.receivables.total} />
          <SubGroup title={bg.debtors.title} rows={bg.debtors.rows} total={bg.debtors.total} />
          <SubGroup title={bg.inventory.title} rows={bg.inventory.rows} total={bg.inventory.total} />
          <TotalRow label="إجمالي الأصول المتداولة" total={f.currentAssets} />
          {bg.noncurrent.rows.length > 0 && <SubGroup title={bg.noncurrent.title} rows={bg.noncurrent.rows} total={bg.noncurrent.total} />}
          <TotalRow label="◈ إجمالي الأصول" total={f.totalAssets} mark />

          <SectionRow text="◈ الخصوم وحقوق الملكية" />
          <SubGroup title="أولاً: الخصوم المتداولة" rows={bg.creditors.rows} total={bg.creditors.total} />
          {f.liabilityNoncurrentRows.length > 0 && <SubGroup title="ثانياً: الخصوم غير المتداولة" rows={f.liabilityNoncurrentRows} total={f.nonCurrentLiab} />}
          <TotalRow label="إجمالي الخصوم" total={f.totalLiab} />
          {(() => {
            const eq = f.equityAccountRows || [];
            const isDrawing = (n) => /جاري|مسحوب|سحب|مدفوعات/.test(n);
            const isRetained = (n) => /محتجز|مرحل|مرحّل|أرباح سابقة|ارباح سابقة/.test(n);
            const capital = eq.filter((r) => !isDrawing(r.name) && !isRetained(r.name));
            const retained = eq.filter((r) => isRetained(r.name));
            const drawings = eq.filter((r) => isDrawing(r.name));
            const sum = (a) => a.reduce((s, r) => s + r.amount, 0);
            const diff = f.balanceDiff || 0;
            const withinTolerance = Math.abs(diff) <= 100;
            const settle = withinTolerance ? diff : 0;
            return (
              <>
                <SubGroup title="أولاً: رأس المال" rows={capital} total={sum(capital)} />
                <SubGroup title="ثانياً: الأرباح المحتجزة" rows={retained.length ? retained : [{ name: "أرباح محتجزة من سنوات سابقة", amount: 0 }]} total={sum(retained)} />
                <tr><td colSpan={3} style={{ padding: "10px 6px 4px", fontWeight: 700, color: INK, fontSize: 13.5 }}>ثالثاً: مسحوبات ومدفوعات الشركاء</td></tr>
                {drawings.length ? drawings.map((r, i) => (
                  <ItemRow key={i} idx={i + 1} label={`جاري الشركاء — ${r.name}`} partial={r.amount} />
                )) : <ItemRow label="جاري الشركاء" partial={0} />}
                <tr style={{ borderBottom: `1px solid ${RULE}` }}>
                  <td colSpan={2} style={{ padding: "6px 6px", fontWeight: 600, color: "#6b6455", fontSize: 12.5 }}>إجمالي جاري الشركاء</td>
                  <td style={{ padding: "6px 6px", textAlign: "left", direction: "ltr", fontWeight: 600, color: "#6b6455", whiteSpace: "nowrap" }}>{fmt(sum(drawings))}</td>
                </tr>
                <ItemRow label="أرباح الفترة الجارية (من بداية السنة)" partial={f.netProfit} />
                {withinTolerance && Math.abs(diff) >= 0.01 && (
                  <ItemRow label="تسوية أرصدة افتتاحية مُرحّلة من النظام" partial={settle} />
                )}
                <TotalRow label="إجمالي حقوق الملكية" total={f.totalEquity + settle} />
                <TotalRow label="◈ إجمالي الخصوم وحقوق الملكية" total={f.totalLiab + f.totalEquity + settle} mark />
              </>
            );
          })()}
        </StmtTable>
        {(() => {
          const diff = f.balanceDiff || 0;
          if (Math.abs(diff) <= 100) {
            return (
              <div style={{ marginTop: 18, textAlign: "center", padding: "10px 0", borderRadius: 8, background: "#eaf3ec", color: GREEN_INK, fontSize: 13, fontWeight: 700 }}>
                ✔ فرق الميزانية = صفر (الأصول = الخصوم + حقوق الملكية)
              </div>
            );
          }
          return (
            <div style={{ marginTop: 18, padding: "12px 14px", borderRadius: 8, background: "#faeceb", color: RED_INK, fontSize: 12.5, fontWeight: 600, lineHeight: 1.8 }}>
              ⚠ فرق الميزانية {fmt(diff)} — أكبر من حد التسوية المسموح (100 ج.م) فلن يُدرج كبند تسوية.
              <div style={{ fontWeight: 400, fontSize: 11.5, marginTop: 6 }}>
                راجع الأسباب المحتملة: حساب غير مصنّف أو مصنّف في القسم الخطأ، أو حساب ناقص من الميزان، أو رصيد افتتاحي غير مُرحّل. استخدم أيقونة ✏️ لتعديل تصنيف الحسابات.
              </div>
            </div>
          );
        })()}
      </StatementCard>
    </div>
  );
}

function EquityStatement({ rows, f, opening, setOpening, periodLabel, readOnly }) {
  const equityRows = rows.filter((r) => r.category === "equity");
  const closingOf = (r) => f.val(r);
  const totalOpening = equityRows.reduce((s, r) => s + (opening[r.id] || 0), 0);
  const totalClosing = equityRows.reduce((s, r) => s + closingOf(r), 0);

  return (
    <Card style={{ padding: 26, maxWidth: 780 }}>
      <div id="print-equity" className="print-area" style={{ position: "relative" }}>
      <div className="stmt-watermark" />
      <div style={{ textAlign: "center", marginBottom: 18, borderBottom: `2px solid ${INK}`, paddingBottom: 14 }}>
        <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 24, fontWeight: 700, color: INK }}>قائمة التغير في حقوق الملكية</div>
        <div style={{ fontSize: 12.5, color: "#847c69", marginTop: 4 }}>{periodLabel}</div>
      </div>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5 }}>
        <thead>
          <tr style={{ borderBottom: `2px solid ${RULE}` }}>
            <th style={{ textAlign: "right", padding: "6px 4px" }}>البند</th>

function PerformanceSummary({ f, periodLabel, companyName, monthCount, zakatDue }) {

  const rows = [
    { l: "متوسط المبيعات الشهري", v: fmt(f.netSales / n), note: "حجم نشاط الشهر الواحد" },

    { l: "العائد على الأصول ROA", v: f.totalAssets ? `${((f.netProfit / f.totalAssets) * 100).toFixed(2)}%` : "—", note: "كفاءة استخدام الأصول في توليد الربح" },
