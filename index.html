const ALL_CATS = CATEGORY_GROUPS.flatMap((g) => g.options);
const DEBIT_NATURE = new Set(["asset_current", "asset_noncurrent", "sales_returns", "sales_discounts", "purchases", "opex", "other_expense", "tax"]);

function guessCategory(name = "", code = "", context = "") {
  const n = `${name} ${context}`;
  const rules = [
    [/مردودات المبيعات|مردودات مبيعات/, "sales_returns"],
    [/خصم.*مبيعات|خصومات مسموح/, "sales_discounts"],
    [/نقد|بنك|صندوق|عملاء|مدين|مخزون|بضاعة|أوراق قبض|سلف|عهد/, "asset_current"],
    [/أصول ثابتة|عقار|آلات|أثاث|سيارات|مجمع إهلاك|مجمع اهلاك|استثمار.*طويل|شهرة/, "asset_noncurrent"],
    [/موردين|دائن|مصروفات مستحقة|أوراق دفع|ضريبة مستحقة|قرض قصير/, "liability_current"],
    [/قرض طويل|قروض طويلة|التزام طويل|مخصص.*طويل/, "liability_noncurrent"],
    [/رأس المال|احتياطي|أرباح مرحلة|أرباح محتجزة|جاري الشريك|حقوق الملكية|شركاء/, "equity"],
    [/مشتريات/, "purchases"],
    [/مبيعات|إيراد التشغيل|إيرادات النشاط/, "revenue"],
    [/تكلفة المبيعات|تكلفة البضاعة/, "purchases"],
    [/مصروف|رواتب|مرتبات|إيجار|ايجار|إهلاك|اهلاك|دعاية|صيانة|كهرباء|قرطاسية|عمولات البيع|عمولات علي المبيعات|نقل وشحن|م\/ نقل|تليفون|بوفيه|نظافه|زكاه وبر|حوافز/, "opex"],
    [/إيراد آخر|إيرادات أخرى|أرباح بيع أصل|ايراد بيع أصول|إيرادات متنوعه|خصم مكتسب/, "other_income"],
    [/مصروف آخر|مصروفات أخرى|خسارة/, "other_expense"],
    [/ضريبة الدخل|ضريبة دخل/, "tax"],
    [/الأصول/, "asset_current"],
    [/الخصوم/, "liability_current"],
  ];
  for (const [re, cat] of rules) if (re.test(n)) return cat;
  const c = String(code).trim();
  const first = c[0];
  if (first === "1") return "asset_current";
  if (first === "2") return "liability_current";
  if (first === "3") return "equity";
  if (first === "4") return "revenue";
  if (first === "5") return "opex";
  return "asset_current";
}

const fmt = (n) => {
  if (n === null || n === undefined || isNaN(n)) return "—";
  const abs = Math.abs(n);
  const s = abs.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return n < 0 ? `(${s})` : s;
};
const uid = () => Math.random().toString(36).slice(2, 10);

/* ---------------------------------- تحليل ملف الإكسل ---------------------------------- */
/* الصيغة (أ): جدول بسيط أعمدة كود/اسم/مدين/دائن
   الصيغة (ب): تصدير من نظام ERP — شجرة حسابات هرمية بأكواد مفصولة "/" وأعمدة
   "رقم الحساب" / "اسم الحساب" / "رصيد بداية" / "صافي الحركة" / "رصيد نهاية"
   حيث القيمة قد تنتهي بحرف "م" (دائن) أو "د" (مدين). */

function detectFlatColumns(rows) {
  for (let r = 0; r < Math.min(rows.length, 8); r++) {
    const row = rows[r].map((c) => String(c ?? ""));
    let code = -1, name = -1, debit = -1, credit = -1;
    row.forEach((cell, i) => {
      if (code === -1 && /كود|رقم/.test(cell)) code = i;
      if (name === -1 && /اسم|بيان/.test(cell)) name = i;
      if (debit === -1 && /مدين/.test(cell)) debit = i;
      if (credit === -1 && /دائن/.test(cell)) credit = i;
    });
    if (name !== -1 && (debit !== -1 || credit !== -1)) return { headerRow: r, code, name, debit, credit };
  }
  return null;
}

function detectTreeColumns(rows) {
  for (let r = 0; r < Math.min(rows.length, 40); r++) {
    const row = rows[r].map((c) => String(c ?? ""));
    let code = -1, name = -1, ending = -1, netDebit = -1, netCredit = -1;
    row.forEach((cell, i) => {
      if (name === -1 && /اسم الحساب/.test(cell)) name = i;
      if (code === -1 && /رقم الحساب/.test(cell)) code = i;
      if (ending === -1 && /رصيد نهاية/.test(cell)) ending = i;
      if (netDebit === -1 && /صافي الحركة/.test(cell) && /مدين/.test(cell)) netDebit = i;
      if (netCredit === -1 && /صافي الحركة/.test(cell) && /دائن/.test(cell)) netCredit = i;
    });
    if (name !== -1 && ending !== -1) return { headerRow: r, code, name, ending, netDebit, netCredit };
  }
  return null;
}

function parseAmountCell(raw) {
  if (raw === null || raw === undefined || raw === "") return { value: 0, nature: null };
  let s = String(raw).trim();
  let nature = null;
  const last = s.slice(-1);
  if (last === "م" || last === "د") {
    nature = last === "م" ? "debit" : "credit";
    s = s.slice(0, -1).trim();
  }
  s = s.replace(/,/g, "");
  const value = parseFloat(s);
  if (isNaN(value)) return { value: 0, nature: null };
  if (nature) return { value: Math.abs(value), nature };
  if (value !== 0) return { value: Math.abs(value), nature: value < 0 ? "credit" : "debit" };
  return { value: 0, nature: null };
}

function cleanAccName(raw) {
  return String(raw ?? "").replace(/^\[/, "").replace(/\]$/, "").replace(/-+\s*$/, "").trim();
}

function buildTreeRows(rawRows, h) {
  const all = [];
  for (let r = h.headerRow + 1; r < rawRows.length; r++) {
    const row = rawRows[r];
    if (!row) continue;
    const nameRaw = h.name >= 0 ? row[h.name] : "";
    if (nameRaw === undefined || nameRaw === "") continue;
    let code = String((h.code >= 0 ? row[h.code] : "") ?? "").trim();
    const rawNameStr = String(nameRaw);
    const dashMatch = rawNameStr.match(/-+\s*$/);
    const dashDepth = dashMatch ? dashMatch[0].replace(/\s/g, "").length : 0;
    const name = cleanAccName(nameRaw);
    const { value, nature } = parseAmountCell(row[h.ending]);
    let netDebit = 0, netCredit = 0;
    if (h.netDebit >= 0) netDebit = parseFloat(String(row[h.netDebit]).replace(/,/g, "")) || 0;
    if (h.netCredit >= 0) netCredit = parseFloat(String(row[h.netCredit]).replace(/,/g, "")) || 0;
    all.push({ code, name, dashDepth, value, nature, netDebit, netCredit });
  }
  const hasCode = all.some((a) => a.code);
  const rows = [];

  if (hasCode) {
    // صيغة بها كود حساب هرمي بفواصل "/" — المستوى الأخير (بدون أبناء) هو الحساب التفصيلي
    all.forEach((a) => { if (/^\d$/.test(a.code)) a.code = "0" + a.code; });
    const nameByCode = {};
    all.forEach((a) => { if (a.code) nameByCode[a.code] = a.name; });
    const isLeaf = (code) => !all.some((a) => a.code !== code && a.code.startsWith(code + "/"));
    all.forEach((a) => {
      if (!a.value || !a.code) return;
      if (!isLeaf(a.code)) return;
      const parts = a.code.split("/");
      const chain = [];
      for (let i = parts.length - 1; i >= 1; i--) {
        const anc = parts.slice(0, i).join("/");
        if (nameByCode[anc]) chain.push(nameByCode[anc]);
      }
      const category = guessCategory(a.name, a.code, chain.join(" "));
      let debit = 0, credit = 0;
      if (a.nature === "debit") debit = a.value;
      else if (a.nature === "credit") credit = a.value;
      else if (DEBIT_NATURE.has(category)) debit = a.value;
      else credit = a.value;
      rows.push({ id: uid(), code: a.code, name: a.name, debit, credit, category });
    });
  } else {
    // صيغة بدون كود حساب — عمق التداخل يُقرأ من عدد الشرطات بنهاية اسم الحساب
    all.forEach((a, i) => {
      if (!a.value) return;
      const nextDepth = i + 1 < all.length ? all[i + 1].dashDepth : -1;
      if (nextDepth > a.dashDepth) return; // له أبناء لاحقين = صف تجميعي، تجاهله
      const ancestors = [];
      let minDepth = a.dashDepth;
      for (let j = i - 1; j >= 0; j--) {
        if (all[j].dashDepth < minDepth) { ancestors.push(all[j].name); minDepth = all[j].dashDepth; if (minDepth === 0) break; }
      }
      const category = guessCategory(a.name, "", ancestors.join(" "));
      let debit = 0, credit = 0;
      if (a.nature === "debit") debit = a.value;
      else if (a.nature === "credit") credit = a.value;
      else if (DEBIT_NATURE.has(category)) debit = a.value;
      else credit = a.value;
      rows.push({ id: uid(), code: `#${i}`, name: a.name, debit, credit, category });
    });
  }
  return rows;
}

function buildFlatRows(rawRows, mapping) {
  const out = [];
  for (let r = mapping.headerRow + 1; r < rawRows.length; r++) {
    const row = rawRows[r];
    if (!row || row.every((c) => c === undefined || c === "")) continue;
    const name = mapping.name >= 0 ? row[mapping.name] : "";
    if (!name) continue;
    const code = mapping.code >= 0 ? row[mapping.code] : "";
    const debit = parseFloat(row[mapping.debit]) || 0;
    const credit = parseFloat(row[mapping.credit]) || 0;
    if (debit === 0 && credit === 0) continue;
    out.push({ id: uid(), code: String(code ?? "").trim(), name: String(name).trim(), debit, credit, category: guessCategory(name, code) });
  }
  return out;
}

async function parseWorkbook(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array" });
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rawRows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: "" });
  const tree = detectTreeColumns(rawRows);
  if (tree) return { mode: "tree", rawRows, tree, rows: buildTreeRows(rawRows, tree) };
  const mapping = detectFlatColumns(rawRows) || { headerRow: 0, code: 0, name: 1, debit: 2, credit: 3 };
  return { mode: "flat", rawRows, mapping };
}

  return (

/* ---------------------------------- حسابات القوائم ---------------------------------- */

function computeFigures(rows, openingInventory) {
  const val = (r) => (DEBIT_NATURE.has(r.category) ? r.debit - r.credit : r.credit - r.debit);
  const byCat = (cat) => rows.filter((r) => r.category === cat);
  const sum = (cat) => byCat(cat).reduce((s, r) => s + val(r), 0);

  const grossSales = sum("revenue");
  const salesReturns = sum("sales_returns");
  const salesDiscounts = sum("sales_discounts");
  const netSales = grossSales - salesReturns - salesDiscounts;
  const returnsRatio = grossSales ? salesReturns / grossSales : 0;

  const closingInventory = byCat("asset_current").filter((r) => /مخزون|بضاعة/.test(r.name)).reduce((s, r) => s + val(r), 0);
  const openInv = openingInventory || 0;
  const purchases = sum("purchases");
  const cogs = openInv + purchases - closingInventory;
  const grossProfit = netSales - cogs;
  const grossMargin = netSales ? grossProfit / netSales : 0;

  const opexRows = byCat("opex").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const opex = opexRows.reduce((s, r) => s + r.amount, 0);
  const opexRatio = netSales ? opex / netSales : 0;
  const operatingProfit = grossProfit - opex;
  const operatingMargin = netSales ? operatingProfit / netSales : 0;

  const otherIncomeRows = byCat("other_income").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const otherIncome = otherIncomeRows.reduce((s, r) => s + r.amount, 0);
  const otherExpense = sum("other_expense");
  const tax = sum("tax");
  const netProfit = operatingProfit + otherIncome - otherExpense - tax;
  const netMargin = netSales ? netProfit / netSales : 0;
  const oci = sum("oci");
  const totalComprehensive = netProfit + oci;

  const assetCurrentRows = byCat("asset_current").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const assetNoncurrentRows = byCat("asset_noncurrent").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const liabilityCurrentRows = byCat("liability_current").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const liabilityNoncurrentRows = byCat("liability_noncurrent").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const equityAccountRows = byCat("equity").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);

  const currentAssets = assetCurrentRows.reduce((s, r) => s + r.amount, 0);
  const nonCurrentAssets = assetNoncurrentRows.reduce((s, r) => s + r.amount, 0);
  const totalAssets = currentAssets + nonCurrentAssets;
  const currentLiab = liabilityCurrentRows.reduce((s, r) => s + r.amount, 0);
  const nonCurrentLiab = liabilityNoncurrentRows.reduce((s, r) => s + r.amount, 0);
  const totalLiab = currentLiab + nonCurrentLiab;
  const equityAccounts = equityAccountRows.reduce((s, r) => s + r.amount, 0);
  const totalEquity = equityAccounts + netProfit;
  const totalLiabEquity = totalLiab + totalEquity;

  const cashRows = assetCurrentRows.filter((r) => /نقد|بنك|صندوق|خزين/.test(r.name));
  const cash = cashRows.reduce((s, r) => s + r.amount, 0);
  const customerDebtRows = assetCurrentRows.filter((r) => /عملاء|مدين/.test(r.name));
  const customerDebt = customerDebtRows.reduce((s, r) => s + r.amount, 0);
  const supplierPrepaidRows = assetCurrentRows.filter((r) => /مقدم.*مورد|دفعات مقدمة للموردين/.test(r.name));
  const supplierPrepaid = supplierPrepaidRows.reduce((s, r) => s + r.amount, 0);
  const customerPrepaidRows = liabilityCurrentRows.filter((r) => /مقدم.*عميل|دفعات مقدمة من العملاء/.test(r.name));
  const customerPrepaid = customerPrepaidRows.reduce((s, r) => s + r.amount, 0);
  const supplierDebtRows = liabilityCurrentRows.filter((r) => /موردين/.test(r.name));
  const supplierDebt = supplierDebtRows.reduce((s, r) => s + r.amount, 0);

  return {
    val, byCat, sum,
    grossSales, salesReturns, salesDiscounts, netSales, returnsRatio,
    openInv, purchases, closingInventory, cogs, grossProfit, grossMargin,
    opexRows, opex, opexRatio, operatingProfit, operatingMargin,
    otherIncomeRows, otherIncome, otherExpense, tax, netProfit, netMargin, oci, totalComprehensive,
    assetCurrentRows, assetNoncurrentRows, liabilityCurrentRows, liabilityNoncurrentRows, equityAccountRows,
    currentAssets, nonCurrentAssets, totalAssets,
    currentLiab, nonCurrentLiab, totalLiab,
    equityAccounts, totalEquity, totalLiabEquity,
    inventory: closingInventory, balanceDiff: totalAssets - totalLiabEquity,
    cash, customerDebt, supplierPrepaid, customerPrepaid, supplierDebt,
  };
}

function mergeFigures(list) {
  // list: array of computeFigures() results for multiple periods, aggregated for annual view
  const sumKey = (k) => list.reduce((s, f) => s + (f[k] || 0), 0);
  const mergeRows = (key) => {
    const map = {};
    list.forEach((f) => f[key].forEach((r) => { map[r.name] = (map[r.name] || 0) + r.amount; }));
    return Object.entries(map).map(([name, amount]) => ({ name, amount }));
  };
  const grossSales = sumKey("grossSales");
  const salesReturns = sumKey("salesReturns");
  const salesDiscounts = sumKey("salesDiscounts");
  const netSales = grossSales - salesReturns - salesDiscounts;
  const returnsRatio = grossSales ? salesReturns / grossSales : 0;
  const purchases = sumKey("purchases");
  const openInv = list.length ? list[0].openInv : 0;
  const closingInventory = list.length ? list[list.length - 1].closingInventory : 0;
  const cogs = openInv + purchases - closingInventory;
  const grossProfit = netSales - cogs;
  const grossMargin = netSales ? grossProfit / netSales : 0;
  const opexRows = mergeRows("opexRows");
  const opex = sumKey("opex");
  const opexRatio = netSales ? opex / netSales : 0;
  const operatingProfit = grossProfit - opex;
  const operatingMargin = netSales ? operatingProfit / netSales : 0;
  const otherIncomeRows = mergeRows("otherIncomeRows");
  const otherIncome = sumKey("otherIncome");
  const otherExpense = sumKey("otherExpense");
  const tax = sumKey("tax");
  const netProfit = operatingProfit + otherIncome - otherExpense - tax;
  const netMargin = netSales ? netProfit / netSales : 0;
  const oci = sumKey("oci");
  const totalComprehensive = netProfit + oci;
  const last = list[list.length - 1] || {};
  return {
    grossSales, salesReturns, salesDiscounts, netSales, returnsRatio,
    openInv, purchases, closingInventory, cogs, grossProfit, grossMargin,
    opexRows, opex, opexRatio, operatingProfit, operatingMargin,
    otherIncomeRows, otherIncome, otherExpense, tax, netProfit, netMargin, oci, totalComprehensive,
    currentAssets: last.currentAssets || 0, nonCurrentAssets: last.nonCurrentAssets || 0, totalAssets: last.totalAssets || 0,
    currentLiab: last.currentLiab || 0, nonCurrentLiab: last.nonCurrentLiab || 0, totalLiab: last.totalLiab || 0,
    equityAccounts: last.equityAccounts || 0, totalEquity: (last.equityAccounts || 0) + netProfit,
    balanceDiff: last.balanceDiff || 0,
  };
}

function EquityStatement({ rows, f, opening, setOpening, periodLabel, readOnly }) {
  const equityRows = rows.filter((r) => r.category === "equity");
  const closingOf = (r) => f.val(r);
  const totalOpening = equityRows.reduce((s, r) => s + (opening[r.id] || 0), 0);
  const totalClosing = equityRows.reduce((s, r) => s + closingOf(r), 0);

  return (
    <Card style={{ padding: 26, maxWidth: 780 }}>
      <div style={{ textAlign: "center", marginBottom: 18, borderBottom: `2px solid ${INK}`, paddingBottom: 14 }}>
        <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 24, fontWeight: 700, color: INK }}>قائمة التغير في حقوق الملكية</div>
        <div style={{ fontSize: 12.5, color: "#847c69", marginTop: 4 }}>{periodLabel}</div>
      </div>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5 }}>
        <thead>
          <tr style={{ borderBottom: `2px solid ${RULE}` }}>
            <th style={{ textAlign: "right", padding: "6px 4px" }}>البند</th>
            <th style={{ textAlign: "left", padding: "6px 4px" }}>رصيد أول الفترة</th>
            <th style={{ textAlign: "left", padding: "6px 4px" }}>الحركة</th>
            <th style={{ textAlign: "left", padding: "6px 4px" }}>رصيد آخر الفترة</th>
          </tr>
        </thead>
        <tbody>
          {equityRows.map((r) => {
            const open = opening[r.id] || 0;
            const close = closingOf(r);
            return (
              <tr key={r.id} style={{ borderBottom: `1px solid ${RULE}` }}>
                <td style={{ padding: "6px 4px" }}>{r.name}</td>
                <td style={{ padding: "6px 4px", width: 140 }}>
                  <NumInput value={open} disabled={readOnly} onChange={(e) => setOpening({ ...opening, [r.id]: parseFloat(e.target.value) || 0 })} />
                </td>
                <td style={{ padding: "6px 4px", textAlign: "left", direction: "ltr", color: close - open < 0 ? RED_INK : INK }}>{fmt(close - open)}</td>
                <td style={{ padding: "6px 4px", textAlign: "left", direction: "ltr" }}>{fmt(close)}</td>
              </tr>
            );
          })}
          <tr style={{ borderBottom: `1px solid ${RULE}` }}>
            <td style={{ padding: "6px 4px" }}>صافي ربح الفترة</td>
            <td style={{ padding: "6px 4px" }}>—</td>
            <td style={{ padding: "6px 4px", textAlign: "left", direction: "ltr" }}>{fmt(f.netProfit)}</td>
            <td style={{ padding: "6px 4px", textAlign: "left", direction: "ltr" }}>{fmt(f.netProfit)}</td>
          </tr>
          <tr style={{ fontWeight: 700, borderTop: `2px solid ${INK}` }}>
            <td style={{ padding: "8px 4px" }}>الإجمالي</td>
            <td style={{ padding: "8px 4px", direction: "ltr", textAlign: "left" }}>{fmt(totalOpening)}</td>
            <td style={{ padding: "8px 4px", direction: "ltr", textAlign: "left" }}>{fmt(totalClosing - totalOpening + f.netProfit)}</td>
            <td style={{ padding: "8px 4px", direction: "ltr", textAlign: "left" }}>{fmt(totalClosing + f.netProfit)}</td>
          </tr>
        </tbody>
      </table>
    </Card>
  );
}

function PerformanceSummary({ f, periodLabel }) {
  const quickAssets = f.currentAssets - f.inventory;
  const ratios = [
    { l: "هامش مجمل الربح", v: f.netSales ? f.grossMargin * 100 : null, unit: "%" },
    { l: "هامش ربح التشغيل", v: f.netSales ? f.operatingMargin * 100 : null, unit: "%" },
    { l: "هامش صافي الربح", v: f.netSales ? f.netMargin * 100 : null, unit: "%" },
    { l: "نسبة المصروفات لصافي المبيعات", v: f.netSales ? f.opexRatio * 100 : null, unit: "%" },
    { l: "نسبة مردودات المبيعات", v: f.grossSales ? f.returnsRatio * 100 : null, unit: "%" },
    { l: "نسبة التداول", v: f.currentLiab ? f.currentAssets / f.currentLiab : null, unit: "×" },
    { l: "نسبة السيولة السريعة", v: f.currentLiab ? quickAssets / f.currentLiab : null, unit: "×" },
    { l: "نسبة الدين إلى حقوق الملكية", v: f.totalEquity ? f.totalLiab / f.totalEquity : null, unit: "×" },
    { l: "العائد على الأصول (ROA)", v: f.totalAssets ? (f.netProfit / f.totalAssets) * 100 : null, unit: "%" },
    { l: "العائد على حقوق الملكية (ROE)", v: f.totalEquity ? (f.netProfit / f.totalEquity) * 100 : null, unit: "%" },
  ];
  return (
    <StatementCard title="ملخص الأداء" subtitle={periodLabel}>
      {ratios.map((r, i) => (
        <div key={r.l} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: i < ratios.length - 1 ? `1px solid ${RULE}` : "none" }}>
          <span style={{ fontSize: 13.8 }}>{r.l}</span>
          <span style={{ direction: "ltr", fontWeight: 600 }}>{r.v === null ? "—" : `${r.v.toFixed(2)}${r.unit}`}</span>
        </div>
      ))}
    </StatementCard>
  );
}

const MONTH_NAMES = ["يناير", "فبراير", "مارس", "ابريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

function KpiCard({ label, value, isRatio, emoji }) {

function HomeDashboard({ company, periods, year, setYear, availableYears, zakatDue }) {
  const printId = "print-home";
  const yearPeriods = periods.filter((p) => p.year === year).sort((a, b) => a.month - b.month);
  const monthly = MONTH_NAMES.map((name, i) => {
    const p = yearPeriods.find((x) => x.month === i + 1);
    if (!p) return { name, empty: true };
    const f = computeFigures(p.rows, p.openingInventory || 0);
    return { name, empty: false, ...f };
  });
  const activeMonths = monthly.filter((m) => !m.empty);
  const figuresList = activeMonths.map((m) => m);
  const annual = figuresList.length ? mergeFigures(figuresList) : null;
  const latest = yearPeriods.length ? computeFigures(yearPeriods[yearPeriods.length - 1].rows, yearPeriods[yearPeriods.length - 1].openingInventory || 0) : null;

  if (!annual) {
    return (
      <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>
        لا توجد فترات مرفوعة لسنة {year} بعد. ارفع ميزان شهر واحد على الأقل من تاب "رفع الميزان" لعرض لوحة القيادة.
      </Card>
    );
  }

  const currentRatio = latest && latest.currentLiab ? latest.currentAssets / latest.currentLiab : null;
  const roa = latest && latest.totalAssets ? annual.netProfit / latest.totalAssets : null;
  const bestSalesMonth = activeMonths.reduce((best, m) => (!best || m.grossSales > best.grossSales ? m : best), null);
  const bestProfitMonth = activeMonths.reduce((best, m) => (!best || m.netProfit > best.netProfit ? m : best), null);

  const insights = [];
  insights.push({ icon: "📌", text: `الوضع العام: الشركة في وضع ${annual.netProfit >= 0 ? "ربحي" : "خسارة"} — صافي ${annual.netProfit >= 0 ? "ربح" : "خسارة"} ${fmt(Math.abs(annual.netProfit))} ج.م. بهامش صافي ${(annual.netMargin * 100).toFixed(1)}% على صافي مبيعات ${fmt(annual.netSales)} ج.م. خلال ${activeMonths.length} ${activeMonths.length === 1 ? "شهر" : "أشهر"}` });
  insights.push({ icon: annual.opexRatio < 0.05 ? "✅" : "🔧", text: `المصروفات: ${annual.opexRatio < 0.05 ? "تحت السيطرة" : "نسبتها مرتفعة نسبيًا"} — ${(annual.opexRatio * 100).toFixed(1)}% من صافي المبيعات` });
  insights.push({ icon: annual.returnsRatio <= 0.03 ? "✅" : "⚠️", text: `المردودات: ${(annual.returnsRatio * 100).toFixed(1)}% من إجمالي المبيعات${annual.returnsRatio > 0.03 ? " — أعلى من الحد الآمن (3%)، راجع أسباب المرتجعات" : " — ضمن الحد الآمن"}` });
  if (bestSalesMonth) insights.push({ icon: "🏅", text: `أفضل شهر مبيعات: ${bestSalesMonth.name} (${fmt(bestSalesMonth.grossSales)} ج.م.)${bestProfitMonth ? `  |  أعلى صافي ربح: ${bestProfitMonth.name} (${fmt(bestProfitMonth.netProfit)} ج.م.)` : ""}` });
  if (currentRatio !== null) insights.push({ icon: currentRatio >= 1.5 ? "✅" : "⚠️", text: `السيولة: ${currentRatio >= 1.5 ? "قوية" : "تحتاج متابعة"} — الأصول المتداولة تغطي الخصوم المتداولة ${currentRatio.toFixed(1)} مرة` });
  if (zakatDue) insights.push({ icon: "🕌", text: `الزكاة: إجمالي المستحق ${fmt(zakatDue)} ج.م.` });

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 10 }}>
        <Select value={year} onChange={(e) => setYear(parseInt(e.target.value))} style={{ width: 120 }}>
          {availableYears.map((y) => (<option key={y} value={y}>{y}</option>))}
        </Select>
        <PrintBtn targetId={printId} />
      </div>
      <div id={printId} className="print-area">
        <Card style={{ padding: 24, marginBottom: 16 }}>
          <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 22, fontWeight: 700, color: INK }}>
            {company.legalName || company.name} — لوحة القيادة وملخص الأداء المالي {year}
          </div>
          <div style={{ fontSize: 12.5, color: "#847c69", marginTop: 4 }}>
            الفترة: {activeMonths[0]?.name} – {activeMonths[activeMonths.length - 1]?.name} {year} · {activeMonths.length} {activeMonths.length === 1 ? "شهر فعلي" : "أشهر فعلية"}
          </div>
        </Card>

        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 12 }}>
          <KpiCard label="إجمالي المبيعات" value={annual.grossSales} />
          <KpiCard label="صافي المبيعات" value={annual.netSales} />
          <KpiCard label="إجمالي الربح" value={annual.grossProfit} />
          <KpiCard label="صافي الربح" value={annual.netProfit} />
        </div>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>
          <KpiCard label="ربح التشغيل" value={annual.operatingProfit} />
          <KpiCard label="هامش الربح الصافي" value={annual.netMargin} isRatio />
          <KpiCard label="إجمالي الأصول" value={latest ? latest.totalAssets : 0} />
          <KpiCard label="الزكاة المستحقة" value={zakatDue || 0} emoji="🕌" />
        </div>

        {latest && (
          <>
            <div style={{ fontWeight: 700, color: GOLD, marginBottom: 8, fontSize: 13.5 }}>أرصدة وإجماليات الحسابات — كما في آخر فترة مرفوعة</div>
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>
              <KpiCard label="الخزائن والنقدية" value={latest.cash} emoji="🏦" />
              <KpiCard label="مديونية العملاء" value={latest.customerDebt} emoji="📥" />
              <KpiCard label="دفعات مقدمة من العملاء" value={latest.customerPrepaid} emoji="📤" />
              <KpiCard label="مديونية الموردين" value={latest.supplierDebt} emoji="📤" />

              <KpiCard label="المخزون" value={latest.closingInventory} emoji="📦" />
            </div>

        <div style={{ fontWeight: 700, color: GOLD, marginBottom: 8, fontSize: 13.5 }}>▌ الأداء الشهري</div>
        <Card style={{ padding: 0, overflow: "hidden", marginBottom: 20 }}>

            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5, minWidth: 720 }}>

                currentRatio !== null ? ["نسبة السيولة (التداول)", `${currentRatio.toFixed(2)}×`, currentRatio >= 1.5 ? "سيولة قوية" : "تحتاج متابعة"] : null,
                zakatDue ? ["الزكاة المستحقة", fmt(zakatDue), "من آخر حساب زكاة محفوظ"] : null,
              ].filter(Boolean).map(([l, v, note], i) => (
                <tr key={i} style={{ borderBottom: `1px solid ${RULE}` }}>
                  <td style={{ padding: "8px 10px", fontWeight: 600, width: 220 }}>{l}</td>
                  <td style={{ padding: "8px 10px", direction: "ltr", textAlign: "left", width: 130, fontWeight: 700 }}>{v}</td>
                  <td style={{ padding: "8px 10px", color: "#8a8271", fontSize: 12 }}>{note}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>

        <div style={{ fontWeight: 700, color: GOLD, marginBottom: 8, fontSize: 13.5 }}>▌ قراءة الأداء وأهم الملاحظات</div>
        <Card style={{ padding: 16 }}>
          {insights.map((ins, i) => (
            <div key={i} style={{ display: "flex", gap: 8, padding: "6px 0", fontSize: 13, borderBottom: i < insights.length - 1 ? `1px solid ${RULE}` : "none" }}>
              <span>{ins.icon}</span>
              <span>{ins.text}</span>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

/* ---------------------------------- وحدة الزكاة ---------------------------------- */

function round2(n) { return Math.round(n * 100) / 100; }

function ZakatModule({ data, setData, readOnly }) {
  const [file, setFile] = useState(null);
  const [parsed, setParsed] = useState(null);
  const [pendingRows, setPendingRows] = useState(null);
  const [mode, setMode] = useState(null);
  const [mapping, setMapping] = useState(null);

  const rows = data.rows;
  const f = useMemo(() => (rows ? computeFigures(rows) : null), [rows]);

  const onFile = async (fl) => {
    setFile(fl.name);
    const res = await parseWorkbook(fl);
    setParsed(res.rawRows);
    setMode(res.mode);
    if (res.mode === "tree") setPendingRows(res.rows);
    else setMapping(res.mapping);
  };

  useEffect(() => {
    if (f && !data.adjustments) {
      setData({
        adjustments: [
          { id: uid(), label: "صافي حقوق الملكية (رأس المال + الاحتياطيات + الأرباح المرحلة)", sign: 1, amount: round2(f.equityAccounts) },
          { id: uid(), label: "المخصصات غير القابلة للخصم", sign: 1, amount: 0 },
          { id: uid(), label: "قروض وتمويلات طويلة الأجل ممولة لأصول ثابتة", sign: 1, amount: 0 },
          { id: uid(), label: "صافي الأصول الثابتة (بعد الإهلاك)", sign: -1, amount: round2(f.nonCurrentAssets) },
          { id: uid(), label: "استثمارات في شركات تابعة وزميلة (طويلة الأجل)", sign: -1, amount: 0 },
          { id: uid(), label: "مصروفات تأسيس ومصروفات مؤجلة", sign: -1, amount: 0 },
          { id: uid(), label: "خسائر متراكمة", sign: -1, amount: 0 },
        ],
      });
    }
    // eslint-disable-next-line
  }, [f]);

  const adjustments = data.adjustments;
  const zakatBase = adjustments ? adjustments.reduce((s, a) => s + a.sign * a.amount, 0) : 0;
  const days = data.hawlStart && data.hawlEnd ? Math.round((new Date(data.hawlEnd) - new Date(data.hawlStart)) / 86400000) : 354;
  const proration = Math.min(days / 354, 1) || 1;
  const rate = data.rate ?? 2.5;
  const zakatDue = Math.max(zakatBase, 0) * (rate / 100) * proration;

  return (
    <div>
      <SectionTitle icon={Landmark} sub="ارفع ميزان مراجعة منفصل بتاريخ بداية الحول لحساب وعاء الزكاة">حساب الزكاة الشرعية</SectionTitle>

      {!rows && !readOnly && (
        <>
          <UploadZone title="رفع ميزان مراجعة بداية الحول" onFile={onFile} fileName={file} />
          {mode === "tree" && pendingRows && (
            <TreeConfirm rows={pendingRows} onConfirm={() => setData({ rows: pendingRows })} onFallback={() => { setMode("flat"); setMapping(detectFlatColumns(parsed) || { headerRow: 0, code: 0, name: 1, debit: 2, credit: 3 }); }} />
          )}
          {mode === "flat" && parsed && mapping && (
            <MappingConfirm rawRows={parsed} mapping={mapping} setMapping={setMapping} onConfirm={() => setData({ rows: buildFlatRows(parsed, mapping) })} />
          )}
        </>
      )}
      {!rows && readOnly && (
        <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>لا توجد بيانات زكاة مرفوعة لهذه الشركة بعد، وصلاحيتك هنا مشاهدة فقط.</Card>
      )}

      {rows && f && adjustments && (
        <div style={{ display: "grid", gridTemplateColumns: "1.3fr 1fr", gap: 20, alignItems: "flex-start" }}>
          <Card style={{ padding: 24 }}>
            <div style={{ display: "flex", gap: 14, marginBottom: 18, flexWrap: "wrap" }}>
              <div>
                <label style={{ fontSize: 12.5, color: "#6b6455" }}>بداية الحول</label>
                <input type="date" value={data.hawlStart} disabled={readOnly} onChange={(e) => setData({ hawlStart: e.target.value })} style={{ display: "block", border: `1px solid ${RULE}`, borderRadius: 7, padding: "7px 10px", fontFamily: "inherit" }} />
              </div>
              <div>
                <label style={{ fontSize: 12.5, color: "#6b6455" }}>نهاية الحول (تاريخ الميزان)</label>
                <input type="date" value={data.hawlEnd} disabled={readOnly} onChange={(e) => setData({ hawlEnd: e.target.value })} style={{ display: "block", border: `1px solid ${RULE}`, borderRadius: 7, padding: "7px 10px", fontFamily: "inherit" }} />
              </div>
              <div>
                <label style={{ fontSize: 12.5, color: "#6b6455" }}>نسبة الزكاة %</label>
                <NumInput value={rate} disabled={readOnly} onChange={(e) => setData({ rate: parseFloat(e.target.value) || 0 })} style={{ width: 90 }} />
              </div>
            </div>

            <div style={{ fontWeight: 700, marginBottom: 8, color: INK }}>مكونات وعاء الزكاة</div>
            {adjustments.map((a) => (
              <div key={a.id} style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
                <span style={{ width: 20, color: a.sign > 0 ? GREEN_INK : RED_INK, fontWeight: 700 }}>{a.sign > 0 ? "+" : "−"}</span>
                <input value={a.label} disabled={readOnly} onChange={(e) => setData({ adjustments: adjustments.map((x) => x.id === a.id ? { ...x, label: e.target.value } : x) })}
                  style={{ flex: 1, border: `1px solid ${RULE}`, borderRadius: 7, padding: "6px 10px", fontFamily: "'IBM Plex Sans Arabic', sans-serif", fontSize: 13, background: readOnly ? "#f3f0e8" : "#fff" }} />
                <NumInput value={a.amount} disabled={readOnly} onChange={(e) => setData({ adjustments: adjustments.map((x) => x.id === a.id ? { ...x, amount: parseFloat(e.target.value) || 0 } : x) })} style={{ width: 140 }} />
                {!readOnly && <button onClick={() => setData({ adjustments: adjustments.filter((x) => x.id !== a.id) })} style={{ background: "none", border: "none", cursor: "pointer", color: RED_INK }}><Trash2 size={15} /></button>}
              </div>
            ))}
            {!readOnly && <GhostBtn icon={Plus} onClick={() => setData({ adjustments: [...adjustments, { id: uid(), label: "بند إضافي", sign: 1, amount: 0 }] })}>إضافة بند</GhostBtn>}
          </Card>

          <Card style={{ padding: 24, background: INK, color: CREAM }}>
            <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 21, marginBottom: 14, textAlign: "center" }}>نتيجة حساب الزكاة</div>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", fontWeight: 700, fontSize: 14.5 }}>
              <span>وعاء الزكاة</span><span style={{ direction: "ltr" }}>{fmt(zakatBase)}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", fontSize: 13.5 }}>
              <span>عدد أيام الحول</span><span style={{ direction: "ltr" }}>{days} يوم</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", fontSize: 13.5, borderBottom: "1px solid rgba(255,255,255,0.2)" }}>
              <span>نسبة التناسب</span><span style={{ direction: "ltr" }}>{(proration * 100).toFixed(1)}%</span>
            </div>
            <div style={{ marginTop: 16, padding: "16px 0", textAlign: "center", borderTop: "1px solid rgba(255,255,255,0.3)" }}>
              <div style={{ fontSize: 12.5, opacity: 0.8 }}>الزكاة المستحقة</div>
              <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 34, color: GOLD, fontWeight: 700 }}>{fmt(zakatDue)}</div>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}

function newCompanyDoc(name, user) {
  return {
    name,
    legalName: "",
    ownerUid: user.uid,
    ownerEmail: user.email,
    editorEmails: [],
    viewerEmails: [],
    periods: [],
    opening: {},
    zakat: { rows: null, hawlStart: "", hawlEnd: "", adjustments: null, rate: 2.5 },
    createdAt: Date.now(),
  };
}

function getRole(company, user) {
  if (!company || !user) return null;
  if (company.ownerUid === user.uid) return "owner";
  if ((company.editorEmails || []).includes(user.email)) return "editor";
  if ((company.viewerEmails || []).includes(user.email)) return "viewer";
  return null;
}

function SavePeriodBar({ year, setYear, month, setMonth, openingInv, setOpeningInv, onSave, isNew }) {
  const years = [];
  const base = new Date().getFullYear();
  for (let y = base - 2; y <= base + 1; y++) years.push(y);
  return (
    <Card style={{ padding: 20, marginBottom: 18 }}>
      <div style={{ fontWeight: 700, marginBottom: 10, color: INK }}>{isNew ? "حدد الفترة اللي الميزان ده بيمثلها" : "بيانات الفترة"}</div>
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", alignItems: "flex-end" }}>
        <div>
          <label style={{ fontSize: 12.5, color: "#6b6455" }}>السنة</label>
          <Select value={year} onChange={(e) => setYear(parseInt(e.target.value))} style={{ width: 110 }}>
            {years.map((y) => (<option key={y} value={y}>{y}</option>))}
          </Select>
        </div>
        <div>
          <label style={{ fontSize: 12.5, color: "#6b6455" }}>الشهر</label>

function MainApp({ user }) {
  const [companies, setCompanies] = useState([]);
  const [loadingCompanies, setLoadingCompanies] = useState(true);
  const [activeId, setActiveId] = useState(null);
  const [screen, setScreen] = useState("companies");
  const [step, setStep] = useState("upload");
  const [stmtTab, setStmtTab] = useState("home");

  const [file, setFile] = useState(null);
  const [parsed, setParsed] = useState(null);
  const [pendingRows, setPendingRows] = useState(null);
  const [mode, setMode] = useState(null);
  const [mapping, setMapping] = useState(null);

  const [draftRows, setDraftRows] = useState(null);
  const [draftIsNew, setDraftIsNew] = useState(true);
  const [draftPeriodId, setDraftPeriodId] = useState(null);
  const [draftYear, setDraftYear] = useState(new Date().getFullYear());
  const [draftMonth, setDraftMonth] = useState(new Date().getMonth() + 1);
  const [draftOpeningInv, setDraftOpeningInv] = useState(0);

  const [activePeriodId, setActivePeriodId] = useState(null);
  const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());

  useEffect(() => {
    const merged = {};
    let received = 0;
    const finishInit = () => { received++; if (received >= 3) setLoadingCompanies(false); };
    const apply = (snap) => {
      snap.docChanges().forEach((change) => {
        if (change.type === "removed") delete merged[change.doc.id];
        else merged[change.doc.id] = { id: change.doc.id, ...change.doc.data() };
      });
      setCompanies(Object.values(merged).sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)));
    };
    const unsub1 = db.collection("companies").where("ownerUid", "==", user.uid).onSnapshot((s) => { apply(s); finishInit(); }, () => finishInit());
    const unsub2 = db.collection("companies").where("editorEmails", "array-contains", user.email).onSnapshot((s) => { apply(s); finishInit(); }, () => finishInit());
    const unsub3 = db.collection("companies").where("viewerEmails", "array-contains", user.email).onSnapshot((s) => { apply(s); finishInit(); }, () => finishInit());
    return () => { unsub1(); unsub2(); unsub3(); };
  }, [user.uid, user.email]);

  const active = companies.find((c) => c.id === activeId) || null;
  const role = getRole(active, user);
  const readOnly = role === "viewer";
  const isOwner = role === "owner";
  const periods = (active && active.periods) || [];
  const sortedPeriods = [...periods].sort((a, b) => (a.year - b.year) || (a.month - b.month));
  const activePeriod = sortedPeriods.find((p) => p.id === activePeriodId) || sortedPeriods[sortedPeriods.length - 1] || null;
  const availableYears = Array.from(new Set(sortedPeriods.map((p) => p.year))).sort();

  const patchCompany = (patch) => {
    if (!activeId || readOnly) return;
    db.collection("companies").doc(activeId).update(patch).catch((e) => console.error("تعذر الحفظ:", e));
  };
  const patchZakat = (patch) => {
    if (!activeId || readOnly) return;
    const upd = {};
    Object.keys(patch).forEach((k) => { upd[`zakat.${k}`] = patch[k]; });
    db.collection("companies").doc(activeId).update(upd).catch((e) => console.error("تعذر الحفظ:", e));
  };
  const savePeriod = (periodObj) => {
    const others = periods.filter((p) => p.id !== periodObj.id);
    const next = [...others, periodObj];
    patchCompany({ periods: next });
  };
  const deletePeriod = (id) => {
    if (!isOwner) return;
    patchCompany({ periods: periods.filter((p) => p.id !== id) });
    if (activePeriodId === id) setActivePeriodId(null);
  };

  const addCompany = (name) => {
    db.collection("companies").add(newCompanyDoc(name, user)).then((ref) => {
      setActiveId(ref.id);
      setScreen("workspace");
      setStep("upload");
      resetUploadState();
    });
  };
  const openCompany = (id) => {
    const c = companies.find((x) => x.id === id);
    setActiveId(id);
    setScreen("workspace");
    const ps = (c && c.periods) || [];
    const latest = [...ps].sort((a, b) => (a.year - b.year) || (a.month - b.month)).pop();
    setActivePeriodId(latest ? latest.id : null);
    if (latest) setSelectedYear(latest.year);
    setStep(latest ? "statements" : "upload");
    setStmtTab("home");
    resetUploadState();
  };
  const deleteCompany = (id) => db.collection("companies").doc(id).delete();
  const renameCompany = (id, name) => db.collection("companies").doc(id).update({ name });

  const shareAccess = (companyId, email, roleToGrant) => {
    const field = roleToGrant === "editor" ? "editorEmails" : "viewerEmails";
    db.collection("companies").doc(companyId).update({ [field]: firebase.firestore.FieldValue.arrayUnion(email.trim().toLowerCase()) });
  };
  const revokeAccess = (companyId, email, roleToRevoke) => {
    const field = roleToRevoke === "editor" ? "editorEmails" : "viewerEmails";
    db.collection("companies").doc(companyId).update({ [field]: firebase.firestore.FieldValue.arrayRemove(email) });
  };

  const resetUploadState = () => { setFile(null); setParsed(null); setPendingRows(null); setMode(null); setMapping(null); };

  const onFile = async (f) => {
    setFile(f.name);
    const res = await parseWorkbook(f);
    setParsed(res.rawRows);
    setMode(res.mode);
    if (res.mode === "tree") setPendingRows(res.rows);
    else setMapping(res.mapping);
  };

  const beginDraft = (rows) => {
    setDraftRows(rows);
    setDraftIsNew(true);
    setDraftPeriodId(uid());
    const now = new Date();
    let y = now.getFullYear(), m = now.getMonth() + 1;
    // اقترح الشهر التالي لآخر فترة محفوظة
    if (sortedPeriods.length) {
      const last = sortedPeriods[sortedPeriods.length - 1];
      m = last.month === 12 ? 1 : last.month + 1;
      y = last.month === 12 ? last.year + 1 : last.year;
      const lastFigures = computeFigures(last.rows, last.openingInventory || 0);
      setDraftOpeningInv(round2(lastFigures.closingInventory));
    } else {
      setDraftOpeningInv(0);
    }
    setDraftYear(y);
    setDraftMonth(m);
    setStep("classify");
  };
  const confirmTree = () => beginDraft(pendingRows);
  const confirmFlat = () => beginDraft(buildFlatRows(parsed, mapping));

  const startEditPeriod = (p) => {
    setDraftRows(p.rows);
    setDraftIsNew(false);
    setDraftPeriodId(p.id);
    setDraftYear(p.year);
    setDraftMonth(p.month);
    setDraftOpeningInv(p.openingInventory || 0);
    setStep("classify");
  };

  const finalizeDraft = () => {
    const periodObj = { id: draftPeriodId, year: draftYear, month: draftMonth, rows: draftRows, openingInventory: draftOpeningInv, uploadedAt: Date.now() };
    savePeriod(periodObj);
    setActivePeriodId(draftPeriodId);
    setSelectedYear(draftYear);
    setDraftRows(null);
    setStep("statements");
    setStmtTab("income_monthly");
    resetUploadState();
  };

  const figures = useMemo(() => (activePeriod ? computeFigures(activePeriod.rows, activePeriod.openingInventory || 0) : null), [activePeriod]);
  const monthlyPeriodLabel = activePeriod ? `قائمة الدخل الشهرية ◆ ${MONTH_NAMES[activePeriod.month - 1]} ${activePeriod.year}` : "";
  const monthlySourceLabel = activePeriod ? `من واقع ميزان مراجعة شهر ${MONTH_NAMES[activePeriod.month - 1]} ${activePeriod.year}` : "";

  const yearPeriods = sortedPeriods.filter((p) => p.year === selectedYear);
  const annualFigures = useMemo(() => {
    if (!yearPeriods.length) return null;
    return mergeFigures(yearPeriods.map((p) => computeFigures(p.rows, p.openingInventory || 0)));
  }, [yearPeriods]);
  const annualPeriodLabel = `قائمة الدخل السنوية ◆ ${selectedYear}`;
  const annualSourceLabel = `تجميع ${yearPeriods.length} ${yearPeriods.length === 1 ? "شهر فعلي" : "أشهر فعلية"} من واقع الموازين الشهرية`;

  if (screen === "companies") {
    return (
      <div style={{ minHeight: "100vh", background: CREAM, fontFamily: "'IBM Plex Sans Arabic', sans-serif" }} dir="rtl">
        <style>{FONTS}</style>
        <div style={{ background: INK, color: CREAM, padding: "22px 30px" }} className="no-print">
          <div style={{ maxWidth: 1180, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <Stamp size={30} color={GOLD} />
              <div>
                <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 26, fontWeight: 700 }}>القوائم المالية والزكاة</div>
                <div style={{ fontSize: 12, opacity: 0.75 }}>إدارة قوائم مالية لأكثر من شركة أو فرع، كل واحد بميزانه الخاص</div>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ fontSize: 12, opacity: 0.85, direction: "ltr" }}>{user.email}</div>
              <button onClick={() => auth.signOut()} style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 8, padding: "7px 12px", color: CREAM, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontSize: 12.5 }}>
                <LogOut size={13} /> خروج
              </button>
            </div>
          </div>
        </div>
        <div style={{ maxWidth: 1180, margin: "0 auto", padding: "34px 30px" }}>
          <div style={{ fontSize: 12, color: "#847c69", marginBottom: 16, display: "flex", alignItems: "center", gap: 6 }}>
            <Check size={13} color={GREEN_INK} /> بياناتك محفوظة على السحابة ومتزامنة على أي جهاز تسجّل دخول منه بنفس الحساب
          </div>
          {loadingCompanies ? (
            <div style={{ color: "#847c69", fontSize: 13 }}>جارِ تحميل الشركات…</div>
          ) : (
            <CompanyList companies={companies} user={user} onOpen={openCompany} onAdd={addCompany} onDelete={deleteCompany} onRename={renameCompany} onShare={shareAccess} onRevoke={revokeAccess} />
          )}
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: CREAM, fontFamily: "'IBM Plex Sans Arabic', sans-serif" }} dir="rtl">
      <style>{FONTS}</style>

      <div style={{ background: INK, color: CREAM, padding: "18px 30px" }} className="no-print">
        <div style={{ maxWidth: 1180, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <button onClick={() => setScreen("companies")} style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 8, padding: "8px 12px", color: CREAM, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
              <ArrowRight size={15} /> الشركات
            </button>
            <div>
              <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 22, fontWeight: 700, display: "flex", alignItems: "center", gap: 8 }}>
                {active?.name}
                <span style={{ fontSize: 10.5, fontWeight: 600, color: GOLD, background: "rgba(184,137,43,0.15)", borderRadius: 20, padding: "2px 9px" }}>
                  {role === "owner" ? "مالك" : role === "editor" ? "تعديل" : "مشاهدة فقط"}
                </span>
              </div>
              <div style={{ fontSize: 11.5, opacity: 0.7 }}>القوائم المالية والزكاة</div>
            </div>
          </div>
        </div>
        {sortedPeriods.length > 0 && (
          <div style={{ maxWidth: 1180, margin: "10px auto 0", display: "flex", gap: 6, flexWrap: "wrap" }}>
            {sortedPeriods.map((p) => (
              <button key={p.id} onClick={() => { setActivePeriodId(p.id); setSelectedYear(p.year); if (step === "upload") setStep("statements"); }}
                style={{ background: activePeriodId === p.id || (!activePeriodId && p.id === sortedPeriods[sortedPeriods.length - 1].id) ? GOLD : "rgba(255,255,255,0.08)", color: activePeriodId === p.id ? INK : CREAM, border: "none", borderRadius: 20, padding: "5px 12px", fontSize: 11.5, cursor: "pointer" }}>
                {MONTH_NAMES[p.month - 1]} {p.year}
              </button>
            ))}
          </div>
        )}
      </div>

      <div style={{ background: "#fff", borderBottom: `1px solid ${RULE}` }} className="no-print">
        <div style={{ maxWidth: 1180, margin: "0 auto", display: "flex", gap: 6, padding: "0 30px" }}>
          {STEPS.map((s) => {
            const blockedForViewer = readOnly && (s.key === "upload" || s.key === "classify");
            const enabled = (s.key === "upload" || (active && sortedPeriods.length)) && !blockedForViewer;
            const isActive = step === s.key;
            return (
              <button key={s.key} disabled={!enabled} onClick={() => enabled && setStep(s.key)}
                style={{ display: "flex", alignItems: "center", gap: 7, padding: "14px 16px", background: "none", border: "none", borderBottom: isActive ? `3px solid ${GOLD}` : "3px solid transparent", color: isActive ? INK : enabled ? "#6b6455" : "#c9c2ae", fontWeight: isActive ? 700 : 500, fontSize: 14, cursor: enabled ? "pointer" : "not-allowed", fontFamily: "'IBM Plex Sans Arabic', sans-serif" }}>
                <s.icon size={16} /> {s.label}
              </button>
            );
          })}
        </div>
      </div>

      <div style={{ maxWidth: 1180, margin: "0 auto", padding: "34px 30px" }}>
        {step === "upload" && !readOnly && (
          <div>
            <SectionTitle icon={Upload} sub="ارفع ميزان مراجعة شهر واحد كل مرة — التطبيق هيحفظه كفترة مستقلة">رفع فترة جديدة</SectionTitle>
            <UploadZone title="رفع ميزان مراجعة الشهر" onFile={onFile} fileName={file} />
            {mode === "tree" && pendingRows && (
              <TreeConfirm rows={pendingRows} onConfirm={confirmTree} onFallback={() => { setMode("flat"); setMapping(detectFlatColumns(parsed) || { headerRow: 0, code: 0, name: 1, debit: 2, credit: 3 }); }} />
            )}
            {mode === "flat" && parsed && mapping && (
              <MappingConfirm rawRows={parsed} mapping={mapping} setMapping={setMapping} onConfirm={confirmFlat} />
            )}
            {sortedPeriods.length > 0 && (
              <div style={{ marginTop: 24 }}>
                <div style={{ fontWeight: 700, marginBottom: 10, color: INK, fontSize: 13.5 }}>الفترات المحفوظة</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {sortedPeriods.map((p) => (
                    <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 6, background: "#fff", border: `1px solid ${RULE}`, borderRadius: 20, padding: "5px 6px 5px 12px" }}>
                      <span style={{ fontSize: 12.5 }}>{MONTH_NAMES[p.month - 1]} {p.year}</span>
                      {!readOnly && (
                        <>
                          <button onClick={() => startEditPeriod(p)} style={{ background: "none", border: "none", cursor: "pointer", color: "#8a8271" }}><Pencil size={12} /></button>
                          {isOwner && <button onClick={() => deletePeriod(p.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#c95a52" }}><Trash2 size={12} /></button>}
                        </>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
        {step === "upload" && readOnly && (
          <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>لا توجد بيانات مرفوعة لهذه الشركة بعد، وصلاحيتك هنا مشاهدة فقط.</Card>
        )}

        {step === "classify" && draftRows && (
          <div>
            <SectionTitle icon={ClipboardList} sub="راجع التصنيف المقترح لكل حساب وعدّله إذا لزم الأمر">تصنيف الحسابات</SectionTitle>
            <SavePeriodBar year={draftYear} setYear={setDraftYear} month={draftMonth} setMonth={setDraftMonth} openingInv={draftOpeningInv} setOpeningInv={setDraftOpeningInv} onSave={finalizeDraft} isNew={draftIsNew} />
            <ClassifyTable rows={draftRows} setRows={setDraftRows} onNext={finalizeDraft} nextLabel={draftIsNew ? "حفظ الفترة والانتقال للقوائم" : "حفظ التعديلات"} />
          </div>
        )}
        {step === "classify" && !draftRows && (
          <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>اختر فترة من القائمة فوق أو ارفع فترة جديدة أولاً.</Card>
        )}

        {step === "statements" && active && (
          <div>
            <div style={{ display: "flex", gap: 8, marginBottom: 24, flexWrap: "wrap" }} className="no-print">
              {STMT_TABS.map((t) => (
                <button key={t.key} onClick={() => setStmtTab(t.key)}
                  style={{ display: "flex", alignItems: "center", gap: 7, padding: "9px 16px", borderRadius: 20, border: `1px solid ${stmtTab === t.key ? INK : RULE}`, background: stmtTab === t.key ? INK : "#fff", color: stmtTab === t.key ? CREAM : INK, fontSize: 13.5, fontWeight: 600, cursor: "pointer", fontFamily: "'IBM Plex Sans Arabic', sans-serif" }}>
                  <t.icon size={14} /> {t.label}
                </button>
              ))}
            </div>
            {stmtTab === "home" && (
              <HomeDashboard company={active} periods={sortedPeriods} year={selectedYear} setYear={setSelectedYear} availableYears={availableYears.length ? availableYears : [selectedYear]} zakatDue={active.zakat && active.zakat.adjustments ? active.zakat.adjustments.reduce((s, a) => s + a.sign * a.amount, 0) * ((active.zakat.rate ?? 2.5) / 100) : 0} />
            )}
            {stmtTab === "income_monthly" && (
              figures ? <DetailedIncomeStatement f={figures} title="قائمة الدخل الشهرية" periodLabel={monthlyPeriodLabel} sourceLabel={monthlySourceLabel} /> : <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>اختر فترة أولاً من القائمة فوق.</Card>
            )}
            {stmtTab === "income_annual" && (
              annualFigures ? <DetailedIncomeStatement f={annualFigures} title="قائمة الدخل السنوية" periodLabel={annualPeriodLabel} sourceLabel={annualSourceLabel} /> : <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>لا توجد فترات لسنة {selectedYear}.</Card>
            )}
            {stmtTab === "balance" && (
              figures ? <BalanceSheet f={figures} periodLabel={activePeriod ? `كما في نهاية ${MONTH_NAMES[activePeriod.month - 1]} ${activePeriod.year}` : ""} /> : <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>اختر فترة أولاً من القائمة فوق.</Card>
            )}
            {stmtTab === "equity" && activePeriod && figures && (
              <EquityStatement rows={activePeriod.rows} f={figures} opening={active.opening || {}} setOpening={(o) => patchCompany({ opening: o })} periodLabel={monthlyPeriodLabel} readOnly={readOnly} />
            )}
            {stmtTab === "perf" && figures && <PerformanceSummary f={figures} periodLabel={monthlyPeriodLabel} />}
          </div>
        )}

        {step === "zakat" && active && <ZakatModule data={active.zakat} setData={patchZakat} readOnly={readOnly} />}
      </div>
    </div>
  );
}

/* ---------------------------------- تسجيل الدخول ---------------------------------- */


function AuthScreen() {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    if (!email.trim() || password.length < 6) {
      setError("أدخل بريد إلكتروني صحيح وكلمة سر لا تقل عن 6 أحرف");
      return;
    }
    setLoading(true);
    try {
      if (mode === "signin") await auth.signInWithEmailAndPassword(email.trim(), password);
      else await auth.createUserWithEmailAndPassword(email.trim(), password);
    } catch (err) {
      const map = {
        "auth/user-not-found": "الحساب غير موجود، جرّب إنشاء حساب جديد",
        "auth/wrong-password": "كلمة السر غير صحيحة",
        "auth/email-already-in-use": "البريد الإلكتروني مستخدم بالفعل، جرّب تسجيل الدخول",
        "auth/invalid-email": "صيغة البريد الإلكتروني غير صحيحة",
      };
      setError(map[err.code] || err.message);
    }
    setLoading(false);
  };

  return (
    <div style={{ minHeight: "100vh", background: CREAM, fontFamily: "'IBM Plex Sans Arabic', sans-serif", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }} dir="rtl">
      <style>{FONTS}</style>
      <Card style={{ padding: 34, width: "100%", maxWidth: 380 }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <Stamp size={34} color={GOLD} />
          <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 24, fontWeight: 700, color: INK, marginTop: 8 }}>القوائم المالية والزكاة</div>
          <div style={{ fontSize: 12.5, color: "#847c69", marginTop: 4 }}>{mode === "signin" ? "تسجيل الدخول" : "إنشاء حساب جديد"}</div>
        </div>
        <form onSubmit={submit}>
          <label style={{ fontSize: 12.5, color: "#6b6455" }}>البريد الإلكتروني</label>
          <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required
            style={{ width: "100%", border: `1px solid ${RULE}`, borderRadius: 7, padding: "9px 10px", marginBottom: 12, marginTop: 4, direction: "ltr", fontFamily: "inherit", fontSize: 14 }} />
          <label style={{ fontSize: 12.5, color: "#6b6455" }}>كلمة السر</label>
          <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required
            style={{ width: "100%", border: `1px solid ${RULE}`, borderRadius: 7, padding: "9px 10px", marginBottom: 16, marginTop: 4, direction: "ltr", fontFamily: "inherit", fontSize: 14 }} />
          {error && <div style={{ background: "#faeceb", color: RED_INK, borderRadius: 7, padding: "8px 10px", fontSize: 12.5, marginBottom: 14 }}>{error}</div>}
          <button type="submit" disabled={loading} style={{ width: "100%", background: INK, color: CREAM, border: "none", borderRadius: 8, padding: "11px", fontFamily: "inherit", fontWeight: 700, fontSize: 14.5, cursor: loading ? "wait" : "pointer" }}>
            {loading ? "جارِ التحقق…" : mode === "signin" ? "دخول" : "إنشاء الحساب"}
          </button>
        </form>
        <div style={{ textAlign: "center", marginTop: 16, fontSize: 13 }}>
          {mode === "signin" ? (
            <span>مفيش حساب؟ <button onClick={() => { setMode("signup"); setError(""); }} style={{ background: "none", border: "none", color: GOLD, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>إنشاء حساب جديد</button></span>
          ) : (
            <span>عندك حساب؟ <button onClick={() => { setMode("signin"); setError(""); }} style={{ background: "none", border: "none", color: GOLD, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>تسجيل الدخول</button></span>
          )}
        </div>
      </Card>
    </div>
  );
}

function Root() {
  const [user, setUser] = useState(undefined);
  useEffect(() => {
    const unsub = auth.onAuthStateChanged(setUser);
    return unsub;
  }, []);
  if (user === undefined) {
    return (
      <div style={{ minHeight: "100vh", background: CREAM, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'IBM Plex Sans Arabic', sans-serif", color: "#847c69" }}>
        جارِ التحميل…
      </div>
    );
  }
  if (!user) return <AuthScreen />;
  return <MainApp user={user} />;
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);
