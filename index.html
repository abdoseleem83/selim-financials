/* ---------------------------------- وحدة الزكاة ---------------------------------- */

function round2(n) { return Math.round(n * 100) / 100; }

function zakatPartners(f) {
  // حصص الشركاء للزكاة من حسابات رأس المال (شركاء) فقط — نستبعد جاري الشركاء
  const capital = f.equityAccountRows.filter((r) => r.amount > 0 && /شرك|رأس المال|راس المال/.test(r.name) && !/جاري/.test(r.name));
  const list = capital.length ? capital : f.equityAccountRows.filter((r) => r.amount > 0 && !/جاري/.test(r.name));
  return list.length ? list : f.equityAccountRows.filter((r) => r.amount > 0);
}

function computeZakatTotal(zakatData) {
  if (!zakatData || !zakatData.rows || !zakatData.items) return 0;
  const f = computeFigures(zakatData.rows);
  const assetItems = zakatData.items.filter((i) => i.group === "asset");
  const liabilityItems = zakatData.items.filter((i) => i.group === "liability");
  const zakatBase = assetItems.reduce((s, i) => s + i.amount, 0) - liabilityItems.reduce((s, i) => s + i.amount, 0);
  const days = zakatData.hawlStart && zakatData.hawlEnd ? Math.round((new Date(zakatData.hawlEnd) - new Date(zakatData.hawlStart)) / 86400000) : 354;
  const proration = Math.min(days / 354, 1) || 1;
  const rate = zakatData.rate ?? 2.5;
  const nisab = (zakatData.goldPrice ?? 0) > 0 ? zakatData.goldPrice * 85 : 0;
  const partnersRaw = zakatPartners(f);
  const totalEquity = partnersRaw.reduce((s, p) => s + p.amount, 0);
  if (nisab <= 0) return 0;
  return partnersRaw.reduce((s, p) => {
    const share = zakatBase * (totalEquity ? p.amount / totalEquity : 0);
    return s + (share >= nisab ? share * (rate / 100) * proration : 0);
  }, 0);
}

function ZakatModule({ data, setData, readOnly }) {
  const [file, setFile] = useState(null);
  const [parsedTree, setParsedTree] = useState(null);
  const [rawFlat, setRawFlat] = useState(null);
  const [mode, setMode] = useState(null);
  const [mapping, setMapping] = useState(null);
  const [zDraftRows, setZDraftRows] = useState(null);

  const rows = data.rows;
  const f = useMemo(() => (rows ? computeFigures(rows) : null), [rows]);

  const onFile = async (fl) => {
    setFile(fl.name);
    const res = await parseWorkbook(fl);
    setMode(res.mode);
    if (res.mode === "tree") setParsedTree(res.parsed);
    else { setRawFlat(res.rawRows); setMapping(res.mapping); }
  };
  const buildZakatRows = () => {
    if (mode === "tree" && parsedTree) return leavesToRows(parsedTree, {}, null);
    if (mode === "flat" && rawFlat) return buildFlatRows(rawFlat, mapping);
    return [];
  };
  const saveZakatDraft = () => { setData({ rows: zDraftRows, items: null }); setZDraftRows(null); };

  useEffect(() => {
    if (f && !data.items) {
      const taxLiab = round2(Math.abs(f.liabilityCurrentRows.filter((r) => /ضريبة/.test(r.name)).reduce((s, r) => s + r.amount, 0)));
      setData({
        items: [
          { id: uid(), group: "asset", label: "النقدية والخزائن", amount: round2(f.cash) },
          { id: uid(), group: "asset", label: "المدينون الآخرون والأمانات", amount: 0 },
          { id: uid(), group: "asset", label: "ذمم العملاء المدينة (المرجوة)", amount: round2(Math.abs(f.customerDebt)) },
          { id: uid(), group: "asset", label: "دفعات مقدمة للموردين", amount: round2(Math.abs(f.supplierPrepaid)) },
          { id: uid(), group: "asset", label: "المخزون التجاري (بسعر السوق)", amount: round2(f.closingInventory) },
          { id: uid(), group: "liability", label: "موردون (أرصدة دائنة)", amount: round2(Math.abs(f.supplierDebt)) },
          { id: uid(), group: "liability", label: "دفعات مقدمة من العملاء", amount: round2(Math.abs(f.customerPrepaid)) },
          { id: uid(), group: "liability", label: "ضرائب مستحقة", amount: taxLiab },
        ],
      });
    }
    // eslint-disable-next-line
  }, [f]);

  const items = data.items || [];
  const assetItems = items.filter((i) => i.group === "asset");
  const liabilityItems = items.filter((i) => i.group === "liability");
  const totalAssets = assetItems.reduce((s, i) => s + i.amount, 0);
  const totalLiab = liabilityItems.reduce((s, i) => s + i.amount, 0);
  const zakatBase = totalAssets - totalLiab;

  const days = data.hawlStart && data.hawlEnd ? Math.round((new Date(data.hawlEnd) - new Date(data.hawlStart)) / 86400000) : 354;
  const proration = Math.min(days / 354, 1) || 1;
  const rate = data.rate ?? 2.5;
  const goldPrice = data.goldPrice ?? 0;
  const nisab = goldPrice > 0 ? goldPrice * 85 : 0;
  const baseMeetsNisab = nisab > 0 ? zakatBase >= nisab : null;

  const partnersRaw = f ? zakatPartners(f) : [];
  const totalEquity = partnersRaw.reduce((s, p) => s + p.amount, 0);
  const partners = partnersRaw.map((p) => {
    const pct = totalEquity ? p.amount / totalEquity : 0;
    const share = zakatBase * pct;
    // لا تُحتسب زكاة أي شريك إلا بعد تحديد النصاب (سعر الذهب × 85)
    const meets = nisab > 0 ? share >= nisab : false;
    const due = nisab > 0 && meets ? share * (rate / 100) * proration : 0;
    return { name: p.name, pct, share, meets, due };
  });
  const totalDue = partners.reduce((s, p) => s + p.due, 0);

  const updateItem = (id, patch) => setData({ items: items.map((i) => (i.id === id ? { ...i, ...patch } : i)) });
  const removeItem = (id) => setData({ items: items.filter((i) => i.id !== id) });
  const addItem = (group) => setData({ items: [...items, { id: uid(), group, label: "بند إضافي", amount: 0 }] });
  const [pickFor, setPickFor] = useState(null); // group being picked for
  const [pickSearch, setPickSearch] = useState("");
  const pickableAccounts = useMemo(() => {
    if (!rows) return [];
    return rows
      .map((r) => {
        const bal = (r.debit || 0) - (r.credit || 0);
        return { name: r.name, code: r.code, amount: Math.abs(bal), nature: bal >= 0 ? "مدين" : "دائن" };
      })
      .filter((r) => r.amount > 0.004)
      .sort((a, b) => b.amount - a.amount);
  }, [rows]);
  const addFromAccount = (acc) => {
    setData({ items: [...items, { id: uid(), group: pickFor, label: acc.name, amount: round2(acc.amount) }] });
    setPickFor(null); setPickSearch("");
  };

  const ItemsGroup = ({ title, list, group }) => (
    <div style={{ marginBottom: 20 }}>
      <div style={{ fontWeight: 700, color: GOLD, marginBottom: 8, fontSize: 13.5 }}>{title}</div>
      {list.map((it) => (
        <div key={it.id} style={{ border: `1px solid ${RULE}`, borderRadius: 9, padding: 10, marginBottom: 8, background: "#fff" }}>
          <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 6 }}>
            <input value={it.label} disabled={readOnly} onChange={(e) => updateItem(it.id, { label: e.target.value })}
              style={{ flex: 1, minWidth: 0, border: "none", fontFamily: "'IBM Plex Sans Arabic', sans-serif", fontSize: 13, fontWeight: 600, color: INK, background: "transparent", outline: "none" }} />
            {!readOnly && <button onClick={() => removeItem(it.id)} style={{ background: "none", border: "none", cursor: "pointer", color: RED_INK, flexShrink: 0 }}><Trash2 size={14} /></button>}
          </div>
          <NumInput value={it.amount} disabled={readOnly} onChange={(e) => updateItem(it.id, { amount: parseFloat(e.target.value) || 0 })} style={{ width: "100%" }} />
        </div>
      ))}
      {!readOnly && (
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <GhostBtn icon={Plus} onClick={() => { setPickFor(group); setPickSearch(""); }}>اختيار بند من الميزان</GhostBtn>
          <GhostBtn icon={Plus} onClick={() => addItem(group)}>بند يدوي</GhostBtn>
        </div>
      )}
      <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, borderTop: `2px solid ${INK}`, marginTop: 8, paddingTop: 6, fontSize: 13.5 }}>
        <span>{`إجمالي ${title}`}</span>
        <span style={{ direction: "ltr" }}>{fmt(list.reduce((s, i) => s + i.amount, 0))}</span>
      </div>
    </div>
  );

  return (
    <div>
      <SectionTitle icon={Landmark} sub="ارفع ميزان مراجعة منفصل بتاريخ بداية الحول لحساب وعاء الزكاة">حساب الزكاة الشرعية</SectionTitle>

      {!rows && !zDraftRows && !readOnly && (
        <>
          <UploadZone title="رفع ميزان مراجعة بداية الحول" onFile={onFile} fileName={file} />
          {mode === "tree" && parsedTree && (
            <TreeConfirm parsed={parsedTree} onConfirm={() => setZDraftRows(buildZakatRows())} onFallback={() => { setMode("flat"); setMapping(detectFlatColumns(rawFlat) || { headerRow: 0, code: 0, name: 1, debit: 2, credit: 3 }); }} />
          )}
          {mode === "flat" && rawFlat && mapping && (
            <MappingConfirm rawRows={rawFlat} mapping={mapping} setMapping={setMapping} onConfirm={() => setZDraftRows(buildFlatRows(rawFlat, mapping))} />
          )}
        </>
      )}
      {!rows && zDraftRows && !readOnly && (
        <div>
          <p style={{ fontSize: 13, color: "#6b6455", marginBottom: 12 }}>راجع تصنيف كل حساب، وخصوصًا حسابات حقوق الملكية (لازم كل شريك يكون حساب مصنّف "حقوق ملكية" لوحده حتى يظهر في حساب الزكاة الفردي)، ثم اضغط الزرار تحت لحفظ ميزان الزكاة.</p>
          <ClassifyTable rows={zDraftRows} setRows={setZDraftRows} onNext={saveZakatDraft} nextLabel="✓ حفظ ميزان الزكاة" />
        </div>
      )}
      {!rows && readOnly && (
        <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>لا توجد بيانات زكاة مرفوعة لهذه الشركة بعد، وصلاحيتك هنا مشاهدة فقط.</Card>
      )}

      {rows && f && (
        <div>
          {!readOnly && (
            <div style={{ display: "flex", justifyContent: "space-between", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
              <PrintBtn targetId="print-zakat" fileName="حساب الزكاة" />
              <GhostBtn icon={RefreshCw} onClick={() => { if (window.confirm("هيتم مسح ميزان الزكاة الحالي وتحتاج ترفع ميزان جديد. متأكد؟")) setData({ rows: null, items: null }); }}>رفع ميزان زكاة جديد</GhostBtn>
            </div>
          )}
          {readOnly && <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 10 }}><PrintBtn targetId="print-zakat" fileName="حساب الزكاة" /></div>}
          {pickFor && (
            <>
              <div onClick={() => setPickFor(null)} style={{ position: "fixed", inset: 0, zIndex: 60, background: "rgba(0,0,0,0.3)" }} />
              <div style={{ position: "fixed", top: "50%", left: "50%", transform: "translate(-50%,-50%)", zIndex: 61, background: "#fff", border: `1px solid ${RULE}`, borderRadius: 12, padding: 16, boxShadow: "0 12px 32px rgba(0,0,0,0.28)", width: "min(400px, 92vw)", maxHeight: "78vh", display: "flex", flexDirection: "column" }}>
                <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 8, color: INK }}>
                  اختر الحساب من ميزان الزكاة {pickFor === "asset" ? "(أصول زكوية)" : "(خصوم واجبة الخصم)"}
                </div>
                <input autoFocus placeholder="ابحث باسم الحساب…" value={pickSearch} onChange={(e) => setPickSearch(e.target.value)}
                  style={{ width: "100%", border: `1px solid ${RULE}`, borderRadius: 8, padding: "9px 12px", fontFamily: "inherit", fontSize: 13.5, marginBottom: 10 }} />
                <div style={{ overflowY: "auto", flex: 1, border: `1px solid ${RULE}`, borderRadius: 8 }}>
                  {pickableAccounts
                    .filter((a) => !pickSearch || a.name.includes(pickSearch) || (a.code || "").includes(pickSearch))
                    .slice(0, 200)
                    .map((a, i) => (
                      <button key={i} onClick={() => addFromAccount(a)}
                        style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, width: "100%", background: i % 2 ? "#fbf9f4" : "#fff", border: "none", borderBottom: `1px solid ${RULE}`, padding: "9px 10px", cursor: "pointer", fontFamily: "inherit", textAlign: "right" }}>
                        <span style={{ fontSize: 12.5, color: INK, flex: 1, minWidth: 0 }}>{a.name}</span>
                        <span style={{ fontSize: 9.5, color: "#8a8271" }}>{a.nature}</span>
                        <span style={{ direction: "ltr", fontSize: 12, fontWeight: 700, color: INK, whiteSpace: "nowrap" }}>{fmt(a.amount)}</span>
                      </button>
                    ))}
                  {pickableAccounts.length === 0 && <div style={{ padding: 16, textAlign: "center", color: "#847c69", fontSize: 12.5 }}>لا توجد حسابات في ميزان الزكاة.</div>}
                </div>
                <GhostBtn onClick={() => setPickFor(null)} style={{ marginTop: 10 }}>إلغاء</GhostBtn>
              </div>
            </>
          )}
          <div style={{ display: "flex", justifyContent: "flex-start", marginBottom: 10 }} className="no-print">
            <GhostBtn icon={ScrollText} onClick={() => exportStatementPdf({ targetId: "print-zakat", fileName: "حساب الزكاة", companyName: "", title: "حساب الزكاة" })}>تصدير PDF</GhostBtn>
          </div>
          <div id="print-zakat" className="print-area">
          <Card style={{ padding: 18, marginBottom: 16 }}>
            <div style={{ fontWeight: 700, color: INK, fontSize: 14, marginBottom: 10 }}>إعدادات الحول والنصاب</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12 }}>
              <div>
                <label style={{ fontSize: 11.5, color: "#6b6455", display: "block", marginBottom: 4 }}>بداية الحول</label>
                <input type="date" value={data.hawlStart || ""} disabled={readOnly} onChange={(e) => setData({ hawlStart: e.target.value })} style={{ width: "100%", border: `1px solid ${RULE}`, borderRadius: 7, padding: "8px 9px", fontFamily: "inherit", fontSize: 13 }} />
              </div>
              <div>
                <label style={{ fontSize: 11.5, color: "#6b6455", display: "block", marginBottom: 4 }}>نهاية الحول (تاريخ الميزان)</label>
                <input type="date" value={data.hawlEnd || ""} disabled={readOnly} onChange={(e) => setData({ hawlEnd: e.target.value })} style={{ width: "100%", border: `1px solid ${RULE}`, borderRadius: 7, padding: "8px 9px", fontFamily: "inherit", fontSize: 13 }} />
              </div>
              <div>
                <label style={{ fontSize: 11.5, color: "#6b6455", display: "block", marginBottom: 4 }}>نسبة الزكاة %</label>
                <NumInput value={rate} disabled={readOnly} onChange={(e) => setData({ rate: parseFloat(e.target.value) || 0 })} style={{ width: "100%" }} />
              </div>
              <div>
                <label style={{ fontSize: 11.5, color: GOLD, fontWeight: 700, display: "block", marginBottom: 4 }}>سعر جرام الذهب عيار 24 ★</label>
                <NumInput value={goldPrice} disabled={readOnly} onChange={(e) => setData({ goldPrice: parseFloat(e.target.value) || 0 })} style={{ width: "100%", borderColor: goldPrice > 0 ? RULE : GOLD }} />
              </div>
            </div>
            <div style={{ marginTop: 12, padding: 12, borderRadius: 8, background: goldPrice > 0 ? "#eef2e9" : "#fdf6e9", border: `1px solid ${goldPrice > 0 ? GREEN_INK : GOLD}` }}>
              {goldPrice > 0 ? (
                <div style={{ fontSize: 13 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span>النصاب الشرعي = {fmt(goldPrice)} × 85 جرام</span>
                    <span style={{ direction: "ltr", fontWeight: 700, color: GREEN_INK }}>{fmt(nisab)}</span>
                  </div>
                  <div style={{ fontSize: 11, color: "#6b6455" }}>مدة الحول: {days} يوم · نسبة التناسب {(proration * 100).toFixed(1)}%</div>
                </div>
              ) : (
                <div style={{ fontSize: 12.5, color: GOLD, fontWeight: 600 }}>
                  ⚠️ أدخل سعر جرام الذهب عيار 24 أولاً — لن تُحتسب زكاة أي شريك قبل تحديد النصاب الشرعي (85 جرام ذهب).
                </div>
              )}
            </div>
          </Card>

          <Card style={{ padding: 20, marginBottom: 16 }}>
            <div style={{ fontWeight: 700, marginBottom: 4, color: INK, fontSize: 15 }}>أ ▎ الأصول الزكوية</div>
            <ItemsGroup title="الأصول الزكوية" list={assetItems} group="asset" />
            <div style={{ fontWeight: 700, marginBottom: 4, color: INK, fontSize: 15 }}>ب ▎ الخصوم واجبة الخصم</div>
            <ItemsGroup title="الخصوم واجبة الخصم" list={liabilityItems} group="liability" />

            <div style={{ background: "#f4efe2", borderRadius: 8, padding: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, fontSize: 14.5 }}>
                <span>ج ▎ وعاء الزكاة الصافي</span>
                <span style={{ direction: "ltr" }}>{fmt(zakatBase)}</span>
              </div>
              {nisab > 0 && (
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, marginTop: 6, color: baseMeetsNisab ? GREEN_INK : RED_INK }}>
                  <span>هل بلغ الوعاء النصاب؟</span>
                  <span>{baseMeetsNisab ? "✅ نعم" : "❌ لا"}</span>
                </div>
              )}
            </div>
          </Card>

          {partners.length > 0 && (
            <Card style={{ padding: 20, marginBottom: 16 }}>
              <div style={{ fontWeight: 700, marginBottom: 4, color: INK, fontSize: 15 }}>د ▎ زكاة كل شريك منفردة</div>
              <p style={{ fontSize: 11.5, color: "#847c69", marginBottom: 12 }}>النصاب يُقاس على حصة كل شريك من وعاء الزكاة على حدة (حسب نسبته في حسابات حقوق الملكية بميزان الزكاة)</p>
              {partners.map((p, i) => (
                <div key={i} style={{ borderBottom: i < partners.length - 1 ? `1px solid ${RULE}` : "none", padding: "8px 0" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
                    <span>حصة {p.name} ({(p.pct * 100).toFixed(2)}%) من وعاء الزكاة</span>
                    <span style={{ direction: "ltr" }}>{fmt(p.share)}</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, color: p.meets ? GREEN_INK : "#8a8271", marginTop: 3 }}>
                    <span>➤ زكاة {p.name} المستحقة ({rate}%)</span>
                    <span style={{ direction: "ltr", fontWeight: 700 }}>{p.meets ? fmt(p.due) : (nisab > 0 ? "❌ لم يبلغ النصاب" : "—")}</span>
                  </div>
                </div>
              ))}
              <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, borderTop: `2px solid ${INK}`, marginTop: 10, paddingTop: 8, fontSize: 14 }}>
                <span>◆ إجمالي الزكاة المستحقة (من بلغ النصاب فقط)</span>
                <span style={{ direction: "ltr", color: GOLD }}>{fmt(totalDue)}</span>
              </div>
            </Card>
          )}

          <Card style={{ padding: 20, background: INK, color: CREAM, textAlign: "center" }}>
            <div style={{ fontSize: 12.5, opacity: 0.8 }}>عدد أيام الحول: {days} يوم · نسبة التناسب {(proration * 100).toFixed(1)}%</div>
            <div style={{ fontSize: 12.5, opacity: 0.8, marginTop: 4 }}>الزكاة المستحقة الإجمالية</div>
            <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 32, color: GOLD, fontWeight: 700 }}>{fmt(totalDue)}</div>
          </Card>
          </div>
        </div>
      )}
    </div>
  );
}

                    <td style={{ padding: "5px 8px", fontSize: 10.5, color: (!r.category || r.category === "ignore") ? RED_INK : "#6b6455", whiteSpace: "nowrap" }}>{catLabel(r.category)}</td>
                    <td style={{ padding: "5px 8px", textAlign: "left", direction: "ltr", whiteSpace: "nowrap" }}>{r.debit ? fmt(r.debit) : ""}</td>
                    <td style={{ padding: "5px 8px", textAlign: "left", direction: "ltr", whiteSpace: "nowrap" }}>{r.credit ? fmt(r.credit) : ""}</td>
                  </tr>
                ))}
                <tr style={{ background: INK, color: "#fff", fontWeight: 700 }}>
                  <td colSpan={3} style={{ padding: "8px", fontSize: 12.5 }}>الإجمالي</td>
                  <td style={{ padding: "8px", textAlign: "left", direction: "ltr", whiteSpace: "nowrap" }}>{fmt(totD)}</td>
                  <td style={{ padding: "8px", textAlign: "left", direction: "ltr", whiteSpace: "nowrap" }}>{fmt(totC)}</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div style={{ padding: "10px 12px", textAlign: "center", background: Math.abs(diff) < 1 ? "#eaf3ec" : "#faeceb", color: Math.abs(diff) < 1 ? GREEN_INK : RED_INK, fontSize: 12.5, fontWeight: 700 }}>
            {Math.abs(diff) < 1 ? "✔ الميزان متزن (إجمالي المدين = إجمالي الدائن)" : `⚠ فرق قدره ${fmt(diff)} بين المدين والدائن`}
          </div>
        </div>
      </Card>
    </div>
  );
}

function forceUpdate() {
  if (!window.confirm("سيتم تحديث التطبيق لأحدث نسخة وإعادة تحميل الصفحة. متابعة؟")) return;
  try {
    if (window.caches && caches.keys) {
      caches.keys().then((keys) => Promise.all(keys.map((k) => caches.delete(k)))).finally(() => {
        window.location.href = window.location.pathname + "?v=" + Date.now();
      });
      return;
    }
  } catch (e) {}
  window.location.href = window.location.pathname + "?v=" + Date.now();
}

function backupAll(companies) {
  try {
    const payload = {
      app: "Selim Finance",
      version: APP_VERSION,
      exportedAt: new Date().toISOString(),
      companies: (companies || []).map((c) => ({ ...c })),
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const d = new Date();
    a.href = url;
    a.download = `نسخة احتياطية - Selim Finance - ${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}.json`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 3000);
  } catch (e) { alert("تعذّر إنشاء النسخة الاحتياطية: " + e.message); }
}

function newCompanyDoc(name, user) {
  return {
    name,
    legalName: "",
    ownerUid: user.uid,
    ownerEmail: user.email,
    editorEmails: [],
    viewerEmails: [],
    periods: [],
    periodCount: 0,
    opening: {},
    zakat: { rows: null, hawlStart: "", hawlEnd: "", adjustments: null, rate: 2.5 },

}

function getRole(company, user) {
  if (!company || !user) return null;
  if (company.ownerUid === user.uid) return "owner";
  if ((company.editorEmails || []).includes(user.email)) return "editor";
  if ((company.viewerEmails || []).includes(user.email)) return "viewer";
  return null;
}

function MainApp({ user }) {
  const [companies, setCompanies] = useState([]);
  const [loadingCompanies, setLoadingCompanies] = useState(true);
  const [activeId, setActiveId] = useState(null);
  const [screen, setScreen] = useState("companies");

  const [file, setFile] = useState(null);
  const [parsedTree, setParsedTree] = useState(null);
  const [pendingRows, setPendingRows] = useState(null);
  const [mode, setMode] = useState(null);
  const [mapping, setMapping] = useState(null);
  const [rawRowsFlat, setRawRowsFlat] = useState(null);

  const [draftParsed, setDraftParsed] = useState(null); // {leaves, parents, nameByCode}
  const [draftClassMap, setDraftClassMap] = useState({}); // parentCode -> category
  const [draftRows, setDraftRows] = useState(null); // flat mode fallback
  const [draftIsNew, setDraftIsNew] = useState(true);

  // خريطة التصنيف المحفوظة عالميًا (مشتركة لكل الشركات) — code:XXX / name:YYY -> category
  const [savedClass, setSavedClass] = useState({});
  useEffect(() => {
    const ref = db.collection("settings").doc(`classmap_${user.uid}`);
    const unsub = ref.onSnapshot((snap) => {
      if (snap.exists) setSavedClass(snap.data().map || {});
    }, () => {});
    return unsub;
  }, [user.uid]);
  const persistClassifications = (classMap, parsed) => {
    // خزّن التصنيف بالكود وبالاسم (عشان لو الكود اتغير يفتكر بالاسم)
    const add = {};
    Object.entries(classMap).forEach(([code, cat]) => {
      if (!cat) return;
      add[`code:${code}`] = cat;
      const nm = parsed.nameByCode[code];
      if (nm) add[`name:${nm}`] = cat;
    });
    const merged = { ...savedClass, ...add };
    db.collection("settings").doc(`classmap_${user.uid}`).set({ map: merged }, { merge: true }).catch(() => {});
  };

  const [activePeriodId, setActivePeriodId] = useState(null);
  const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());

  useEffect(() => {
    const merged = {};
    let received = 0;
    const finishInit = () => { received++; if (received >= 3) setLoadingCompanies(false); };
    const apply = (snap) => {
      snap.docChanges().forEach((change) => {
        if (change.type === "removed") delete merged[change.doc.id];
        else merged[change.doc.id] = { id: change.doc.id, ...change.doc.data() };
      });
      setCompanies(Object.values(merged).sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)));
    };
    const unsub1 = db.collection("companies").where("ownerUid", "==", user.uid).onSnapshot((s) => { apply(s); finishInit(); }, () => finishInit());
    const unsub2 = db.collection("companies").where("editorEmails", "array-contains", user.email).onSnapshot((s) => { apply(s); finishInit(); }, () => finishInit());
    const unsub3 = db.collection("companies").where("viewerEmails", "array-contains", user.email).onSnapshot((s) => { apply(s); finishInit(); }, () => finishInit());
    return () => { unsub1(); unsub2(); unsub3(); };
  }, [user.uid, user.email]);

  const active = companies.find((c) => c.id === activeId) || null;
  const role = getRole(active, user);
  const readOnly = role === "viewer";
  const isOwner = role === "owner";

  // ===== الفترات مخزّنة كمستندات مستقلة داخل companies/{id}/periods =====
  const [periodDocs, setPeriodDocs] = useState([]);
  const [periodsLoading, setPeriodsLoading] = useState(false);
  const [migrating, setMigrating] = useState(false);
  const lastCountRef = useRef(null);

  useEffect(() => {
    if (!activeId) { setPeriodDocs([]); return; }
    lastCountRef.current = null;
    setPeriodsLoading(true);
    const unsub = db.collection("companies").doc(activeId).collection("periods")
      .onSnapshot((snap) => {
        const list = snap.docs.map((d) => ({ ...d.data(), id: d.id }));
        setPeriodDocs(list);
        setPeriodsLoading(false);
        // ملخّص خفيف على مستند الشركة لعرضه في قائمة الشركات
        if (lastCountRef.current !== list.length) {
          lastCountRef.current = list.length;
          db.collection("companies").doc(activeId).update({ periodCount: list.length }).catch(() => {});
        }
      }, (e) => { console.error("تعذر تحميل الفترات:", e); setPeriodsLoading(false); });
    return unsub;
  }, [activeId]);

  // ترحيل تلقائي: لو الشركة لسه فيها periods قديمة داخل المستند، انقلها لمستندات مستقلة
  useEffect(() => {
    if (!active || !activeId || readOnly || migrating) return;
    const legacy = active.periods;
    if (!Array.isArray(legacy) || legacy.length === 0) return;
    setMigrating(true);
    (async () => {
      try {
        const col = db.collection("companies").doc(activeId).collection("periods");
        // اكتب على دفعات (الحد 500 عملية للدفعة)
        for (let i = 0; i < legacy.length; i += 100) {
          const batch = db.batch();
          legacy.slice(i, i + 100).forEach((p) => {
            const pid = p.id || uid();
            batch.set(col.doc(pid), { ...p, id: pid });
          });
          await batch.commit();
        }
        await db.collection("companies").doc(activeId).update({ periods: [] });
        console.log("تم ترحيل الفترات إلى مستندات مستقلة:", legacy.length);
      } catch (e) {
        console.error("فشل ترحيل الفترات:", e);
        alert("تعذّر ترحيل البيانات للبنية الجديدة: " + e.message);
      }
      setMigrating(false);
    })();
    // eslint-disable-next-line
  }, [active && active.id, active && (active.periods || []).length]);

  const periods = periodDocs;
  const sortedPeriods = [...periods].sort((a, b) => (a.year - b.year) || (a.month - b.month));
  const activePeriod = sortedPeriods.find((p) => p.id === activePeriodId) || sortedPeriods[sortedPeriods.length - 1] || null;
  const availableYears = Array.from(new Set(sortedPeriods.map((p) => p.year))).sort();

  // ===== تعديل تصنيف حساب من داخل القوائم =====
  const GROUP_TO_CAT = { cash: "asset_current", receivables: "asset_current", debtors: "asset_current", inventory: "asset_current", noncurrent: "asset_noncurrent", creditors: "liability_current", equity: "equity", ignore: "ignore" };
  const reclassifyAccount = async (accountName, group) => {
    if (readOnly || !activeId) return;
    const cat = GROUP_TO_CAT[group];
    const affected = periods.filter((p) => (p.rows || []).some((r) => r.name === accountName));
    if (!affected.length) { alert("لم يتم العثور على الحساب في الفترات المحفوظة."); return; }
    if (!window.confirm(`نقل حساب «${accountName}» إلى «${group === "ignore" ? "المستبعدة" : group}» في ${affected.length} فترة؟ سيُطبَّق أيضاً على أي ميزان ترفعه لاحقاً.`)) return;
    try {
      const col = db.collection("companies").doc(activeId).collection("periods");
      for (let i = 0; i < affected.length; i += 50) {
        const batch = db.batch();
        affected.slice(i, i + 50).forEach((p) => {
          const rows2 = p.rows.map((r) => (r.name === accountName ? { ...r, category: cat, bsGroup: group === "ignore" ? null : group, subtype: null } : r));
          batch.update(col.doc(p.id), { rows: rows2 });
        });
        await batch.commit();
      }
      // احفظ التفضيل عالمياً ليُطبَّق على أي رفع جديد
      db.collection("settings").doc(`classmap_${user.uid}`).set(
        { map: { ...savedClass, [`name:${accountName}`]: cat, [`bsgroup:${accountName}`]: group } },
        { merge: true }
      ).catch(() => {});
      alert("تم تعديل تصنيف الحساب.");
    } catch (e) { alert("تعذّر التعديل: " + e.message); }
  };

  const patchCompany = (patch) => {
    if (!activeId || readOnly) return;
    db.collection("companies").doc(activeId).update(patch).catch((e) => console.error("تعذر الحفظ:", e));
  };
  const patchZakat = (patch) => {
    if (!activeId || readOnly) return;
    const upd = {};
    Object.keys(patch).forEach((k) => { upd[`zakat.${k}`] = patch[k]; });
    db.collection("companies").doc(activeId).update(upd).catch((e) => console.error("تعذر الحفظ:", e));
  };
  const savePeriod = (periodObj) => {
    if (!activeId || readOnly) return;
    const pid = periodObj.id || uid();
    db.collection("companies").doc(activeId).collection("periods").doc(pid)
      .set({ ...periodObj, id: pid })
      .catch((e) => alert("تعذر حفظ الفترة: " + e.message));
  };
  const savePeriodsBatch = async (list) => {
    if (!activeId || readOnly) return;
    const col = db.collection("companies").doc(activeId).collection("periods");
    for (let i = 0; i < list.length; i += 100) {
      const batch = db.batch();
      list.slice(i, i + 100).forEach((p) => {
        const pid = p.id || uid();
        batch.set(col.doc(pid), { ...p, id: pid });
      });
      await batch.commit();
    }
  };
  const deletePeriod = (id) => {
    if (!isOwner) return;
    db.collection("companies").doc(activeId).collection("periods").doc(id).delete()
      .catch((e) => alert("تعذر الحذف: " + e.message));
    if (activePeriodId === id) setActivePeriodId(null);
  };

  // ===== أرشفة السنوات (مستندات مستقلة كذلك) =====
  const [archives, setArchives] = useState([]);
  useEffect(() => {
    if (!activeId) { setArchives([]); return; }
    const unsub = db.collection("companies").doc(activeId).collection("archives")
      .onSnapshot((snap) => setArchives(snap.docs.map((d) => ({ ...d.data(), id: d.id }))), () => {});
    return unsub;
  }, [activeId]);

  const archiveYear = async (yr) => {
    if (!isOwner) return;
    const yearPs = periods.filter((p) => p.year === yr);
    if (!yearPs.length) { alert("لا توجد فترات لهذه السنة."); return; }
    if (!window.confirm(`سيتم أرشفة سنة ${yr} (${yearPs.length} شهر) ونقلها خارج القوائم النشطة. تقدر ترجّعها في أي وقت من الأرشيف. متابعة؟`)) return;
    try {
      const cref = db.collection("companies").doc(activeId);
      const archId = uid();
      // كل شهر مؤرشف في مستند مستقل تحت الأرشيف
      await cref.collection("archives").doc(archId).set({ id: archId, year: yr, archivedAt: Date.now(), count: yearPs.length });
      for (let i = 0; i < yearPs.length; i += 100) {
        const batch = db.batch();
        yearPs.slice(i, i + 100).forEach((p) => {
          batch.set(cref.collection("archives").doc(archId).collection("periods").doc(p.id), p);
          batch.delete(cref.collection("periods").doc(p.id));
        });
        await batch.commit();
      }
      setActivePeriodId(null);
      alert(`تمت أرشفة سنة ${yr} بنجاح.`);
    } catch (e) { alert("تعذّرت الأرشفة: " + e.message); }
  };

  const restoreArchive = async (entryId) => {
    if (!isOwner) return;
    const entry = archives.find((a) => a.id === entryId);
    if (!entry) return;
    if (!window.confirm(`استرجاع سنة ${entry.year} من الأرشيف إلى القوائم النشطة؟`)) return;
    try {
      const cref = db.collection("companies").doc(activeId);
      const snap = await cref.collection("archives").doc(entryId).collection("periods").get();
      const list = snap.docs.map((d) => ({ ...d.data(), id: d.id }));
      for (let i = 0; i < list.length; i += 100) {
        const batch = db.batch();
        list.slice(i, i + 100).forEach((p) => {
          batch.set(cref.collection("periods").doc(p.id), p);
          batch.delete(cref.collection("archives").doc(entryId).collection("periods").doc(p.id));

      alert(`تم استرجاع سنة ${entry.year}.`);
    } catch (e) { alert("تعذّر الاسترجاع: " + e.message); }
  };

  const addCompany = (name) => {
    db.collection("companies").add(newCompanyDoc(name, user)).then((ref) => {
      setActiveId(ref.id);
      setScreen("workspace");
      setStep("upload");
      resetUploadState();
    });

  const openCompany = (id) => {
    const c = companies.find((x) => x.id === id);
    setActiveId(id);
    setScreen("workspace");
    const ps = (c && c.periods) || [];
    const latest = [...ps].sort((a, b) => (a.year - b.year) || (a.month - b.month)).pop();
    setActivePeriodId(latest ? latest.id : null);
    if (latest) setSelectedYear(latest.year);
    setStep(latest ? "statements" : "upload");
    setStmtTab("home");
    resetUploadState();
  };
  const openCompanyZakat = (id) => {
    const c = companies.find((x) => x.id === id);
    setActiveId(id);
    setScreen("workspace");
    const ps = (c && c.periods) || [];
    const latest = [...ps].sort((a, b) => (a.year - b.year) || (a.month - b.month)).pop();
    setActivePeriodId(latest ? latest.id : null);
    if (latest) setSelectedYear(latest.year);
    setStep("zakat");
    resetUploadState();
  };
  const deleteCompany = (id) => db.collection("companies").doc(id).delete();
  const renameCompany = (id, name) => db.collection("companies").doc(id).update({ name });

  const shareAccess = (companyId, email, roleToGrant) => {
    const field = roleToGrant === "editor" ? "editorEmails" : "viewerEmails";
    db.collection("companies").doc(companyId).update({ [field]: firebase.firestore.FieldValue.arrayUnion(email.trim().toLowerCase()) });
  };
  const revokeAccess = (companyId, email, roleToRevoke) => {
    const field = roleToRevoke === "editor" ? "editorEmails" : "viewerEmails";
    db.collection("companies").doc(companyId).update({ [field]: firebase.firestore.FieldValue.arrayRemove(email) });
  };

  const resetUploadState = () => { setFile(null); setParsedTree(null); setPendingRows(null); setMode(null); setMapping(null); setRawRowsFlat(null); };

  // ابنِ classMap مبدئية من التصنيفات المحفوظة (بالكود ثم بالاسم)
  const seedClassMap = (parsed) => {
    const cm = {};
    parsed.parents.forEach((p) => {
      const byCode = savedClass[`code:${p.code}`];
      const byName = savedClass[`name:${p.name}`];
      const guess = guessCategory(p.name, p.code, p.chain.map((c) => c.name).join(" "));
      if (byCode) cm[p.code] = byCode;
      else if (byName) cm[p.code] = byName;
      // نترك الباقي فاضي عشان المستخدم يحدده (أو التخمين وقت التحويل)
    });
    return cm;
  };

  const onFile = async (f) => {
    setFile(f.name);
    const res = await parseWorkbook(f);
    setMode(res.mode);
    if (res.mode === "tree") { setParsedTree(res.parsed); setPendingRows(res.parsed); }
    else { setRawRowsFlat(res.rawRows); setMapping(res.mapping); }
  };

  const [batchBusy, setBatchBusy] = useState(false);
  const onFiles = async (files) => {
    setBatchBusy(true);
    try {
      const sorted = [...files].sort((a, b) => a.name.localeCompare(b.name, "ar", { numeric: true }));
      let baseMonth, baseYear;
      if (sortedPeriods.length) {
        const last = sortedPeriods[sortedPeriods.length - 1];
        baseMonth = last.month === 12 ? 1 : last.month + 1;
        baseYear = last.month === 12 ? last.year + 1 : last.year;
      } else { baseMonth = 1; baseYear = new Date().getFullYear(); }
      const newPeriods = [];
      for (let i = 0; i < sorted.length; i++) {
        const res = await parseWorkbook(sorted[i]);
        let rows;
        if (res.mode === "tree") { rows = leavesToRows(res.parsed, seedClassMap(res.parsed), savedClass); }
        else rows = buildFlatRows(res.rawRows, res.mapping);
        let m = baseMonth + i, y = baseYear;
        while (m > 12) { m -= 12; y += 1; }
        newPeriods.push({ id: uid(), year: y, month: m, rows, openingInventory: 0, cumulative: true, uploadedAt: Date.now(), fileName: sorted[i].name });
      }
      // احذف أي شهر مكرر ثم اكتب الشهور الجديدة كمستندات مستقلة
      const dupes = periods.filter((p) => newPeriods.some((np) => np.year === p.year && np.month === p.month));
      for (const d of dupes) {
        await db.collection("companies").doc(activeId).collection("periods").doc(d.id).delete().catch(() => {});
      }
      await savePeriodsBatch(newPeriods);
      const firstNew = newPeriods[0];
      if (firstNew) { setActivePeriodId(firstNew.id); setSelectedYear(firstNew.year); }
      setStep("statements"); setStmtTab("home");
      alert(`تم رفع ${newPeriods.length} ميزان وتوزيعهم على الشهور تلقائيًا حسب التصنيفات المحفوظة. راجع أي شهر من «رفع فترة» ← تعديل لو احتجت.`);
    } catch (e) { alert("حصل خطأ أثناء رفع الملفات: " + e.message); }
    setBatchBusy(false);
  };

  const setDraftDates = () => {
    if (sortedPeriods.length) {
      const last = sortedPeriods[sortedPeriods.length - 1];
      const m = last.month === 12 ? 1 : last.month + 1;
      const y = last.month === 12 ? last.year + 1 : last.year;
      const firstOfYear = sortedPeriods.find((p) => p.year === y);
      setDraftOpeningInv(firstOfYear ? (firstOfYear.openingInventory || 0) : (last.month === 12 ? round2(computeFigures(last.rows, 0).closingInventory) : (last.openingInventory || 0)));
      setDraftYear(y); setDraftMonth(m);
    } else {
      const now = new Date();
      setDraftOpeningInv(0); setDraftYear(now.getFullYear()); setDraftMonth(now.getMonth() + 1);
    }
  };

  const confirmTree = () => {
    setDraftParsed(parsedTree);
    setDraftClassMap(seedClassMap(parsedTree));
    setDraftRows(null);
    setDraftIsNew(true);
    setDraftPeriodId(uid());
    setDraftCumulative(true);
    setDraftDates();
    setStep("classify");
  };
  const confirmFlat = () => {
    setDraftParsed(null);
    setDraftRows(buildFlatRows(rawRowsFlat, mapping));
    setDraftIsNew(true);
    setDraftPeriodId(uid());
    setDraftCumulative(true);
    setDraftDates();
    setStep("classify");
  };

  const startEditPeriod = (p) => {
    // التعديل يشتغل على الصفوف النهائية المحفوظة (flat) عبر ClassifyTable
    setDraftParsed(null);
    setDraftRows(p.rows);
    setDraftIsNew(false);
    setDraftPeriodId(p.id);
    setDraftYear(p.year);
    setDraftMonth(p.month);
    setDraftOpeningInv(p.openingInventory || 0);
    setDraftCumulative(p.cumulative !== false);
    setStep("classify");
  };

  const finalizeDraft = () => {
    let rows;
    if (draftParsed) {
      rows = leavesToRows(draftParsed, draftClassMap, savedClass);
      persistClassifications(draftClassMap, draftParsed);
    } else {
      rows = draftRows;
    }
    const periodObj = { id: draftPeriodId, year: draftYear, month: draftMonth, rows, openingInventory: draftOpeningInv, cumulative: draftCumulative, uploadedAt: Date.now() };
    savePeriod(periodObj);
    setActivePeriodId(draftPeriodId);
    setSelectedYear(draftYear);
    setDraftParsed(null); setDraftRows(null); setDraftClassMap({});
    setStep("statements");
    setStmtTab("income_monthly");
    resetUploadState();
  };

  const yearOpeningInvOf = (y) => {
    const first = sortedPeriods.find((p) => p.year === y);
    return first ? (first.openingInventory || 0) : 0;
  };

  // أرقام الشهر النشط: قائمة الدخل للشهر وحده (بعد طرح التراكمي السابق لو الميزان تراكمي)
  const figures = useMemo(() => (activePeriod ? periodFigures(sortedPeriods, activePeriod, yearOpeningInvOf(activePeriod.year)) : null), [activePeriod, sortedPeriods]);
  const monthlyPeriodLabel = activePeriod ? `قائمة الدخل الشهرية ◆ ${MONTH_NAMES[activePeriod.month - 1]} ${activePeriod.year}` : "";
  const monthlySourceLabel = activePeriod ? `من واقع ميزان مراجعة شهر ${MONTH_NAMES[activePeriod.month - 1]} ${activePeriod.year}` : "";

  // المركز المالي: أرصدة الميزان الحالي كما هي، وصافي الربح التراكمي منذ بداية السنة
  // (وفق العرض المحاسبي السليم: الأصول = الخصوم + حقوق الملكية + أرباح الفترة المتجمعة)
  const balanceFigures = useMemo(() => {
    if (!activePeriod) return null;
    const asOf = computeFigures(activePeriod.rows, 0);
    const ytd = yearFigures(sortedPeriods.filter((p) => p.year === activePeriod.year && p.month <= activePeriod.month), activePeriod.year, yearOpeningInvOf(activePeriod.year));
    const ytdProfit = ytd ? ytd.netProfit : asOf.netProfit;
    const totalEquity = asOf.equityAccounts + ytdProfit;
    return { ...asOf, netProfit: ytdProfit, totalEquity, balanceDiff: asOf.totalAssets - (asOf.totalLiab + totalEquity) };
  }, [activePeriod, sortedPeriods]);

  const yearPeriods = sortedPeriods.filter((p) => p.year === selectedYear);
  const annualFigures = useMemo(() => yearFigures(sortedPeriods, selectedYear, yearOpeningInvOf(selectedYear)), [sortedPeriods, selectedYear]);
  const annualPeriodLabel = `قائمة الدخل السنوية ◆ ${selectedYear}`;
  const annualSourceLabel = `${yearPeriods.length} ${yearPeriods.length === 1 ? "شهر فعلي" : "أشهر فعلية"} من واقع الموازين الشهرية`;

  // حصص الشركاء لتوزيع الأرباح (من حسابات حقوق الملكية في آخر ميزان)
  const partners = useMemo(() => {
    if (!activePeriod) return [];
    const lastF = computeFigures(activePeriod.rows, 0);
    const eq = lastF.equityAccountRows.filter((r) => r.amount > 0);
    const total = eq.reduce((s, p) => s + p.amount, 0);
    if (!total) return [];
    return eq.map((p) => ({ name: p.name, pct: p.amount / total }));
  }, [activePeriod]);

  if (screen === "companies") {
    return (
      <div style={{ minHeight: "100vh", background: CREAM, fontFamily: "'IBM Plex Sans Arabic', sans-serif" }} dir="rtl">
        <style>{`:root{--selim-logo:url("${LOGO_URI}");}`}{FONTS}</style>
        <div style={{ background: INK, color: CREAM, padding: "14px 14px" }} className="no-print">
          <div style={{ maxWidth: 1180, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, flexWrap: "wrap" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ background: "#FEFDFB", borderRadius: 8, padding: "6px 9px" }}>
                <img src={LOGO_URI} alt="Selim Finance" style={{ height: 22, display: "block" }} />
              </div>
              <div>
                <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 16, fontWeight: 700 }}>القوائم المالية والزكاة <span style={{ fontSize: 10, opacity: 0.6, fontFamily: "'IBM Plex Sans Arabic', sans-serif" }}>· نسخة {APP_VERSION}</span></div>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
              <button onClick={forceUpdate} title="تحديث النسخة" style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 7, padding: "6px 10px", color: CREAM, cursor: "pointer", display: "flex", alignItems: "center", gap: 5, fontSize: 11.5 }}>
                <RefreshCw size={12} /> تحديث
              </button>
              <button onClick={() => backupAll(companies)} title="نسخة احتياطية" style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 7, padding: "6px 10px", color: CREAM, cursor: "pointer", display: "flex", alignItems: "center", gap: 5, fontSize: 11.5 }}>
                <FileSpreadsheet size={12} /> نسخة احتياطية
              </button>
              <div style={{ fontSize: 10.5, opacity: 0.85, direction: "ltr" }}>{user.email}</div>
              <button onClick={() => auth.signOut()} style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 7, padding: "6px 10px", color: CREAM, cursor: "pointer", display: "flex", alignItems: "center", gap: 5, fontSize: 11.5 }}>
                <LogOut size={12} /> خروج
              </button>
            </div>
          </div>
        </div>
        <div style={{ maxWidth: 1180, margin: "0 auto", padding: "18px 14px" }}>
          <div style={{ fontSize: 11, color: "#847c69", marginBottom: 14, display: "flex", alignItems: "center", gap: 6 }}>
            <Check size={12} color={GREEN_INK} /> بياناتك محفوظة على السحابة ومتزامنة على أي جهاز تسجّل دخول منه بنفس الحساب
          </div>
          {loadingCompanies ? (
            <div style={{ color: "#847c69", fontSize: 13 }}>جارِ تحميل الشركات…</div>
          ) : (
            <CompanyList companies={companies} user={user} onOpen={openCompany} onOpenZakat={openCompanyZakat} onAdd={addCompany} onDelete={deleteCompany} onRename={renameCompany} onShare={shareAccess} onRevoke={revokeAccess} />
          )}
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: CREAM, fontFamily: "'IBM Plex Sans Arabic', sans-serif" }} dir="rtl">
      <style>{`:root{--selim-logo:url("${LOGO_URI}");}`}{FONTS}</style>

      <div style={{ background: INK, color: CREAM, padding: "10px 14px" }} className="no-print">
        <div style={{ maxWidth: 1180, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 8 }}>
            <button onClick={() => setScreen("companies")} style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 7, padding: "6px 10px", color: CREAM, cursor: "pointer", display: "flex", alignItems: "center", gap: 5, fontSize: 12.5, flexShrink: 0 }}>
              <ArrowRight size={13} /> الشركات
            </button>
            <img src={LOGO_URI} alt="Selim Finance" style={{ height: 18, display: "block" }} />
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 18, fontWeight: 700 }}>{active?.name}</div>
            <span style={{ fontSize: 9.5, fontWeight: 600, color: GOLD, background: "rgba(184,137,43,0.15)", borderRadius: 20, padding: "2px 8px" }}>
              {role === "owner" ? "مالك" : role === "editor" ? "تعديل" : "مشاهدة فقط"}
            </span>
          </div>
        </div>
        {sortedPeriods.length > 0 && (
          <div style={{ maxWidth: 1180, margin: "8px auto 0", display: "flex", gap: 5, flexWrap: "wrap" }}>
            {sortedPeriods.map((p) => (
              <button key={p.id} onClick={() => { setActivePeriodId(p.id); setSelectedYear(p.year); if (step === "upload") setStep("statements"); }}
                style={{ background: activePeriodId === p.id || (!activePeriodId && p.id === sortedPeriods[sortedPeriods.length - 1].id) ? GOLD : "rgba(255,255,255,0.08)", color: activePeriodId === p.id ? INK : CREAM, border: "none", borderRadius: 20, padding: "4px 10px", fontSize: 10.5, cursor: "pointer" }}>
                {MONTH_NAMES[p.month - 1]} {p.year}
              </button>
            ))}
          </div>
        )}
      </div>

      <div style={{ background: "#fff", borderBottom: `1px solid ${RULE}` }} className="no-print">
        <div style={{ maxWidth: 1180, margin: "0 auto", display: "flex", gap: 2, padding: "0 10px", overflowX: "auto" }}>
          {STEPS.map((s) => {
            const blockedForViewer = readOnly && (s.key === "upload" || s.key === "classify");
            const enabled = (s.key === "upload" || s.key === "zakat" || (active && sortedPeriods.length)) && !blockedForViewer;
            const isActive = step === s.key;
            return (
              <button key={s.key} disabled={!enabled} onClick={() => enabled && setStep(s.key)}
                style={{ display: "flex", alignItems: "center", gap: 5, padding: "10px 10px", background: "none", border: "none", borderBottom: isActive ? `3px solid ${GOLD}` : "3px solid transparent", color: isActive ? INK : enabled ? "#6b6455" : "#c9c2ae", fontWeight: isActive ? 700 : 500, fontSize: 12.5, cursor: enabled ? "pointer" : "not-allowed", fontFamily: "'IBM Plex Sans Arabic', sans-serif", whiteSpace: "nowrap", flexShrink: 0 }}>
                <s.icon size={13} /> {s.label}
              </button>
            );
          })}
        </div>
      </div>

      <div style={{ maxWidth: 1180, margin: "0 auto", padding: "18px 14px" }}>
        {migrating && (
          <Card style={{ padding: 14, marginBottom: 12, textAlign: "center", color: GOLD, fontWeight: 700 }}>جارِ ترقية بنية البيانات لتحمّل عدد شهور غير محدود… لا تغلق الصفحة.</Card>
        )}
        {step === "upload" && !readOnly && (
          <div>
            <SectionTitle icon={Upload} sub="ارفع ميزان شهر واحد، أو عدة ملفات دفعة واحدة (كل ملف = شهر) وسيوزّعها التطبيق تلقائيًا">رفع فترة جديدة</SectionTitle>
            {batchBusy && <Card style={{ padding: 16, marginBottom: 12, textAlign: "center", color: GOLD, fontWeight: 600 }}>جارِ رفع ومعالجة الملفات…</Card>}
            <UploadZone title="رفع ميزان مراجعة" onFile={onFile} onFiles={onFiles} fileName={file} />
            {mode === "tree" && parsedTree && (
              <TreeConfirm parsed={parsedTree} onConfirm={confirmTree} onFallback={() => { setMode("flat"); setMapping(detectFlatColumns(rawRowsFlat) || { headerRow: 0, code: 0, name: 1, debit: 2, credit: 3 }); }} />
            )}
            {mode === "flat" && rawRowsFlat && mapping && (
              <MappingConfirm rawRows={rawRowsFlat} mapping={mapping} setMapping={setMapping} onConfirm={confirmFlat} />
            )}
            {sortedPeriods.length > 0 && (
              <div style={{ marginTop: 24 }}>
                <div style={{ fontWeight: 700, marginBottom: 10, color: INK, fontSize: 14 }}>الموازين المرفوعة ({sortedPeriods.length})</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 10 }}>
                  {sortedPeriods.map((p) => {
                    const pf = computeFigures(p.rows, 0);
                    return (
                      <Card key={p.id} style={{ padding: 12 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                          <span style={{ fontWeight: 700, fontSize: 13.5, color: INK }}>{MONTH_NAMES[p.month - 1]} {p.year}</span>
                          {p.cumulative !== false && <span style={{ fontSize: 8.5, background: "#eef2e9", color: GREEN_INK, borderRadius: 10, padding: "1px 6px" }}>تراكمي</span>}
                        </div>
                        <div style={{ fontSize: 10.5, color: "#847c69", marginBottom: 8 }}>{p.rows.length} حساب · مبيعات {fmt(pf.grossSales)}</div>
                        {!readOnly && (
                          <div style={{ display: "flex", gap: 6 }}>
                            <button onClick={() => startEditPeriod(p)} style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 4, background: "#fff", color: INK, border: `1px solid ${RULE}`, borderRadius: 6, padding: "5px", fontSize: 11, cursor: "pointer", fontFamily: "'IBM Plex Sans Arabic', sans-serif" }}><Pencil size={11} /> تعديل</button>
                            {isOwner && <button onClick={() => { if (confirm(`حذف ميزان ${MONTH_NAMES[p.month - 1]} ${p.year}؟`)) deletePeriod(p.id); }} style={{ display: "flex", alignItems: "center", justifyContent: "center", background: "#fff", color: RED_INK, border: `1px solid ${RULE}`, borderRadius: 6, padding: "5px 8px", cursor: "pointer" }}><Trash2 size={11} /></button>}
                          </div>
                        )}
                      </Card>
                    );
                  })}
                </div>
              </div>
            )}
            {isOwner && availableYears.length > 0 && (
              <div style={{ marginTop: 24 }}>
                <div style={{ fontWeight: 700, marginBottom: 8, color: INK, fontSize: 14 }}>أرشفة السنوات المنتهية</div>
                <p style={{ fontSize: 11, color: "#8a8271", marginBottom: 10 }}>
                  لما السنة تخلص، تقدر تأرشفها فتتشال من القوائم النشطة وتفضل محفوظة، وترجّعها في أي وقت.
                </p>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {availableYears.map((yr) => (
                    <button key={yr} onClick={() => archiveYear(yr)}
                      style={{ display: "flex", alignItems: "center", gap: 6, background: "#fff", color: INK, border: `1px solid ${RULE}`, borderRadius: 8, padding: "8px 12px", fontSize: 12.5, cursor: "pointer", fontFamily: "'IBM Plex Sans Arabic', sans-serif" }}>
                      📦 أرشفة سنة {yr} ({periods.filter((p) => p.year === yr).length} شهر)
                    </button>
                  ))}
                </div>
              </div>
            )}
            {archives.length > 0 && (
              <div style={{ marginTop: 22 }}>
                <div style={{ fontWeight: 700, marginBottom: 8, color: GOLD, fontSize: 14 }}>📚 الأرشيف ({archives.length})</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))", gap: 10 }}>
                  {archives.slice().sort((a, b) => b.year - a.year).map((a) => (
                    <Card key={a.id} style={{ padding: 12 }}>
                      <div style={{ fontWeight: 700, fontSize: 14, color: INK }}>سنة {a.year}</div>
                      <div style={{ fontSize: 10.5, color: "#847c69", margin: "4px 0 8px" }}>
                        {a.count || 0} شهر · أُرشفت {new Date(a.archivedAt).toLocaleDateString("ar-EG")}
                      </div>
                      {isOwner && (
                        <button onClick={() => restoreArchive(a.id)}
                          style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 5, background: INK, color: CREAM, border: "none", borderRadius: 7, padding: "7px", fontSize: 11.5, cursor: "pointer", fontFamily: "'IBM Plex Sans Arabic', sans-serif" }}>
                          <RefreshCw size={11} /> استرجاع
                        </button>
                      )}
                    </Card>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
        {step === "upload" && readOnly && (
          <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>لا توجد بيانات مرفوعة لهذه الشركة بعد، وصلاحيتك هنا مشاهدة فقط.</Card>
        )}

        {step === "classify" && (draftParsed || draftRows) && (
          <div>
            <SectionTitle icon={ClipboardList} sub={draftParsed ? "صنّف الحسابات الرئيسية فقط — الباقي يتظبط تلقائيًا" : "راجع التصنيف المقترح لكل حساب وعدّله إذا لزم الأمر"}>تصنيف الحسابات</SectionTitle>
            <SavePeriodBar year={draftYear} setYear={setDraftYear} month={draftMonth} setMonth={setDraftMonth} openingInv={draftOpeningInv} setOpeningInv={setDraftOpeningInv} cumulative={draftCumulative} setCumulative={setDraftCumulative} onSave={finalizeDraft} isNew={draftIsNew} />
            {draftParsed ? (
              <ParentClassify parsed={draftParsed} classMap={draftClassMap} setClassMap={setDraftClassMap} savedMap={savedClass} onNext={finalizeDraft} nextLabel={draftIsNew ? "حفظ الفترة والانتقال للقوائم" : "حفظ التعديلات"} />
            ) : (
              <ClassifyTable rows={draftRows} setRows={setDraftRows} onNext={finalizeDraft} nextLabel={draftIsNew ? "حفظ الفترة والانتقال للقوائم" : "حفظ التعديلات"} />
            )}
          </div>
        )}
        {step === "classify" && !draftParsed && !draftRows && (
          <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>اختر فترة من القائمة فوق أو ارفع فترة جديدة أولاً.</Card>
        )}

        {step === "statements" && active && (
          <div>
            <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap", justifyContent: "space-between", alignItems: "center" }} className="no-print">
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {STMT_TABS.map((t) => (
                  <button key={t.key} onClick={() => setStmtTab(t.key)}
                    style={{ display: "flex", alignItems: "center", gap: 7, padding: "9px 16px", borderRadius: 20, border: `1px solid ${stmtTab === t.key ? INK : RULE}`, background: stmtTab === t.key ? INK : "#fff", color: stmtTab === t.key ? CREAM : INK, fontSize: 13.5, fontWeight: 600, cursor: "pointer", fontFamily: "'IBM Plex Sans Arabic', sans-serif" }}>
                    <t.icon size={14} /> {t.label}
                  </button>
                ))}
              </div>
              <ExportBtns
                companyName={active.name}
                pdfTarget={{ home: "print-home", income_monthly: "print-income", income_annual: "print-income", balance: "print-balance", equity: "print-equity", trial: "print-trial" }[stmtTab] || null}
                pdfName={
                  stmtTab === "home" ? `لوحة القيادة - ${active.name} ${selectedYear}`
                  : stmtTab === "income_monthly" ? `قائمة الدخل - ${activePeriod ? MONTH_NAMES[activePeriod.month - 1] + " " + activePeriod.year : ""}`
                  : stmtTab === "income_annual" ? `قائمة الدخل السنوية - ${selectedYear}`
                  : stmtTab === "balance" ? `المركز المالي - ${activePeriod ? MONTH_NAMES[activePeriod.month - 1] + " " + activePeriod.year : ""}`
                  : stmtTab === "trial" ? `ميزان المراجعة - ${activePeriod ? MONTH_NAMES[activePeriod.month - 1] + " " + activePeriod.year : ""}`
                  : `تقرير - ${active.name}`
                }
                availableMonths={sortedPeriods.map((p) => ({ id: p.id, label: `${MONTH_NAMES[p.month - 1]} ${p.year}` }))}
                exportData={(which, monthSel) => {
                  const chosen = monthSel === "all" ? sortedPeriods : sortedPeriods.filter((p) => p.id === monthSel);
                  const monthlyList = chosen.map((p) => ({
                    f: periodFigures(sortedPeriods, p, yearOpeningInvOf(p.year)),
                    rows: p.rows,
                    label: `${MONTH_NAMES[p.month - 1]} ${p.year}`,
                  }));
                  exportWorkbook({
                    company: active,
                    periods: sortedPeriods,
                    companyName: active.name,
                    monthlyList,
                    annual: annualFigures,
                    periodLabel: `${selectedYear}`,
                    balanceF: balanceFigures,
                    balanceLabel: activePeriod ? `كما في نهاية ${MONTH_NAMES[activePeriod.month - 1]} ${activePeriod.year}` : "",
                    latest: balanceFigures,
                    year: selectedYear,
                    zakatDue: computeZakatTotal(active.zakat),
                    zakatData: active.zakat,
                    partners,
                    which,
                  });
                }} />
            </div>
            {(stmtTab === "income_monthly" || stmtTab === "balance" || stmtTab === "equity" || stmtTab === "trial") && sortedPeriods.length > 0 && (
              <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 14, flexWrap: "wrap" }} className="no-print">
                <span style={{ fontSize: 12.5, color: "#6b6455", fontWeight: 600 }}>اختر الشهر:</span>
                <Select value={activePeriodId || (activePeriod ? activePeriod.id : "")} onChange={(e) => { const p = sortedPeriods.find((x) => x.id === e.target.value); if (p) { setActivePeriodId(p.id); setSelectedYear(p.year); } }} style={{ minWidth: 160 }}>
                  {sortedPeriods.map((p) => (<option key={p.id} value={p.id}>{MONTH_NAMES[p.month - 1]} {p.year}</option>))}
                </Select>
              </div>
            )}
            {stmtTab === "home" && (
              <HomeDashboard company={active} periods={sortedPeriods} year={selectedYear} setYear={setSelectedYear} availableYears={availableYears.length ? availableYears : [selectedYear]} zakatDue={computeZakatTotal(active.zakat)} />
            )}
            {stmtTab === "income_monthly" && (
              figures ? <DetailedIncomeStatement f={figures} title="قائمة الدخل الشهرية" periodLabel={monthlyPeriodLabel} sourceLabel={monthlySourceLabel} companyName={active.name} /> : <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>اختر فترة أولاً من القائمة فوق.</Card>
            )}
            {stmtTab === "income_annual" && (
              annualFigures ? <DetailedIncomeStatement f={annualFigures} title="قائمة الدخل السنوية" periodLabel={annualPeriodLabel} sourceLabel={annualSourceLabel} companyName={active.name} partners={partners} /> : <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>لا توجد فترات لسنة {selectedYear}.</Card>
            )}
            {stmtTab === "balance" && (
              balanceFigures ? <BalanceSheet f={balanceFigures} periodLabel={activePeriod ? `كما في نهاية ${MONTH_NAMES[activePeriod.month - 1]} ${activePeriod.year}` : ""} companyName={active.name} onReclassify={reclassifyAccount} readOnly={readOnly} /> : <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>اختر فترة أولاً من القائمة فوق.</Card>
            )}
            {stmtTab === "equity" && activePeriod && figures && (
              <EquityStatement rows={activePeriod.rows} f={figures} opening={active.opening || {}} setOpening={(o) => patchCompany({ opening: o })} periodLabel={monthlyPeriodLabel} readOnly={readOnly} />
            )}
            {stmtTab === "trial" && (
              activePeriod ? <TrialBalanceView rows={activePeriod.rows} periodLabel={`${MONTH_NAMES[activePeriod.month - 1]} ${activePeriod.year}`} companyName={active.name} />
                : <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>اختر فترة أولاً من القائمة فوق.</Card>
            )}
          </div>
        )}

        {step === "zakat" && active && <ZakatModule data={active.zakat} setData={patchZakat} readOnly={readOnly} />}
      </div>
    </div>
  );
}

/* ---------------------------------- تسجيل الدخول ---------------------------------- */


function AuthScreen() {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    if (!email.trim() || password.length < 6) {
      setError("أدخل بريد إلكتروني صحيح وكلمة سر لا تقل عن 6 أحرف");
      return;
    }
    setLoading(true);
    try {
      if (mode === "signin") await auth.signInWithEmailAndPassword(email.trim(), password);
      else await auth.createUserWithEmailAndPassword(email.trim(), password);
    } catch (err) {
      const map = {
        "auth/user-not-found": "الحساب غير موجود، جرّب إنشاء حساب جديد",
        "auth/wrong-password": "كلمة السر غير صحيحة",
        "auth/email-already-in-use": "البريد الإلكتروني مستخدم بالفعل، جرّب تسجيل الدخول",
        "auth/invalid-email": "صيغة البريد الإلكتروني غير صحيحة",
      };
      setError(map[err.code] || err.message);
    }
    setLoading(false);
  };

  return (
    <div style={{ minHeight: "100vh", background: CREAM, fontFamily: "'IBM Plex Sans Arabic', sans-serif", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }} dir="rtl">
      <style>{`:root{--selim-logo:url("${LOGO_URI}");}`}{FONTS}</style>
      <Card style={{ padding: 34, width: "100%", maxWidth: 380 }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <img src={LOGO_URI} alt="Selim Finance" style={{ height: 46, margin: "0 auto 10px", display: "block" }} />
          <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 20, fontWeight: 700, color: INK, marginTop: 8 }}>القوائم المالية والزكاة <span style={{ fontSize: 10, color: "#847c69", fontFamily: "'IBM Plex Sans Arabic', sans-serif" }}>نسخة {APP_VERSION}</span></div>
          <div style={{ fontSize: 12.5, color: "#847c69", marginTop: 4 }}>{mode === "signin" ? "تسجيل الدخول" : "إنشاء حساب جديد"}</div>
        </div>
        <form onSubmit={submit}>
          <label style={{ fontSize: 12.5, color: "#6b6455" }}>البريد الإلكتروني</label>
          <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required
            style={{ width: "100%", border: `1px solid ${RULE}`, borderRadius: 7, padding: "9px 10px", marginBottom: 12, marginTop: 4, direction: "ltr", fontFamily: "inherit", fontSize: 14 }} />
          <label style={{ fontSize: 12.5, color: "#6b6455" }}>كلمة السر</label>
          <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required
            style={{ width: "100%", border: `1px solid ${RULE}`, borderRadius: 7, padding: "9px 10px", marginBottom: 16, marginTop: 4, direction: "ltr", fontFamily: "inherit", fontSize: 14 }} />
          {error && <div style={{ background: "#faeceb", color: RED_INK, borderRadius: 7, padding: "8px 10px", fontSize: 12.5, marginBottom: 14 }}>{error}</div>}
          <button type="submit" disabled={loading} style={{ width: "100%", background: INK, color: CREAM, border: "none", borderRadius: 8, padding: "11px", fontFamily: "inherit", fontWeight: 700, fontSize: 14.5, cursor: loading ? "wait" : "pointer" }}>
            {loading ? "جارِ التحقق…" : mode === "signin" ? "دخول" : "إنشاء الحساب"}
          </button>
        </form>
        <div style={{ textAlign: "center", marginTop: 16, fontSize: 13 }}>
          {mode === "signin" ? (
            <span>مفيش حساب؟ <button onClick={() => { setMode("signup"); setError(""); }} style={{ background: "none", border: "none", color: GOLD, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>إنشاء حساب جديد</button></span>
          ) : (
            <span>عندك حساب؟ <button onClick={() => { setMode("signin"); setError(""); }} style={{ background: "none", border: "none", color: GOLD, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>تسجيل الدخول</button></span>
          )}
        </div>
      </Card>
    </div>
  );
}

function Root() {
  const [user, setUser] = useState(undefined);
  useEffect(() => {
    const unsub = auth.onAuthStateChanged(setUser);
    return unsub;
  }, []);
  if (user === undefined) {
    return (
      <div style={{ minHeight: "100vh", background: CREAM, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'IBM Plex Sans Arabic', sans-serif", color: "#847c69" }}>
        جارِ التحميل…
      </div>
    );
  }
  if (!user) return <AuthScreen />;
  return <MainApp user={user} />;
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);
