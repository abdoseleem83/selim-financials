function guessCategory(name = "", code = "", context = "") {
  const n = `${name} ${context}`;
  const rules = [
    [/مردودات المبيعات|مردودات مبيعات/, "sales_returns"],
    [/خصم.*مبيعات|خصومات مسموح/, "sales_discounts"],
    [/نقد|بنك|صندوق|عملاء|مدين|مخزون|بضاعة|أوراق قبض|سلف|عهد/, "asset_current"],
    [/أصول ثابتة|عقار|آلات|أثاث|سيارات|مجمع إهلاك|مجمع اهلاك|استثمار.*طويل|شهرة/, "asset_noncurrent"],
    [/موردين|دائن|مصروفات مستحقة|أوراق دفع|ضريبة مستحقة|قرض قصير/, "liability_current"],
    [/قرض طويل|قروض طويلة|التزام طويل|مخصص.*طويل/, "liability_noncurrent"],
    [/رأس المال|احتياطي|أرباح مرحلة|أرباح محتجزة|جاري الشريك|حقوق الملكية|شركاء/, "equity"],
    [/مشتريات/, "purchases"],
    [/مبيعات|إيراد التشغيل|إيرادات النشاط/, "revenue"],
    [/تكلفة المبيعات|تكلفة البضاعة/, "purchases"],
    [/مصروف|رواتب|مرتبات|إيجار|ايجار|إهلاك|اهلاك|دعاية|صيانة|كهرباء|قرطاسية|عمولات البيع|عمولات علي المبيعات|نقل وشحن|م\/ نقل|تليفون|بوفيه|نظافه|زكاه وبر|حوافز/, "opex"],
    [/إيراد آخر|إيرادات أخرى|أرباح بيع أصل|ايراد بيع أصول|إيرادات متنوعه|خصم مكتسب/, "other_income"],
    [/مصروف آخر|مصروفات أخرى|خسارة/, "other_expense"],
    [/ضريبة الدخل|ضريبة دخل/, "tax"],
    [/الأصول/, "asset_current"],
    [/الخصوم/, "liability_current"],
  ];
  for (const [re, cat] of rules) if (re.test(n)) return cat;
  const c = String(code).trim();
  const first = c[0];
  if (first === "1") return "asset_current";
  if (first === "2") return "liability_current";
  if (first === "3") return "equity";
  if (first === "4") return "revenue";
  if (first === "5") return "opex";
  return "asset_current";
}

const fmt = (n) => {
  if (n === null || n === undefined || isNaN(n)) return "—";
  const abs = Math.abs(n);
  const s = abs.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return n < 0 ? `(${s})` : s;
};
const uid = () => Math.random().toString(36).slice(2, 10);

/* الصيغة (أ): جدول بسيط أعمدة كود/اسم/مدين/دائن
   الصيغة (ب): تصدير من نظام ERP — شجرة حسابات هرمية بأكواد مفصولة "/" وأعمدة
   "رقم الحساب" / "اسم الحساب" / "رصيد بداية" / "صافي الحركة" / "رصيد نهاية"
   حيث القيمة قد تنتهي بحرف "م" (دائن) أو "د" (مدين). */

function detectFlatColumns(rows) {
  for (let r = 0; r < Math.min(rows.length, 8); r++) {
    const row = rows[r].map((c) => String(c ?? ""));
    let code = -1, name = -1, debit = -1, credit = -1;
    row.forEach((cell, i) => {
      if (code === -1 && /كود|رقم/.test(cell)) code = i;
      if (name === -1 && /اسم|بيان/.test(cell)) name = i;
      if (debit === -1 && /مدين/.test(cell)) debit = i;
      if (credit === -1 && /دائن/.test(cell)) credit = i;
    });
    if (name !== -1 && (debit !== -1 || credit !== -1)) return { headerRow: r, code, name, debit, credit };
  }
  return null;
}

function detectTreeColumns(rows) {
  for (let r = 0; r < Math.min(rows.length, 40); r++) {
    const row = rows[r].map((c) => String(c ?? ""));
    let code = -1, name = -1, ending = -1, netDebit = -1, netCredit = -1;
    row.forEach((cell, i) => {
      if (name === -1 && /اسم الحساب/.test(cell)) name = i;
      if (code === -1 && /رقم الحساب/.test(cell)) code = i;
      if (ending === -1 && /رصيد نهاية/.test(cell)) ending = i;
      if (netDebit === -1 && /صافي الحركة/.test(cell) && /مدين/.test(cell)) netDebit = i;
      if (netCredit === -1 && /صافي الحركة/.test(cell) && /دائن/.test(cell)) netCredit = i;
    });
    if (name !== -1 && ending !== -1) return { headerRow: r, code, name, ending, netDebit, netCredit };
  }
  return null;
}

function parseAmountCell(raw) {
  if (raw === null || raw === undefined || raw === "") return { value: 0, nature: null };
  let s = String(raw).trim();
  let nature = null;
  const last = s.slice(-1);
  if (last === "م" || last === "د") {
    nature = last === "م" ? "debit" : "credit";
    s = s.slice(0, -1).trim();
  }
  s = s.replace(/,/g, "");
  const value = parseFloat(s);
  if (isNaN(value)) return { value: 0, nature: null };
  if (nature) return { value: Math.abs(value), nature };
  if (value !== 0) return { value: Math.abs(value), nature: value < 0 ? "credit" : "debit" };
  return { value: 0, nature: null };
}

function cleanAccName(raw) {
  return String(raw ?? "").replace(/^\[/, "").replace(/\]$/, "").replace(/-+\s*$/, "").trim();
}

function buildTreeRows(rawRows, h) {
  const all = [];
  for (let r = h.headerRow + 1; r < rawRows.length; r++) {
    const row = rawRows[r];
    if (!row) continue;
    const nameRaw = h.name >= 0 ? row[h.name] : "";
    if (nameRaw === undefined || nameRaw === "") continue;
    let code = String((h.code >= 0 ? row[h.code] : "") ?? "").trim();
    const rawNameStr = String(nameRaw);
    const dashMatch = rawNameStr.match(/-+\s*$/);
    const dashDepth = dashMatch ? dashMatch[0].replace(/\s/g, "").length : 0;
    const name = cleanAccName(nameRaw);
    const { value, nature } = parseAmountCell(row[h.ending]);
    let netDebit = 0, netCredit = 0;
    if (h.netDebit >= 0) netDebit = parseFloat(String(row[h.netDebit]).replace(/,/g, "")) || 0;
    if (h.netCredit >= 0) netCredit = parseFloat(String(row[h.netCredit]).replace(/,/g, "")) || 0;
    all.push({ code, name, dashDepth, value, nature, netDebit, netCredit });
  }
  const hasCode = all.some((a) => a.code);
  const rows = [];

  if (hasCode) {
    // صيغة بها كود حساب هرمي بفواصل "/" — المستوى الأخير (بدون أبناء) هو الحساب التفصيلي
    all.forEach((a) => { if (/^\d$/.test(a.code)) a.code = "0" + a.code; });
    const nameByCode = {};
    all.forEach((a) => { if (a.code) nameByCode[a.code] = a.name; });
    const isLeaf = (code) => !all.some((a) => a.code !== code && a.code.startsWith(code + "/"));
    all.forEach((a) => {
      if (!a.value || !a.code) return;
      if (!isLeaf(a.code)) return;
      const parts = a.code.split("/");
      const chain = [];
      for (let i = parts.length - 1; i >= 1; i--) {
        const anc = parts.slice(0, i).join("/");
        if (nameByCode[anc]) chain.push(nameByCode[anc]);
      }
      const category = guessCategory(a.name, a.code, chain.join(" "));
      let debit = 0, credit = 0;
      if (a.nature === "debit") debit = a.value;
      else if (a.nature === "credit") credit = a.value;
      else if (DEBIT_NATURE.has(category)) debit = a.value;
      else credit = a.value;
      rows.push({ id: uid(), code: a.code, name: a.name, debit, credit, category });
    });
  } else {
    // صيغة بدون كود حساب — عمق التداخل يُقرأ من عدد الشرطات بنهاية اسم الحساب
    all.forEach((a, i) => {
      if (!a.value) return;
      const nextDepth = i + 1 < all.length ? all[i + 1].dashDepth : -1;
      if (nextDepth > a.dashDepth) return; // له أبناء لاحقين = صف تجميعي، تجاهله
      const ancestors = [];
      let minDepth = a.dashDepth;
      for (let j = i - 1; j >= 0; j--) {
        if (all[j].dashDepth < minDepth) { ancestors.push(all[j].name); minDepth = all[j].dashDepth; if (minDepth === 0) break; }
      }
      const category = guessCategory(a.name, "", ancestors.join(" "));
      let debit = 0, credit = 0;
      if (a.nature === "debit") debit = a.value;
      else if (a.nature === "credit") credit = a.value;
      else if (DEBIT_NATURE.has(category)) debit = a.value;
      else credit = a.value;
      rows.push({ id: uid(), code: `#${i}`, name: a.name, debit, credit, category });
    });
  }
  return rows;
}

function buildFlatRows(rawRows, mapping) {
  const out = [];
  for (let r = mapping.headerRow + 1; r < rawRows.length; r++) {
    const row = rawRows[r];
    if (!row || row.every((c) => c === undefined || c === "")) continue;
    const name = mapping.name >= 0 ? row[mapping.name] : "";
    if (!name) continue;
    const code = mapping.code >= 0 ? row[mapping.code] : "";
    const debit = parseFloat(row[mapping.debit]) || 0;
    const credit = parseFloat(row[mapping.credit]) || 0;
    if (debit === 0 && credit === 0) continue;
    out.push({ id: uid(), code: String(code ?? "").trim(), name: String(name).trim(), debit, credit, category: guessCategory(name, code) });
  }
  return out;
}

async function parseWorkbook(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array" });
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rawRows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: "" });
  const tree = detectTreeColumns(rawRows);
  if (tree) return { mode: "tree", rawRows, tree, rows: buildTreeRows(rawRows, tree) };
  const mapping = detectFlatColumns(rawRows) || { headerRow: 0, code: 0, name: 1, debit: 2, credit: 3 };
  return { mode: "flat", rawRows, mapping };
}

  const totalDebit = rows.reduce((s, r) => s + r.debit, 0);
  const totalCredit = rows.reduce((s, r) => s + r.credit, 0);
  const diff = totalDebit - totalCredit;
  const visible = rows.filter((r) => !filter || r.name.includes(filter) || r.code.includes(filter));
  const setCat = (id, v) => setRows(rows.map((r) => (r.id === id ? { ...r, category: v } : r)));

  return (
    <div>
      <div style={{ display: "flex", gap: 14, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
        <input placeholder="بحث باسم أو كود الحساب…" value={filter} onChange={(e) => setFilter(e.target.value)}
          style={{ flex: 1, minWidth: 220, border: `1px solid ${RULE}`, borderRadius: 8, padding: "9px 12px", fontFamily: "'IBM Plex Sans Arabic', sans-serif", fontSize: 13.5 }} />
        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 14px", borderRadius: 8, background: Math.abs(diff) < 0.5 ? "#eaf3ec" : "#faeceb", color: Math.abs(diff) < 0.5 ? GREEN_INK : RED_INK, fontSize: 13, fontWeight: 600 }}>
          {Math.abs(diff) < 0.5 ? <Check size={15} /> : <AlertTriangle size={15} />}
          {Math.abs(diff) < 0.5 ? "الميزان متزن" : `فرق بين مدين ودائن: ${fmt(diff)}`}
        </div>
        <div style={{ fontSize: 12, color: "#847c69" }}>{rows.length} حساب</div>
      </div>

      <Card style={{ overflow: "hidden" }}>
        <div style={{ maxHeight: 460, overflowY: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ background: INK, color: CREAM, position: "sticky", top: 0 }}>
                <th style={{ padding: "10px 12px", textAlign: "right" }}>الكود</th>
                <th style={{ padding: "10px 12px", textAlign: "right" }}>اسم الحساب</th>
                <th style={{ padding: "10px 12px", textAlign: "left" }}>مدين</th>
                <th style={{ padding: "10px 12px", textAlign: "left" }}>دائن</th>
                <th style={{ padding: "10px 12px", textAlign: "right", minWidth: 200 }}>التصنيف</th>
              </tr>
            </thead>
            <tbody>
              {visible.map((r, i) => (
                <tr key={r.id} style={{ background: i % 2 ? "#fbf9f4" : "#fff" }}>
                  <td style={{ padding: "7px 12px", borderBottom: `1px solid ${RULE}`, color: "#6b6455", whiteSpace: "nowrap" }}>{r.code}</td>
                  <td style={{ padding: "7px 12px", borderBottom: `1px solid ${RULE}` }}>{r.name}</td>
                  <td style={{ padding: "7px 12px", borderBottom: `1px solid ${RULE}`, textAlign: "left", direction: "ltr" }}>{r.debit ? fmt(r.debit) : "—"}</td>
                  <td style={{ padding: "7px 12px", borderBottom: `1px solid ${RULE}`, textAlign: "left", direction: "ltr" }}>{r.credit ? fmt(r.credit) : "—"}</td>
                  <td style={{ padding: "6px 12px", borderBottom: `1px solid ${RULE}` }}>
                    <Select value={r.category} onChange={(e) => setCat(r.id, e.target.value)}>
                      {CATEGORY_GROUPS.map((g) => (
                        <optgroup key={g.group} label={g.group}>
                          {g.options.map((o) => (<option key={o.v} value={o.v}>{o.label}</option>))}
                        </optgroup>
                      ))}
                    </Select>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
      <div style={{ marginTop: 18, display: "flex", justifyContent: "flex-end" }}>
        <PrimaryBtn icon={ArrowLeft} onClick={onNext}>{nextLabel || "التالي: القوائم المالية"}</PrimaryBtn>
      </div>
    </div>
  );
}

/* ---------------------------------- حسابات القوائم ---------------------------------- */

function computeFigures(rows, openingInventory) {
  const val = (r) => (DEBIT_NATURE.has(r.category) ? r.debit - r.credit : r.credit - r.debit);
  const byCat = (cat) => rows.filter((r) => r.category === cat);
  const sum = (cat) => byCat(cat).reduce((s, r) => s + val(r), 0);

  const grossSales = sum("revenue");
  const salesReturns = sum("sales_returns");
  const salesDiscounts = sum("sales_discounts");
  const netSales = grossSales - salesReturns - salesDiscounts;
  const returnsRatio = grossSales ? salesReturns / grossSales : 0;

  const closingInventory = byCat("asset_current").filter((r) => /مخزون|بضاعة/.test(r.name)).reduce((s, r) => s + val(r), 0);
  const openInv = openingInventory || 0;
  const purchases = sum("purchases");
  const cogs = openInv + purchases - closingInventory;
  const grossProfit = netSales - cogs;
  const grossMargin = netSales ? grossProfit / netSales : 0;

  const opexRows = byCat("opex").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const opex = opexRows.reduce((s, r) => s + r.amount, 0);
  const opexRatio = netSales ? opex / netSales : 0;
  const operatingProfit = grossProfit - opex;
  const operatingMargin = netSales ? operatingProfit / netSales : 0;

  const otherIncomeRows = byCat("other_income").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const otherIncome = otherIncomeRows.reduce((s, r) => s + r.amount, 0);
  const otherExpense = sum("other_expense");
  const tax = sum("tax");
  const netProfit = operatingProfit + otherIncome - otherExpense - tax;
  const netMargin = netSales ? netProfit / netSales : 0;
  const oci = sum("oci");
  const totalComprehensive = netProfit + oci;

  const assetCurrentRows = byCat("asset_current").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const assetNoncurrentRows = byCat("asset_noncurrent").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const liabilityCurrentRows = byCat("liability_current").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const liabilityNoncurrentRows = byCat("liability_noncurrent").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);
  const equityAccountRows = byCat("equity").map((r) => ({ name: r.name, amount: val(r) })).filter((r) => r.amount);

  const currentAssets = assetCurrentRows.reduce((s, r) => s + r.amount, 0);
  const nonCurrentAssets = assetNoncurrentRows.reduce((s, r) => s + r.amount, 0);
  const totalAssets = currentAssets + nonCurrentAssets;
  const currentLiab = liabilityCurrentRows.reduce((s, r) => s + r.amount, 0);
  const nonCurrentLiab = liabilityNoncurrentRows.reduce((s, r) => s + r.amount, 0);
  const totalLiab = currentLiab + nonCurrentLiab;
  const equityAccounts = equityAccountRows.reduce((s, r) => s + r.amount, 0);
  const totalEquity = equityAccounts + netProfit;
  const totalLiabEquity = totalLiab + totalEquity;

  const inv = /مخزون|بضاعة|بضائع/;
  const cashRows = assetCurrentRows.filter((r) => /نقد|بنك|صندوق|خزين|خزائن/.test(r.name));
  const cash = cashRows.reduce((s, r) => s + r.amount, 0);
  const customerDebtRows = assetCurrentRows.filter((r) => /عملاء|ذمم مدينة|أوراق قبض/.test(r.name) && !inv.test(r.name));
  const customerDebt = customerDebtRows.reduce((s, r) => s + r.amount, 0);
  const supplierPrepaidRows = assetCurrentRows.filter((r) => /مقدم.*مورد|موردين مدين|دفعات مقدمة للموردين/.test(r.name));
  const supplierPrepaid = supplierPrepaidRows.reduce((s, r) => s + r.amount, 0);
  const customerPrepaidRows = liabilityCurrentRows.filter((r) => /مقدم.*عميل|عملاء دائن|دفعات مقدمة من العملاء/.test(r.name));
  const customerPrepaid = customerPrepaidRows.reduce((s, r) => s + r.amount, 0);
  const supplierDebtRows = liabilityCurrentRows.filter((r) => /موردين|موردون/.test(r.name) && !/مدين/.test(r.name));
  const supplierDebt = supplierDebtRows.reduce((s, r) => s + r.amount, 0);

  return {
    val, byCat, sum,
    grossSales, salesReturns, salesDiscounts, netSales, returnsRatio,
    openInv, purchases, closingInventory, cogs, grossProfit, grossMargin,
    opexRows, opex, opexRatio, operatingProfit, operatingMargin,
    otherIncomeRows, otherIncome, otherExpense, tax, netProfit, netMargin, oci, totalComprehensive,
    assetCurrentRows, assetNoncurrentRows, liabilityCurrentRows, liabilityNoncurrentRows, equityAccountRows,
    currentAssets, nonCurrentAssets, totalAssets,
    currentLiab, nonCurrentLiab, totalLiab,
    equityAccounts, totalEquity, totalLiabEquity,
    inventory: closingInventory, balanceDiff: totalAssets - totalLiabEquity,
    cash, customerDebt, supplierPrepaid, customerPrepaid, supplierDebt,
  };
}

function mergeFigures(list) {
  // list: array of computeFigures() results for multiple periods, aggregated for annual view
  const sumKey = (k) => list.reduce((s, f) => s + (f[k] || 0), 0);
  const mergeRows = (key) => {
    const map = {};
    list.forEach((f) => f[key].forEach((r) => { map[r.name] = (map[r.name] || 0) + r.amount; }));
    return Object.entries(map).map(([name, amount]) => ({ name, amount }));
  };
  const grossSales = sumKey("grossSales");
  const salesReturns = sumKey("salesReturns");
  const salesDiscounts = sumKey("salesDiscounts");
  const netSales = grossSales - salesReturns - salesDiscounts;
  const returnsRatio = grossSales ? salesReturns / grossSales : 0;
  const purchases = sumKey("purchases");
  const openInv = list.length ? list[0].openInv : 0;
  const closingInventory = list.length ? list[list.length - 1].closingInventory : 0;
  const cogs = openInv + purchases - closingInventory;
  const grossProfit = netSales - cogs;
  const grossMargin = netSales ? grossProfit / netSales : 0;
  const opexRows = mergeRows("opexRows");
  const opex = sumKey("opex");
  const opexRatio = netSales ? opex / netSales : 0;
  const operatingProfit = grossProfit - opex;
  const operatingMargin = netSales ? operatingProfit / netSales : 0;
  const otherIncomeRows = mergeRows("otherIncomeRows");
  const otherIncome = sumKey("otherIncome");
  const otherExpense = sumKey("otherExpense");
  const tax = sumKey("tax");
  const netProfit = operatingProfit + otherIncome - otherExpense - tax;
  const netMargin = netSales ? netProfit / netSales : 0;
  const oci = sumKey("oci");
  const totalComprehensive = netProfit + oci;
  const last = list[list.length - 1] || {};
  return {
    grossSales, salesReturns, salesDiscounts, netSales, returnsRatio,
    openInv, purchases, closingInventory, cogs, grossProfit, grossMargin,
    opexRows, opex, opexRatio, operatingProfit, operatingMargin,
    otherIncomeRows, otherIncome, otherExpense, tax, netProfit, netMargin, oci, totalComprehensive,
    currentAssets: last.currentAssets || 0, nonCurrentAssets: last.nonCurrentAssets || 0, totalAssets: last.totalAssets || 0,
    currentLiab: last.currentLiab || 0, nonCurrentLiab: last.nonCurrentLiab || 0, totalLiab: last.totalLiab || 0,
    equityAccounts: last.equityAccounts || 0, totalEquity: (last.equityAccounts || 0) + netProfit,
    balanceDiff: last.balanceDiff || 0,
  };
}

/* ---------------------------------- عناصر عرض القوائم ---------------------------------- */

/* حساب أرقام فترة واحدة بشكل صحيح:
   - لو الميزان "تراكمي من بداية السنة" (الوضع الافتراضي في برامج الحسابات): أرقام قائمة الدخل
     للشهر = التراكمي الحالي − التراكمي للفترة السابقة في نفس السنة، والمركز المالي من الميزان الحالي مباشرة.
   - لو الميزان "حركة الشهر فقط": الأرقام تؤخذ كما هي. */
function periodFigures(sortedPeriods, period, yearOpeningInv) {
  const fCurr = computeFigures(period.rows, 0);
  const isCum = period.cumulative !== false;
  const samePrev = sortedPeriods.filter((p) => p.year === period.year && p.month < period.month).pop();

  const monthOpenInv = samePrev ? computeFigures(samePrev.rows, 0).closingInventory : (yearOpeningInv || period.openingInventory || 0);

  if (!isCum || !samePrev) {
    const cogs = monthOpenInv + fCurr.purchases - fCurr.closingInventory;
    const grossProfit = fCurr.netSales - cogs;
    const operatingProfit = grossProfit - fCurr.opex;
    const netProfit = operatingProfit + fCurr.otherIncome - fCurr.otherExpense - fCurr.tax;
    return {
      ...fCurr,
      openInv: monthOpenInv, cogs, grossProfit,
      grossMargin: fCurr.netSales ? grossProfit / fCurr.netSales : 0,
      operatingProfit, operatingMargin: fCurr.netSales ? operatingProfit / fCurr.netSales : 0,
      netProfit, netMargin: fCurr.netSales ? netProfit / fCurr.netSales : 0,
      totalComprehensive: netProfit + fCurr.oci,
    };
  }

  const fPrev = computeFigures(samePrev.rows, 0);
  const d = (k) => (fCurr[k] || 0) - (fPrev[k] || 0);
  const diffRows = (key) => {
    const prevMap = {};
    fPrev[key].forEach((r) => { prevMap[r.name] = r.amount; });
    const names = new Set([...fCurr[key].map((r) => r.name), ...Object.keys(prevMap)]);
    const currMap = {};
    fCurr[key].forEach((r) => { currMap[r.name] = r.amount; });
    return [...names].map((name) => ({ name, amount: (currMap[name] || 0) - (prevMap[name] || 0) })).filter((r) => Math.abs(r.amount) > 0.004);
  };

  const grossSales = d("grossSales");
  const salesReturns = d("salesReturns");
  const salesDiscounts = d("salesDiscounts");
  const netSales = grossSales - salesReturns - salesDiscounts;
  const purchases = d("purchases");
  const cogs = monthOpenInv + purchases - fCurr.closingInventory;
  const grossProfit = netSales - cogs;
  const opexRows = diffRows("opexRows");
  const opex = d("opex");
  const otherIncomeRows = diffRows("otherIncomeRows");
  const otherIncome = d("otherIncome");
  const otherExpense = d("otherExpense");
  const tax = d("tax");
  const operatingProfit = grossProfit - opex;
  const netProfit = operatingProfit + otherIncome - otherExpense - tax;
  const oci = d("oci");

  return {
    ...fCurr, // المركز المالي وأرصدة الحسابات من الميزان الحالي (as-of-date) — صحيح محاسبيًا
    grossSales, salesReturns, salesDiscounts, netSales,
    returnsRatio: grossSales ? salesReturns / grossSales : 0,
    openInv: monthOpenInv, purchases, cogs, grossProfit,
    grossMargin: netSales ? grossProfit / netSales : 0,
    opexRows, opex, opexRatio: netSales ? opex / netSales : 0,
    operatingProfit, operatingMargin: netSales ? operatingProfit / netSales : 0,
    otherIncomeRows, otherIncome, otherExpense, tax,
    netProfit, netMargin: netSales ? netProfit / netSales : 0,
    oci, totalComprehensive: netProfit + oci,
  };
}

/* الأرقام السنوية: لو الموازين تراكمية يكفي آخر ميزان في السنة (مع مخزون بداية السنة)،
   ولو شهرية تُجمَّع الفترات. */
function yearFigures(sortedPeriods, year, yearOpeningInv) {
  const ps = sortedPeriods.filter((p) => p.year === year);
  if (!ps.length) return null;
  const anyCumulative = ps.some((p) => p.cumulative !== false);
  if (anyCumulative) {
    const last = ps[ps.length - 1];
    return computeFigures(last.rows, yearOpeningInv ?? (ps[0].openingInventory || 0));
  }
  return mergeFigures(ps.map((p) => periodFigures(sortedPeriods, p, yearOpeningInv)));
}

function Line({ label, value, bold, indent, ruleTop }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderTop: ruleTop ? `1px solid ${RULE}` : "none", fontWeight: bold ? 700 : 400, paddingRight: indent ? 18 : 0, fontFamily: "'IBM Plex Sans Arabic', sans-serif", fontSize: bold ? 14.5 : 13.8, color: INK }}>
      <span>{label}</span>
      <span style={{ direction: "ltr", color: value < 0 ? RED_INK : INK }}>{fmt(value)}</span>
    </div>
  );
}

function StatementCard({ title, subtitle, children, wide, printId }) {
  return (
    <Card style={{ padding: 26, maxWidth: wide ? 900 : 640 }} >
      <div id={printId} className="print-area">
        <div style={{ textAlign: "center", marginBottom: 18, borderBottom: `2px solid ${INK}`, paddingBottom: 14 }}>
          <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 24, fontWeight: 700, color: INK }}>{title}</div>
          {subtitle && <div style={{ fontSize: 12.5, color: "#847c69", marginTop: 4 }}>{subtitle}</div>}
        </div>
        {children}
      </div>
    </Card>
  );
}

function PrintBtn({ targetId }) {
  return (
    <GhostBtn icon={ScrollText} onClick={() => {
      document.querySelectorAll(".print-area").forEach((el) => el.classList.remove("print-target"));
      const el = document.getElementById(targetId);
      if (el) el.classList.add("print-target");
      window.print();
    }}>
      تصدير PDF / طباعة
    </GhostBtn>
  );
}

function StmtTable({ children }) {
  return <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.3 }}><tbody>{children}</tbody></table>;
}
function SectionRow({ text }) {
  return (
    <tr>
      <td colSpan={4} style={{ padding: "10px 4px 4px", fontWeight: 700, color: GOLD, borderBottom: `1px solid ${RULE}`, fontSize: 13.5 }}>
        ▌ {text}
      </td>
    </tr>
  );
}
function ItemRow({ idx, label, partial }) {
  return (
    <tr style={{ borderBottom: `1px solid ${RULE}` }}>
      <td style={{ padding: "5px 4px", width: 26, color: "#8a8271", fontSize: 12 }}>{idx}</td>
      <td style={{ padding: "5px 4px" }}>{label}</td>
      <td style={{ padding: "5px 4px", textAlign: "left", direction: "ltr", width: 130, color: "#6b6455" }}>{partial ? fmt(partial) : ""}</td>
      <td style={{ padding: "5px 4px", width: 130 }}></td>
    </tr>
  );
}
function TotalRow({ label, total, mark }) {
  return (
    <tr style={{ borderTop: `2px solid ${INK}`, borderBottom: `1px solid ${RULE}` }}>
      <td colSpan={2} style={{ padding: "7px 4px", fontWeight: 700 }}>{mark ? `◆ ${label}` : label}</td>
      <td></td>
      <td style={{ padding: "7px 4px", textAlign: "left", direction: "ltr", fontWeight: 700, color: total < 0 ? RED_INK : INK }}>{fmt(total)}</td>
    </tr>
  );
}
function RatioRow({ label, value }) {
  return (
    <tr>
      <td colSpan={3} style={{ padding: "3px 4px", fontSize: 11.5, color: "#8a8271", fontStyle: "italic" }}>{label}</td>
      <td style={{ padding: "3px 4px", textAlign: "left", direction: "ltr", fontSize: 11.5, color: "#8a8271" }}>{(value * 100).toFixed(2)}%</td>
    </tr>
  );
}

          <RatioRow label="هامش إجمالي الربح" value={f.grossMargin} />

          <RatioRow label="هامش الربح التشغيلي" value={f.operatingMargin} />

          <SectionRow text="الإيرادات الأخرى" />
          {f.otherIncomeRows.map((r, i) => (<ItemRow key={i} idx={i + 1} label={r.name} partial={r.amount} />))}
          <TotalRow label="إجمالي الإيرادات الأخرى" total={f.otherIncome} />

          <ItemRow label="مصروفات أخرى" partial={f.otherExpense} />
          <ItemRow label="مصاريف الضرائب" partial={f.tax} />
          <TotalRow label="صافي الربح النهائي" total={f.netProfit} mark />
          <RatioRow label="هامش الربح الصافي" value={f.netMargin} />
        </StmtTable>
      </StatementCard>
    </div>
  );
}

          <Group title="الخصوم المتداولة" rows={f.liabilityCurrentRows} total={f.currentLiab} />
          <Group title="الخصوم غير المتداولة" rows={f.liabilityNoncurrentRows} total={f.nonCurrentLiab} />
          <TotalRow label="إجمالي الخصوم" total={f.totalLiab} />
          <Group title="حقوق الملكية" rows={f.equityAccountRows} total={f.equityAccounts} />

function PerformanceSummary({ f, periodLabel }) {
  const quickAssets = f.currentAssets - f.inventory;
  const ratios = [
    { l: "هامش مجمل الربح", v: f.netSales ? f.grossMargin * 100 : null, unit: "%" },
    { l: "هامش ربح التشغيل", v: f.netSales ? f.operatingMargin * 100 : null, unit: "%" },
    { l: "هامش صافي الربح", v: f.netSales ? f.netMargin * 100 : null, unit: "%" },
    { l: "نسبة المصروفات لصافي المبيعات", v: f.netSales ? f.opexRatio * 100 : null, unit: "%" },
    { l: "نسبة مردودات المبيعات", v: f.grossSales ? f.returnsRatio * 100 : null, unit: "%" },
    { l: "نسبة التداول", v: f.currentLiab ? f.currentAssets / f.currentLiab : null, unit: "×" },
    { l: "نسبة السيولة السريعة", v: f.currentLiab ? quickAssets / f.currentLiab : null, unit: "×" },
    { l: "نسبة الدين إلى حقوق الملكية", v: f.totalEquity ? f.totalLiab / f.totalEquity : null, unit: "×" },
    { l: "العائد على الأصول (ROA)", v: f.totalAssets ? (f.netProfit / f.totalAssets) * 100 : null, unit: "%" },
    { l: "العائد على حقوق الملكية (ROE)", v: f.totalEquity ? (f.netProfit / f.totalEquity) * 100 : null, unit: "%" },
  ];
  return (
    <StatementCard title="ملخص الأداء" subtitle={periodLabel}>
      {ratios.map((r, i) => (
        <div key={r.l} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: i < ratios.length - 1 ? `1px solid ${RULE}` : "none" }}>

function round2(n) { return Math.round(n * 100) / 100; }

function computeZakatTotal(zakatData) {
  if (!zakatData || !zakatData.rows || !zakatData.items) return 0;
  const f = computeFigures(zakatData.rows);
  const assetItems = zakatData.items.filter((i) => i.group === "asset");
  const liabilityItems = zakatData.items.filter((i) => i.group === "liability");
  const zakatBase = assetItems.reduce((s, i) => s + i.amount, 0) - liabilityItems.reduce((s, i) => s + i.amount, 0);
  const days = zakatData.hawlStart && zakatData.hawlEnd ? Math.round((new Date(zakatData.hawlEnd) - new Date(zakatData.hawlStart)) / 86400000) : 354;
  const proration = Math.min(days / 354, 1) || 1;
  const rate = zakatData.rate ?? 2.5;
  const nisab = zakatData.nisab ?? 0;
  const partnersRaw = f.equityAccountRows.filter((r) => r.amount > 0);
  const totalEquity = partnersRaw.reduce((s, p) => s + p.amount, 0);
  return partnersRaw.reduce((s, p) => {
    const share = zakatBase * (totalEquity ? p.amount / totalEquity : 0);
    const meets = nisab > 0 ? share >= nisab : share > 0;
    return s + (meets ? share * (rate / 100) * proration : 0);
  }, 0);
}

function ZakatModule({ data, setData, readOnly }) {
  const [file, setFile] = useState(null);
  const [parsed, setParsed] = useState(null);
  const [pendingRows, setPendingRows] = useState(null);
  const [mode, setMode] = useState(null);
  const [mapping, setMapping] = useState(null);
  const [zDraftRows, setZDraftRows] = useState(null);

  const rows = data.rows;
  const f = useMemo(() => (rows ? computeFigures(rows) : null), [rows]);

  const onFile = async (fl) => {
    setFile(fl.name);
    const res = await parseWorkbook(fl);
    setParsed(res.rawRows);
    setMode(res.mode);
    if (res.mode === "tree") setPendingRows(res.rows);
    else setMapping(res.mapping);
  };
  const saveZakatDraft = () => { setData({ rows: zDraftRows, items: null }); setZDraftRows(null); };

  useEffect(() => {
    if (f && !data.items) {
      const taxLiab = round2(Math.abs(f.liabilityCurrentRows.filter((r) => /ضريبة/.test(r.name)).reduce((s, r) => s + r.amount, 0)));
      setData({
        items: [
          { id: uid(), group: "asset", label: "النقدية والخزائن", amount: round2(f.cash) },
          { id: uid(), group: "asset", label: "المدينون الآخرون والأمانات", amount: 0 },
          { id: uid(), group: "asset", label: "ذمم العملاء المدينة (المرجوة)", amount: round2(Math.abs(f.customerDebt)) },
          { id: uid(), group: "asset", label: "دفعات مقدمة للموردين", amount: round2(Math.abs(f.supplierPrepaid)) },
          { id: uid(), group: "asset", label: "المخزون التجاري (بسعر السوق)", amount: round2(f.closingInventory) },
          { id: uid(), group: "liability", label: "موردون (أرصدة دائنة)", amount: round2(Math.abs(f.supplierDebt)) },
          { id: uid(), group: "liability", label: "دفعات مقدمة من العملاء", amount: round2(Math.abs(f.customerPrepaid)) },
          { id: uid(), group: "liability", label: "ضرائب مستحقة", amount: taxLiab },
        ],
      });
    }
    // eslint-disable-next-line
  }, [f]);

  const items = data.items || [];
  const assetItems = items.filter((i) => i.group === "asset");
  const liabilityItems = items.filter((i) => i.group === "liability");
  const totalAssets = assetItems.reduce((s, i) => s + i.amount, 0);
  const totalLiab = liabilityItems.reduce((s, i) => s + i.amount, 0);
  const zakatBase = totalAssets - totalLiab;

  const days = data.hawlStart && data.hawlEnd ? Math.round((new Date(data.hawlEnd) - new Date(data.hawlStart)) / 86400000) : 354;
  const proration = Math.min(days / 354, 1) || 1;
  const rate = data.rate ?? 2.5;
  const nisab = data.nisab ?? 0;
  const baseMeetsNisab = nisab > 0 ? zakatBase >= nisab : null;

  const partnersRaw = f ? f.equityAccountRows.filter((r) => r.amount > 0) : [];
  const totalEquity = partnersRaw.reduce((s, p) => s + p.amount, 0);
  const partners = partnersRaw.map((p) => {
    const pct = totalEquity ? p.amount / totalEquity : 0;
    const share = zakatBase * pct;
    const meets = nisab > 0 ? share >= nisab : share > 0;
    const due = meets ? share * (rate / 100) * proration : 0;
    return { name: p.name, pct, share, meets, due };
  });
  const totalDue = partners.reduce((s, p) => s + p.due, 0);

  const updateItem = (id, patch) => setData({ items: items.map((i) => (i.id === id ? { ...i, ...patch } : i)) });
  const removeItem = (id) => setData({ items: items.filter((i) => i.id !== id) });
  const addItem = (group) => setData({ items: [...items, { id: uid(), group, label: "بند إضافي", amount: 0 }] });

  const ItemsGroup = ({ title, list, group }) => (
    <div style={{ marginBottom: 20 }}>
      <div style={{ fontWeight: 700, color: GOLD, marginBottom: 8, fontSize: 13.5 }}>{title}</div>
      {list.map((it) => (
        <div key={it.id} style={{ border: `1px solid ${RULE}`, borderRadius: 9, padding: 10, marginBottom: 8, background: "#fff" }}>
          <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 6 }}>
            <input value={it.label} disabled={readOnly} onChange={(e) => updateItem(it.id, { label: e.target.value })}
              style={{ flex: 1, minWidth: 0, border: "none", fontFamily: "'IBM Plex Sans Arabic', sans-serif", fontSize: 13, fontWeight: 600, color: INK, background: "transparent", outline: "none" }} />
            {!readOnly && <button onClick={() => removeItem(it.id)} style={{ background: "none", border: "none", cursor: "pointer", color: RED_INK, flexShrink: 0 }}><Trash2 size={14} /></button>}
          </div>
          <NumInput value={it.amount} disabled={readOnly} onChange={(e) => updateItem(it.id, { amount: parseFloat(e.target.value) || 0 })} style={{ width: "100%" }} />
        </div>
      ))}
      {!readOnly && <GhostBtn icon={Plus} onClick={() => addItem(group)}>إضافة بند</GhostBtn>}
      <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, borderTop: `2px solid ${INK}`, marginTop: 8, paddingTop: 6, fontSize: 13.5 }}>
        <span>{`إجمالي ${title}`}</span>
        <span style={{ direction: "ltr" }}>{fmt(list.reduce((s, i) => s + i.amount, 0))}</span>
      </div>
    </div>
  );

  return (
    <div>
      <SectionTitle icon={Landmark} sub="ارفع ميزان مراجعة منفصل بتاريخ بداية الحول لحساب وعاء الزكاة">حساب الزكاة الشرعية</SectionTitle>

      {!rows && !zDraftRows && !readOnly && (
        <>
          <UploadZone title="رفع ميزان مراجعة بداية الحول" onFile={onFile} fileName={file} />
          {mode === "tree" && pendingRows && (
            <TreeConfirm rows={pendingRows} onConfirm={() => setZDraftRows(pendingRows)} onFallback={() => { setMode("flat"); setMapping(detectFlatColumns(parsed) || { headerRow: 0, code: 0, name: 1, debit: 2, credit: 3 }); }} />
          )}
          {mode === "flat" && parsed && mapping && (
            <MappingConfirm rawRows={parsed} mapping={mapping} setMapping={setMapping} onConfirm={() => setZDraftRows(buildFlatRows(parsed, mapping))} />
          )}
        </>
      )}
      {!rows && zDraftRows && !readOnly && (
        <div>
          <p style={{ fontSize: 13, color: "#6b6455", marginBottom: 12 }}>راجع تصنيف كل حساب، وخصوصًا حسابات حقوق الملكية (لازم كل شريك يكون حساب مصنّف "حقوق ملكية" لوحده حتى يظهر في حساب الزكاة الفردي)، ثم اضغط الزرار تحت لحفظ ميزان الزكاة.</p>
          <ClassifyTable rows={zDraftRows} setRows={setZDraftRows} onNext={saveZakatDraft} nextLabel="✓ حفظ ميزان الزكاة" />
        </div>
      )}
      {!rows && readOnly && (
        <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>لا توجد بيانات زكاة مرفوعة لهذه الشركة بعد، وصلاحيتك هنا مشاهدة فقط.</Card>
      )}

      {rows && f && (
        <div>
          {!readOnly && (
            <div style={{ display: "flex", justifyContent: "space-between", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
              <PrintBtn targetId="print-zakat" />
              <GhostBtn icon={RefreshCw} onClick={() => { if (window.confirm("هيتم مسح ميزان الزكاة الحالي وتحتاج ترفع ميزان جديد. متأكد؟")) setData({ rows: null, items: null }); }}>رفع ميزان زكاة جديد</GhostBtn>
            </div>
          )}
          {readOnly && <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 10 }}><PrintBtn targetId="print-zakat" /></div>}
          <div id="print-zakat" className="print-area">
          <Card style={{ padding: 18, marginBottom: 16 }}>
            <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
              <div>
                <label style={{ fontSize: 12, color: "#6b6455" }}>بداية الحول</label>
                <input type="date" value={data.hawlStart} disabled={readOnly} onChange={(e) => setData({ hawlStart: e.target.value })} style={{ display: "block", border: `1px solid ${RULE}`, borderRadius: 7, padding: "6px 9px", fontFamily: "inherit", fontSize: 13 }} />
              </div>
              <div>
                <label style={{ fontSize: 12, color: "#6b6455" }}>نهاية الحول (تاريخ الميزان)</label>
                <input type="date" value={data.hawlEnd} disabled={readOnly} onChange={(e) => setData({ hawlEnd: e.target.value })} style={{ display: "block", border: `1px solid ${RULE}`, borderRadius: 7, padding: "6px 9px", fontFamily: "inherit", fontSize: 13 }} />
              </div>
              <div>
                <label style={{ fontSize: 12, color: "#6b6455" }}>نسبة الزكاة %</label>
                <NumInput value={rate} disabled={readOnly} onChange={(e) => setData({ rate: parseFloat(e.target.value) || 0 })} style={{ width: 80 }} />
              </div>
              <div>
                <label style={{ fontSize: 12, color: "#6b6455" }}>نصاب الزكاة (قيمة 85 جم ذهب 24)</label>
                <NumInput value={nisab} disabled={readOnly} onChange={(e) => setData({ nisab: parseFloat(e.target.value) || 0 })} style={{ width: 140 }} />
              </div>
            </div>
          </Card>

          <Card style={{ padding: 20, marginBottom: 16 }}>
            <div style={{ fontWeight: 700, marginBottom: 4, color: INK, fontSize: 15 }}>أ ▎ الأصول الزكوية</div>
            <ItemsGroup title="الأصول الزكوية" list={assetItems} group="asset" />
            <div style={{ fontWeight: 700, marginBottom: 4, color: INK, fontSize: 15 }}>ب ▎ الخصوم واجبة الخصم</div>
            <ItemsGroup title="الخصوم واجبة الخصم" list={liabilityItems} group="liability" />

            <div style={{ background: "#f4efe2", borderRadius: 8, padding: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, fontSize: 14.5 }}>
                <span>ج ▎ وعاء الزكاة الصافي</span>
                <span style={{ direction: "ltr" }}>{fmt(zakatBase)}</span>
              </div>
              {nisab > 0 && (
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, marginTop: 6, color: baseMeetsNisab ? GREEN_INK : RED_INK }}>
                  <span>هل بلغ الوعاء النصاب؟</span>
                  <span>{baseMeetsNisab ? "✅ نعم" : "❌ لا"}</span>
                </div>
              )}
            </div>
          </Card>

          {partners.length > 0 && (
            <Card style={{ padding: 20, marginBottom: 16 }}>
              <div style={{ fontWeight: 700, marginBottom: 4, color: INK, fontSize: 15 }}>د ▎ زكاة كل شريك منفردة</div>
              <p style={{ fontSize: 11.5, color: "#847c69", marginBottom: 12 }}>النصاب يُقاس على حصة كل شريك من وعاء الزكاة على حدة (حسب نسبته في حسابات حقوق الملكية بميزان الزكاة)</p>
              {partners.map((p, i) => (
                <div key={i} style={{ borderBottom: i < partners.length - 1 ? `1px solid ${RULE}` : "none", padding: "8px 0" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
                    <span>حصة {p.name} ({(p.pct * 100).toFixed(2)}%) من وعاء الزكاة</span>
                    <span style={{ direction: "ltr" }}>{fmt(p.share)}</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, color: p.meets ? GREEN_INK : "#8a8271", marginTop: 3 }}>
                    <span>➤ زكاة {p.name} المستحقة ({rate}%)</span>
                    <span style={{ direction: "ltr", fontWeight: 700 }}>{p.meets ? fmt(p.due) : (nisab > 0 ? "❌ لم يبلغ النصاب" : "—")}</span>
                  </div>
                </div>
              ))}
              <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, borderTop: `2px solid ${INK}`, marginTop: 10, paddingTop: 8, fontSize: 14 }}>
                <span>◆ إجمالي الزكاة المستحقة (من بلغ النصاب فقط)</span>
                <span style={{ direction: "ltr", color: GOLD }}>{fmt(totalDue)}</span>
              </div>
            </Card>
          )}

          <Card style={{ padding: 20, background: INK, color: CREAM, textAlign: "center" }}>
            <div style={{ fontSize: 12.5, opacity: 0.8 }}>عدد أيام الحول: {days} يوم · نسبة التناسب {(proration * 100).toFixed(1)}%</div>
            <div style={{ fontSize: 12.5, opacity: 0.8, marginTop: 4 }}>الزكاة المستحقة الإجمالية</div>
            <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 32, color: GOLD, fontWeight: 700 }}>{fmt(totalDue)}</div>
          </Card>
          </div>
        </div>
      )}
    </div>
  );
}

function newCompanyDoc(name, user) {
  return {
    name,
    legalName: "",
    ownerUid: user.uid,
    ownerEmail: user.email,
    editorEmails: [],
    viewerEmails: [],
    periods: [],
    opening: {},
    zakat: { rows: null, hawlStart: "", hawlEnd: "", adjustments: null, rate: 2.5 },
    createdAt: Date.now(),
  };
}

function getRole(company, user) {
  if (!company || !user) return null;
  if (company.ownerUid === user.uid) return "owner";
  if ((company.editorEmails || []).includes(user.email)) return "editor";
  if ((company.viewerEmails || []).includes(user.email)) return "viewer";
  return null;
}

      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>

            حركة الشهر فقط
          </button>
        </div>
        <p style={{ fontSize: 10.5, color: "#8a8271", marginTop: 6 }}>
          {cumulative
            ? "التطبيق هيحسب أرقام كل شهر تلقائيًا بطرح الميزان التراكمي السابق — وده الصح لو الميزان بيطلع بـ«رصيد نهاية المدة»"
            : "هيتعامل مع أرقام قائمة الدخل في الميزان على إنها حركة الشهر ده فقط"}
        </p>
      </div>
      <div style={{ position: "sticky", bottom: 10, marginTop: 14, zIndex: 5 }}>
        <PrimaryBtn icon={Check} onClick={onSave}>{isNew ? "✓ حفظ الفترة" : "✓ حفظ التعديلات"}</PrimaryBtn>

}

function MainApp({ user }) {
  const [companies, setCompanies] = useState([]);
  const [loadingCompanies, setLoadingCompanies] = useState(true);
  const [activeId, setActiveId] = useState(null);
  const [screen, setScreen] = useState("companies");
  const [step, setStep] = useState("upload");
  const [stmtTab, setStmtTab] = useState("home");

  const [file, setFile] = useState(null);
  const [parsed, setParsed] = useState(null);
  const [pendingRows, setPendingRows] = useState(null);
  const [mode, setMode] = useState(null);
  const [mapping, setMapping] = useState(null);

  const [draftRows, setDraftRows] = useState(null);
  const [draftIsNew, setDraftIsNew] = useState(true);
  const [draftPeriodId, setDraftPeriodId] = useState(null);
  const [draftYear, setDraftYear] = useState(new Date().getFullYear());
  const [draftMonth, setDraftMonth] = useState(new Date().getMonth() + 1);
  const [draftOpeningInv, setDraftOpeningInv] = useState(0);
  const [draftCumulative, setDraftCumulative] = useState(true);

  const [activePeriodId, setActivePeriodId] = useState(null);
  const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());

  useEffect(() => {
    const merged = {};
    let received = 0;
    const finishInit = () => { received++; if (received >= 3) setLoadingCompanies(false); };
    const apply = (snap) => {
      snap.docChanges().forEach((change) => {
        if (change.type === "removed") delete merged[change.doc.id];
        else merged[change.doc.id] = { id: change.doc.id, ...change.doc.data() };
      });
      setCompanies(Object.values(merged).sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)));
    };
    const unsub1 = db.collection("companies").where("ownerUid", "==", user.uid).onSnapshot((s) => { apply(s); finishInit(); }, () => finishInit());
    const unsub2 = db.collection("companies").where("editorEmails", "array-contains", user.email).onSnapshot((s) => { apply(s); finishInit(); }, () => finishInit());
    const unsub3 = db.collection("companies").where("viewerEmails", "array-contains", user.email).onSnapshot((s) => { apply(s); finishInit(); }, () => finishInit());
    return () => { unsub1(); unsub2(); unsub3(); };
  }, [user.uid, user.email]);

  const active = companies.find((c) => c.id === activeId) || null;
  const role = getRole(active, user);
  const readOnly = role === "viewer";
  const isOwner = role === "owner";
  const periods = (active && active.periods) || [];
  const sortedPeriods = [...periods].sort((a, b) => (a.year - b.year) || (a.month - b.month));
  const activePeriod = sortedPeriods.find((p) => p.id === activePeriodId) || sortedPeriods[sortedPeriods.length - 1] || null;
  const availableYears = Array.from(new Set(sortedPeriods.map((p) => p.year))).sort();

  const patchCompany = (patch) => {
    if (!activeId || readOnly) return;
    db.collection("companies").doc(activeId).update(patch).catch((e) => console.error("تعذر الحفظ:", e));
  };
  const patchZakat = (patch) => {
    if (!activeId || readOnly) return;
    const upd = {};
    Object.keys(patch).forEach((k) => { upd[`zakat.${k}`] = patch[k]; });
    db.collection("companies").doc(activeId).update(upd).catch((e) => console.error("تعذر الحفظ:", e));
  };
  const savePeriod = (periodObj) => {
    const others = periods.filter((p) => p.id !== periodObj.id);
    const next = [...others, periodObj];
    patchCompany({ periods: next });
  };
  const deletePeriod = (id) => {
    if (!isOwner) return;
    patchCompany({ periods: periods.filter((p) => p.id !== id) });
    if (activePeriodId === id) setActivePeriodId(null);
  };

  const addCompany = (name) => {
    db.collection("companies").add(newCompanyDoc(name, user)).then((ref) => {
      setActiveId(ref.id);
      setScreen("workspace");
      setStep("upload");
      resetUploadState();
    });
  };
  const openCompany = (id) => {
    const c = companies.find((x) => x.id === id);
    setActiveId(id);
    setScreen("workspace");
    const ps = (c && c.periods) || [];
    const latest = [...ps].sort((a, b) => (a.year - b.year) || (a.month - b.month)).pop();
    setActivePeriodId(latest ? latest.id : null);
    if (latest) setSelectedYear(latest.year);
    setStep(latest ? "statements" : "upload");
    setStmtTab("home");
    resetUploadState();
  };
  const openCompanyZakat = (id) => {
    const c = companies.find((x) => x.id === id);
    setActiveId(id);
    setScreen("workspace");
    const ps = (c && c.periods) || [];
    const latest = [...ps].sort((a, b) => (a.year - b.year) || (a.month - b.month)).pop();
    setActivePeriodId(latest ? latest.id : null);
    if (latest) setSelectedYear(latest.year);
    setStep("zakat");
    resetUploadState();
  };
  const deleteCompany = (id) => db.collection("companies").doc(id).delete();
  const renameCompany = (id, name) => db.collection("companies").doc(id).update({ name });

  const shareAccess = (companyId, email, roleToGrant) => {
    const field = roleToGrant === "editor" ? "editorEmails" : "viewerEmails";
    db.collection("companies").doc(companyId).update({ [field]: firebase.firestore.FieldValue.arrayUnion(email.trim().toLowerCase()) });
  };
  const revokeAccess = (companyId, email, roleToRevoke) => {
    const field = roleToRevoke === "editor" ? "editorEmails" : "viewerEmails";
    db.collection("companies").doc(companyId).update({ [field]: firebase.firestore.FieldValue.arrayRemove(email) });
  };

  const resetUploadState = () => { setFile(null); setParsed(null); setPendingRows(null); setMode(null); setMapping(null); };

  const onFile = async (f) => {
    setFile(f.name);
    const res = await parseWorkbook(f);
    setParsed(res.rawRows);
    setMode(res.mode);
    if (res.mode === "tree") setPendingRows(res.rows);
    else setMapping(res.mapping);
  };

  const [batchBusy, setBatchBusy] = useState(false);
  const onFiles = async (files) => {
    setBatchBusy(true);
    try {
      // رتّب الملفات أبجديًا حسب الاسم (عادة بتبقى مرقّمة بالشهور)
      const sorted = [...files].sort((a, b) => a.name.localeCompare(b.name, "ar", { numeric: true }));
      let baseMonth, baseYear, openInv;
      if (sortedPeriods.length) {
        const last = sortedPeriods[sortedPeriods.length - 1];
        baseMonth = last.month === 12 ? 1 : last.month + 1;
        baseYear = last.month === 12 ? last.year + 1 : last.year;
      } else {
        const now = new Date();
        baseMonth = 1; baseYear = now.getFullYear();
      }
      const newPeriods = [];
      for (let i = 0; i < sorted.length; i++) {
        const res = await parseWorkbook(sorted[i]);
        const rows = res.mode === "tree" ? res.rows : buildFlatRows(res.rawRows, res.mapping);
        let m = baseMonth + i, y = baseYear;
        while (m > 12) { m -= 12; y += 1; }
        newPeriods.push({ id: uid(), year: y, month: m, rows, openingInventory: 0, cumulative: true, uploadedAt: Date.now(), fileName: sorted[i].name });
      }
      const others = periods.filter((p) => !newPeriods.some((np) => np.year === p.year && np.month === p.month));
      patchCompany({ periods: [...others, ...newPeriods] });
      const firstNew = newPeriods[0];
      if (firstNew) { setActivePeriodId(firstNew.id); setSelectedYear(firstNew.year); }
      setStep("statements");
      setStmtTab("home");
      alert(`تم رفع ${newPeriods.length} ميزان بنجاح وتوزيعهم على الشهور تلقائيًا. راجع تصنيف الحسابات لكل شهر من تاب «رفع فترة» ← تعديل، وصحّح أي تصنيف أو تاريخ لو لزم.`);
    } catch (e) {
      alert("حصل خطأ أثناء رفع الملفات: " + e.message);
    }
    setBatchBusy(false);
  };

  const beginDraft = (rows) => {
    setDraftRows(rows);
    setDraftIsNew(true);
    setDraftPeriodId(uid());
    setDraftCumulative(true);
    const now = new Date();
    let y = now.getFullYear(), m = now.getMonth() + 1;
    // اقترح الشهر التالي لآخر فترة محفوظة
    if (sortedPeriods.length) {
      const last = sortedPeriods[sortedPeriods.length - 1];
      m = last.month === 12 ? 1 : last.month + 1;
      y = last.month === 12 ? last.year + 1 : last.year;
      const firstOfYear = sortedPeriods.find((p) => p.year === (last.month === 12 ? last.year + 1 : last.year));
      setDraftOpeningInv(firstOfYear ? (firstOfYear.openingInventory || 0) : (last.month === 12 ? round2(computeFigures(last.rows, 0).closingInventory) : (last.openingInventory || 0)));
    } else {
      setDraftOpeningInv(0);
    }
    setDraftYear(y);
    setDraftMonth(m);
    setStep("classify");
  };
  const confirmTree = () => beginDraft(pendingRows);
  const confirmFlat = () => beginDraft(buildFlatRows(parsed, mapping));

  const startEditPeriod = (p) => {
    setDraftRows(p.rows);
    setDraftIsNew(false);
    setDraftPeriodId(p.id);
    setDraftYear(p.year);
    setDraftMonth(p.month);
    setDraftOpeningInv(p.openingInventory || 0);
    setDraftCumulative(p.cumulative !== false);
    setStep("classify");
  };

  const finalizeDraft = () => {
    const periodObj = { id: draftPeriodId, year: draftYear, month: draftMonth, rows: draftRows, openingInventory: draftOpeningInv, cumulative: draftCumulative, uploadedAt: Date.now() };
    savePeriod(periodObj);
    setActivePeriodId(draftPeriodId);
    setSelectedYear(draftYear);
    setDraftRows(null);
    setStep("statements");
    setStmtTab("income_monthly");
    resetUploadState();
  };

  const yearOpeningInvOf = (y) => {
    const first = sortedPeriods.find((p) => p.year === y);
    return first ? (first.openingInventory || 0) : 0;
  };

  // أرقام الشهر النشط: قائمة الدخل للشهر وحده (بعد طرح التراكمي السابق لو الميزان تراكمي)
  const figures = useMemo(() => (activePeriod ? periodFigures(sortedPeriods, activePeriod, yearOpeningInvOf(activePeriod.year)) : null), [activePeriod, sortedPeriods]);
  const monthlyPeriodLabel = activePeriod ? `قائمة الدخل الشهرية ◆ ${MONTH_NAMES[activePeriod.month - 1]} ${activePeriod.year}` : "";
  const monthlySourceLabel = activePeriod ? `من واقع ميزان مراجعة شهر ${MONTH_NAMES[activePeriod.month - 1]} ${activePeriod.year}` : "";

  // المركز المالي: أرصدة الميزان الحالي كما هي، وصافي الربح التراكمي منذ بداية السنة
  // (وفق العرض المحاسبي السليم: الأصول = الخصوم + حقوق الملكية + أرباح الفترة المتجمعة)
  const balanceFigures = useMemo(() => {
    if (!activePeriod) return null;
    const asOf = computeFigures(activePeriod.rows, 0);
    const ytd = yearFigures(sortedPeriods.filter((p) => p.year === activePeriod.year && p.month <= activePeriod.month), activePeriod.year, yearOpeningInvOf(activePeriod.year));
    const ytdProfit = ytd ? ytd.netProfit : asOf.netProfit;
    const totalEquity = asOf.equityAccounts + ytdProfit;
    return { ...asOf, netProfit: ytdProfit, totalEquity, balanceDiff: asOf.totalAssets - (asOf.totalLiab + totalEquity) };
  }, [activePeriod, sortedPeriods]);

  const yearPeriods = sortedPeriods.filter((p) => p.year === selectedYear);
  const annualFigures = useMemo(() => yearFigures(sortedPeriods, selectedYear, yearOpeningInvOf(selectedYear)), [sortedPeriods, selectedYear]);
  const annualPeriodLabel = `قائمة الدخل السنوية ◆ ${selectedYear}`;
  const annualSourceLabel = `${yearPeriods.length} ${yearPeriods.length === 1 ? "شهر فعلي" : "أشهر فعلية"} من واقع الموازين الشهرية`;

  if (screen === "companies") {
    return (
      <div style={{ minHeight: "100vh", background: CREAM, fontFamily: "'IBM Plex Sans Arabic', sans-serif" }} dir="rtl">
        <style>{FONTS}</style>
        <div style={{ background: INK, color: CREAM, padding: "14px 14px" }} className="no-print">
          <div style={{ maxWidth: 1180, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, flexWrap: "wrap" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ background: "#FEFDFB", borderRadius: 8, padding: "6px 9px" }}>
                <img src={LOGO_URI} alt="Selim Finance" style={{ height: 22, display: "block" }} />
              </div>
              <div>
                <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 16, fontWeight: 700 }}>القوائم المالية والزكاة</div>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ fontSize: 10.5, opacity: 0.85, direction: "ltr" }}>{user.email}</div>
              <button onClick={() => auth.signOut()} style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 7, padding: "6px 10px", color: CREAM, cursor: "pointer", display: "flex", alignItems: "center", gap: 5, fontSize: 11.5 }}>
                <LogOut size={12} /> خروج
              </button>
            </div>
          </div>
        </div>
        <div style={{ maxWidth: 1180, margin: "0 auto", padding: "18px 14px" }}>
          <div style={{ fontSize: 11, color: "#847c69", marginBottom: 14, display: "flex", alignItems: "center", gap: 6 }}>
            <Check size={12} color={GREEN_INK} /> بياناتك محفوظة على السحابة ومتزامنة على أي جهاز تسجّل دخول منه بنفس الحساب
          </div>
          {loadingCompanies ? (
            <div style={{ color: "#847c69", fontSize: 13 }}>جارِ تحميل الشركات…</div>
          ) : (
            <CompanyList companies={companies} user={user} onOpen={openCompany} onOpenZakat={openCompanyZakat} onAdd={addCompany} onDelete={deleteCompany} onRename={renameCompany} onShare={shareAccess} onRevoke={revokeAccess} />
          )}
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: CREAM, fontFamily: "'IBM Plex Sans Arabic', sans-serif" }} dir="rtl">
      <style>{FONTS}</style>

      <div style={{ background: INK, color: CREAM, padding: "10px 14px" }} className="no-print">
        <div style={{ maxWidth: 1180, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 8 }}>
            <button onClick={() => setScreen("companies")} style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 7, padding: "6px 10px", color: CREAM, cursor: "pointer", display: "flex", alignItems: "center", gap: 5, fontSize: 12.5, flexShrink: 0 }}>
              <ArrowRight size={13} /> الشركات
            </button>
            <img src={LOGO_URI} alt="Selim Finance" style={{ height: 18, display: "block" }} />
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 18, fontWeight: 700 }}>{active?.name}</div>
            <span style={{ fontSize: 9.5, fontWeight: 600, color: GOLD, background: "rgba(184,137,43,0.15)", borderRadius: 20, padding: "2px 8px" }}>
              {role === "owner" ? "مالك" : role === "editor" ? "تعديل" : "مشاهدة فقط"}
            </span>
          </div>
        </div>
        {sortedPeriods.length > 0 && (
          <div style={{ maxWidth: 1180, margin: "8px auto 0", display: "flex", gap: 5, flexWrap: "wrap" }}>
            {sortedPeriods.map((p) => (
              <button key={p.id} onClick={() => { setActivePeriodId(p.id); setSelectedYear(p.year); if (step === "upload") setStep("statements"); }}
                style={{ background: activePeriodId === p.id || (!activePeriodId && p.id === sortedPeriods[sortedPeriods.length - 1].id) ? GOLD : "rgba(255,255,255,0.08)", color: activePeriodId === p.id ? INK : CREAM, border: "none", borderRadius: 20, padding: "4px 10px", fontSize: 10.5, cursor: "pointer" }}>
                {MONTH_NAMES[p.month - 1]} {p.year}
              </button>
            ))}
          </div>
        )}
      </div>

      <div style={{ background: "#fff", borderBottom: `1px solid ${RULE}` }} className="no-print">
        <div style={{ maxWidth: 1180, margin: "0 auto", display: "flex", gap: 2, padding: "0 10px", overflowX: "auto" }}>
          {STEPS.map((s) => {
            const blockedForViewer = readOnly && (s.key === "upload" || s.key === "classify");
            const enabled = (s.key === "upload" || s.key === "zakat" || (active && sortedPeriods.length)) && !blockedForViewer;
            const isActive = step === s.key;
            return (
              <button key={s.key} disabled={!enabled} onClick={() => enabled && setStep(s.key)}
                style={{ display: "flex", alignItems: "center", gap: 5, padding: "10px 10px", background: "none", border: "none", borderBottom: isActive ? `3px solid ${GOLD}` : "3px solid transparent", color: isActive ? INK : enabled ? "#6b6455" : "#c9c2ae", fontWeight: isActive ? 700 : 500, fontSize: 12.5, cursor: enabled ? "pointer" : "not-allowed", fontFamily: "'IBM Plex Sans Arabic', sans-serif", whiteSpace: "nowrap", flexShrink: 0 }}>
                <s.icon size={13} /> {s.label}
              </button>
            );
          })}
        </div>
      </div>

      <div style={{ maxWidth: 1180, margin: "0 auto", padding: "18px 14px" }}>
        {step === "upload" && !readOnly && (
          <div>
            <SectionTitle icon={Upload} sub="ارفع ميزان شهر واحد، أو عدة ملفات دفعة واحدة (كل ملف = شهر) وسيوزّعها التطبيق تلقائيًا">رفع فترة جديدة</SectionTitle>
            {batchBusy && <Card style={{ padding: 16, marginBottom: 12, textAlign: "center", color: GOLD, fontWeight: 600 }}>جارِ رفع ومعالجة الملفات…</Card>}
            <UploadZone title="رفع ميزان مراجعة" onFile={onFile} onFiles={onFiles} fileName={file} />
            {mode === "tree" && pendingRows && (
              <TreeConfirm rows={pendingRows} onConfirm={confirmTree} onFallback={() => { setMode("flat"); setMapping(detectFlatColumns(parsed) || { headerRow: 0, code: 0, name: 1, debit: 2, credit: 3 }); }} />
            )}
            {mode === "flat" && parsed && mapping && (
              <MappingConfirm rawRows={parsed} mapping={mapping} setMapping={setMapping} onConfirm={confirmFlat} />
            )}
            {sortedPeriods.length > 0 && (
              <div style={{ marginTop: 24 }}>
                <div style={{ fontWeight: 700, marginBottom: 10, color: INK, fontSize: 14 }}>الموازين المرفوعة ({sortedPeriods.length})</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 10 }}>
                  {sortedPeriods.map((p) => {
                    const pf = computeFigures(p.rows, 0);
                    return (
                      <Card key={p.id} style={{ padding: 12 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                          <span style={{ fontWeight: 700, fontSize: 13.5, color: INK }}>{MONTH_NAMES[p.month - 1]} {p.year}</span>
                          {p.cumulative !== false && <span style={{ fontSize: 8.5, background: "#eef2e9", color: GREEN_INK, borderRadius: 10, padding: "1px 6px" }}>تراكمي</span>}
                        </div>
                        <div style={{ fontSize: 10.5, color: "#847c69", marginBottom: 8 }}>{p.rows.length} حساب · مبيعات {fmt(pf.grossSales)}</div>
                        {!readOnly && (
                          <div style={{ display: "flex", gap: 6 }}>
                            <button onClick={() => startEditPeriod(p)} style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 4, background: "#fff", color: INK, border: `1px solid ${RULE}`, borderRadius: 6, padding: "5px", fontSize: 11, cursor: "pointer", fontFamily: "'IBM Plex Sans Arabic', sans-serif" }}><Pencil size={11} /> تعديل</button>
                            {isOwner && <button onClick={() => { if (confirm(`حذف ميزان ${MONTH_NAMES[p.month - 1]} ${p.year}؟`)) deletePeriod(p.id); }} style={{ display: "flex", alignItems: "center", justifyContent: "center", background: "#fff", color: RED_INK, border: `1px solid ${RULE}`, borderRadius: 6, padding: "5px 8px", cursor: "pointer" }}><Trash2 size={11} /></button>}
                          </div>
                        )}
                      </Card>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}
        {step === "upload" && readOnly && (
          <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>لا توجد بيانات مرفوعة لهذه الشركة بعد، وصلاحيتك هنا مشاهدة فقط.</Card>
        )}

        {step === "classify" && draftRows && (
          <div>
            <SectionTitle icon={ClipboardList} sub="راجع التصنيف المقترح لكل حساب وعدّله إذا لزم الأمر">تصنيف الحسابات</SectionTitle>
            <SavePeriodBar year={draftYear} setYear={setDraftYear} month={draftMonth} setMonth={setDraftMonth} openingInv={draftOpeningInv} setOpeningInv={setDraftOpeningInv} cumulative={draftCumulative} setCumulative={setDraftCumulative} onSave={finalizeDraft} isNew={draftIsNew} />
            <ClassifyTable rows={draftRows} setRows={setDraftRows} onNext={finalizeDraft} nextLabel={draftIsNew ? "حفظ الفترة والانتقال للقوائم" : "حفظ التعديلات"} />
          </div>
        )}
        {step === "classify" && !draftRows && (
          <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>اختر فترة من القائمة فوق أو ارفع فترة جديدة أولاً.</Card>
        )}

        {step === "statements" && active && (
          <div>
            <div style={{ display: "flex", gap: 8, marginBottom: 24, flexWrap: "wrap" }} className="no-print">
              {STMT_TABS.map((t) => (
                <button key={t.key} onClick={() => setStmtTab(t.key)}
                  style={{ display: "flex", alignItems: "center", gap: 7, padding: "9px 16px", borderRadius: 20, border: `1px solid ${stmtTab === t.key ? INK : RULE}`, background: stmtTab === t.key ? INK : "#fff", color: stmtTab === t.key ? CREAM : INK, fontSize: 13.5, fontWeight: 600, cursor: "pointer", fontFamily: "'IBM Plex Sans Arabic', sans-serif" }}>
                  <t.icon size={14} /> {t.label}
                </button>
              ))}
            </div>
            {stmtTab === "home" && (
              <HomeDashboard company={active} periods={sortedPeriods} year={selectedYear} setYear={setSelectedYear} availableYears={availableYears.length ? availableYears : [selectedYear]} zakatDue={computeZakatTotal(active.zakat)} />
            )}
            {stmtTab === "income_monthly" && (
              figures ? <DetailedIncomeStatement f={figures} title="قائمة الدخل الشهرية" periodLabel={monthlyPeriodLabel} sourceLabel={monthlySourceLabel} /> : <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>اختر فترة أولاً من القائمة فوق.</Card>
            )}
            {stmtTab === "income_annual" && (
              annualFigures ? <DetailedIncomeStatement f={annualFigures} title="قائمة الدخل السنوية" periodLabel={annualPeriodLabel} sourceLabel={annualSourceLabel} /> : <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>لا توجد فترات لسنة {selectedYear}.</Card>
            )}
            {stmtTab === "balance" && (
              balanceFigures ? <BalanceSheet f={balanceFigures} periodLabel={activePeriod ? `كما في نهاية ${MONTH_NAMES[activePeriod.month - 1]} ${activePeriod.year}` : ""} /> : <Card style={{ padding: 30, textAlign: "center", color: "#847c69" }}>اختر فترة أولاً من القائمة فوق.</Card>
            )}
            {stmtTab === "equity" && activePeriod && figures && (
              <EquityStatement rows={activePeriod.rows} f={figures} opening={active.opening || {}} setOpening={(o) => patchCompany({ opening: o })} periodLabel={monthlyPeriodLabel} readOnly={readOnly} />
            )}
            {stmtTab === "perf" && figures && <PerformanceSummary f={figures} periodLabel={monthlyPeriodLabel} />}
          </div>
        )}

        {step === "zakat" && active && <ZakatModule data={active.zakat} setData={patchZakat} readOnly={readOnly} />}
      </div>
    </div>
  );
}

/* ---------------------------------- تسجيل الدخول ---------------------------------- */


function AuthScreen() {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    if (!email.trim() || password.length < 6) {
      setError("أدخل بريد إلكتروني صحيح وكلمة سر لا تقل عن 6 أحرف");
      return;
    }
    setLoading(true);
    try {
      if (mode === "signin") await auth.signInWithEmailAndPassword(email.trim(), password);
      else await auth.createUserWithEmailAndPassword(email.trim(), password);
    } catch (err) {
      const map = {
        "auth/user-not-found": "الحساب غير موجود، جرّب إنشاء حساب جديد",
        "auth/wrong-password": "كلمة السر غير صحيحة",
        "auth/email-already-in-use": "البريد الإلكتروني مستخدم بالفعل، جرّب تسجيل الدخول",
        "auth/invalid-email": "صيغة البريد الإلكتروني غير صحيحة",
      };
      setError(map[err.code] || err.message);
    }
    setLoading(false);
  };

  return (
    <div style={{ minHeight: "100vh", background: CREAM, fontFamily: "'IBM Plex Sans Arabic', sans-serif", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }} dir="rtl">
      <style>{FONTS}</style>
      <Card style={{ padding: 34, width: "100%", maxWidth: 380 }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <img src={LOGO_URI} alt="Selim Finance" style={{ height: 46, margin: "0 auto 10px", display: "block" }} />
          <div style={{ fontFamily: "'Markazi Text', serif", fontSize: 20, fontWeight: 700, color: INK, marginTop: 8 }}>القوائم المالية والزكاة</div>
          <div style={{ fontSize: 12.5, color: "#847c69", marginTop: 4 }}>{mode === "signin" ? "تسجيل الدخول" : "إنشاء حساب جديد"}</div>
        </div>
        <form onSubmit={submit}>
          <label style={{ fontSize: 12.5, color: "#6b6455" }}>البريد الإلكتروني</label>
          <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required
            style={{ width: "100%", border: `1px solid ${RULE}`, borderRadius: 7, padding: "9px 10px", marginBottom: 12, marginTop: 4, direction: "ltr", fontFamily: "inherit", fontSize: 14 }} />
          <label style={{ fontSize: 12.5, color: "#6b6455" }}>كلمة السر</label>
          <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required
            style={{ width: "100%", border: `1px solid ${RULE}`, borderRadius: 7, padding: "9px 10px", marginBottom: 16, marginTop: 4, direction: "ltr", fontFamily: "inherit", fontSize: 14 }} />
          {error && <div style={{ background: "#faeceb", color: RED_INK, borderRadius: 7, padding: "8px 10px", fontSize: 12.5, marginBottom: 14 }}>{error}</div>}
          <button type="submit" disabled={loading} style={{ width: "100%", background: INK, color: CREAM, border: "none", borderRadius: 8, padding: "11px", fontFamily: "inherit", fontWeight: 700, fontSize: 14.5, cursor: loading ? "wait" : "pointer" }}>
            {loading ? "جارِ التحقق…" : mode === "signin" ? "دخول" : "إنشاء الحساب"}
          </button>
        </form>
        <div style={{ textAlign: "center", marginTop: 16, fontSize: 13 }}>
          {mode === "signin" ? (
            <span>مفيش حساب؟ <button onClick={() => { setMode("signup"); setError(""); }} style={{ background: "none", border: "none", color: GOLD, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>إنشاء حساب جديد</button></span>
          ) : (
            <span>عندك حساب؟ <button onClick={() => { setMode("signin"); setError(""); }} style={{ background: "none", border: "none", color: GOLD, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>تسجيل الدخول</button></span>
          )}
        </div>
      </Card>
    </div>
  );
}

function Root() {
  const [user, setUser] = useState(undefined);
  useEffect(() => {
    const unsub = auth.onAuthStateChanged(setUser);
    return unsub;
  }, []);
  if (user === undefined) {
    return (
      <div style={{ minHeight: "100vh", background: CREAM, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'IBM Plex Sans Arabic', sans-serif", color: "#847c69" }}>
        جارِ التحميل…
      </div>
    );
  }
  if (!user) return <AuthScreen />;
  return <MainApp user={user} />;
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);
